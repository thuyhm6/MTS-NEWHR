<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/master :: master}">

<head>
    <title th:text="${title}">HR Management System</title>
</head>

<body>
    <div th:fragment="content">

        <!-- Tiêu đề chào mừng -->
        <div class="row mb-3">
            <div class="col-12">
                <div class="card bg-primary text-white mb-0">
                    <div class="card-body py-3 d-flex align-items-center gap-3">
                        <i class="bx bx-building-house fs-1"></i>
                        <div>
                            <h5 class="mb-1 text-white" th:text="#{hrm.welcome.title}">Chào mừng đến với HR Management System</h5>
                            <p class="mb-0 opacity-75 small" th:text="${message}">Hệ thống quản lý nhân sự toàn diện</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Cảnh báo & Thống kê nhanh -->
        <div class="row mb-3">
            <div class="col-lg-4">
                <div class="card card-height-100 mb-0">
                    <div class="card-header d-flex align-items-center justify-content-between gap-2 py-2">
                        <h6 class="card-title flex-grow-1 mb-0">
                            <i class="bx bx-bell text-warning me-1"></i>
                            <span th:text="#{hrm.alerts.title}">Cảnh báo</span>
                        </h6>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover table-nowrap table-centered m-0">
                            <thead class="bg-light bg-opacity-50">
                                <tr>
                                    <th class="text-muted ps-3" style="width:65%" th:text="#{common.name}">Tên</th>
                                    <th class="text-muted" style="width:15%" th:text="#{dashboard.col.quantity}">Số lượng</th>
                                    <th class="text-muted" style="width:20%" th:text="#{common.status}">Trạng thái</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td class="ps-3">
                                        <a href="/hrm/contractInfo/viewExpiredContract" class="text-muted"
                                            data-tab="/hrm/contractInfo/viewExpiredContract"
                                            th:attr="data-title=#{dashboard.contract.expiring}"
                                            th:text="#{dashboard.contract.expiringDetail}">
                                            Hợp đồng sắp hết hạn (7 ngày tới)
                                        </a>
                                    </td>
                                    <td th:text="${expiringContractsCount}">0</td>
                                    <td>
                                        <span th:if="${expiringContractsCount > 0}"
                                            class="badge badge-soft-danger"
                                            th:text="#{dashboard.status.needAction}">Cần xử lý</span>
                                        <span th:unless="${expiringContractsCount > 0}"
                                            class="badge badge-soft-success"
                                            th:text="#{dashboard.status.stable}">Ổn định</span>
                                    </td>
                                </tr>
                                <tr>
                                    <td class="ps-3">
                                        <a href="/hrm/contractInfo/viewNOContractInfo" class="text-muted"
                                            data-tab="/hrm/contractInfo/viewNOContractInfo"
                                            th:attr="data-title=#{hrm.quickLinks.noContract}"
                                            th:text="#{hrm.alert.noContract}">
                                            Nhân viên chưa có hợp đồng
                                        </a>
                                    </td>
                                    <td id="hrm_noContractCount">-</td>
                                    <td id="hrm_noContractStatus"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Tình hình nhân sự -->
            <div class="col-lg-8">
                <div class="card mb-0">
                    <div class="card-header d-flex align-items-center justify-content-between gap-2 py-2">
                        <h6 class="card-title flex-grow-1 mb-0">
                            <i class="bx bx-bar-chart-alt-2 text-primary me-1"></i>
                            <span th:text="#{hrm.chart.personnel.title}">Tình hình nhân sự</span>
                        </h6>
                        <div class="d-flex align-items-center gap-2">
                            <select id="hrm_chartYear" class="form-select form-select-sm" style="width:90px"></select>
                            <a id="hrm_exportBtn" href="#" class="btn btn-sm btn-outline-success d-flex align-items-center gap-1">
                                <i class="bx bx-download"></i>
                                <span th:text="#{hrm.chart.export}">Xuất Excel</span>
                            </a>
                        </div>
                    </div>
                    <div class="card-body py-2">
                        <canvas id="hrm_empMonthlyChart" height="110"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <script th:inline="javascript">
            (function() {
                var _hrm_i18n = {
                    stable     : /*[[#{dashboard.status.stable}]]*/ 'Ổn định',
                    needAction : /*[[#{dashboard.status.needAction}]]*/ 'Cần xử lý'
                };

                function hrmSetCount(countId, statusId, count, isWarning) {
                    var el   = document.getElementById(countId);
                    var stEl = document.getElementById(statusId);
                    if (!el || !stEl) return;
                    el.textContent = count;
                    if (count > 0) {
                        var cls = isWarning ? 'badge-soft-warning' : 'badge-soft-danger';
                        stEl.innerHTML = '<span class="badge ' + cls + '">' + _hrm_i18n.needAction + '</span>';
                    } else {
                        stEl.innerHTML = '<span class="badge badge-soft-success">' + _hrm_i18n.stable + '</span>';
                    }
                }

                $(document).ready(function() {
                    $.ajax({
                        url: '/hrm/contractInfo/api/noContract/count', type: 'GET',
                        success: function(r) { hrmSetCount('hrm_noContractCount', 'hrm_noContractStatus', r || 0, true); },
                        error:   function()  {
                            var e = document.getElementById('hrm_noContractCount');
                            if (e) e.textContent = '-';
                        }
                    });
                });
            })();
        </script>

        <script src="/assets/plugins/chart.js/Chart.min.js"></script>
        <script th:inline="javascript">
            (function() {
                var _hrm_chart_i18n = {
                    totalEmp  : /*[[#{hrm.chart.personnel.totalEmp}]]*/ 'Tổng nhân viên',
                    newJoiner : /*[[#{hrm.chart.personnel.newJoiner}]]*/ 'Nhân viên mới',
                    leaver    : /*[[#{hrm.chart.personnel.leaver}]]*/ 'Nhân viên nghỉ việc'
                };

                var _hrm_monthLabels = (function() {
                    var months = [];
                    for (var i = 1; i <= 12; i++) { months.push('T' + i); }
                    return months;
                })();

                var _hrm_chartInstance = null;
                var _hrm_currentYear   = new Date().getFullYear();

                /* Khởi tạo dropdown năm (5 năm trước đến năm hiện tại) */
                (function initYearSelect() {
                    var sel = document.getElementById('hrm_chartYear');
                    for (var y = _hrm_currentYear; y >= _hrm_currentYear - 4; y--) {
                        var opt = document.createElement('option');
                        opt.value = y;
                        opt.textContent = y;
                        if (y === _hrm_currentYear) opt.selected = true;
                        sel.appendChild(opt);
                    }
                    sel.addEventListener('change', function() {
                        loadChart(parseInt(this.value));
                    });
                })();

                /* Cập nhật link xuất Excel theo năm */
                function updateExportLink(year) {
                    var btn = document.getElementById('hrm_exportBtn');
                    if (btn) btn.href = '/hrm/api/empMonthlyStats/export?year=' + year;
                }

                function loadChart(year) {
                    updateExportLink(year);
                    $.ajax({
                        url: '/hrm/api/empMonthlyStats',
                        type: 'GET',
                        data: { year: year },
                        success: function(data) {
                            var empCounts    = new Array(12).fill(0);
                            var joinerCounts = new Array(12).fill(0);
                            var leaverCounts = new Array(12).fill(0);
                            if (data && data.length) {
                                data.forEach(function(d) {
                                    var idx = d.monthNum - 1;
                                    empCounts[idx]    = d.empCount;
                                    joinerCounts[idx] = d.newJoinerCount;
                                    leaverCounts[idx] = d.leaverCount;
                                });
                            }
                            if (_hrm_chartInstance) {
                                _hrm_chartInstance.destroy();
                            }
                            var ctx = document.getElementById('hrm_empMonthlyChart').getContext('2d');
                            _hrm_chartInstance = new Chart(ctx, {
                                type: 'bar',
                                data: {
                                    labels: _hrm_monthLabels,
                                    datasets: [
                                        {
                                            label: _hrm_chart_i18n.totalEmp,
                                            data: empCounts,
                                            backgroundColor: 'rgba(74, 144, 226, 0.75)',
                                            borderColor: 'rgba(74, 144, 226, 1)',
                                            borderWidth: 1,
                                            barPercentage: 0.75,
                                            categoryPercentage: 0.85
                                        },
                                        {
                                            label: _hrm_chart_i18n.newJoiner,
                                            data: joinerCounts,
                                            backgroundColor: 'rgba(40, 167, 69, 0.75)',
                                            borderColor: 'rgba(40, 167, 69, 1)',
                                            borderWidth: 1,
                                            barPercentage: 0.75,
                                            categoryPercentage: 0.85
                                        },
                                        {
                                            label: _hrm_chart_i18n.leaver,
                                            data: leaverCounts,
                                            backgroundColor: 'rgba(220, 53, 69, 0.75)',
                                            borderColor: 'rgba(220, 53, 69, 1)',
                                            borderWidth: 1,
                                            barPercentage: 0.75,
                                            categoryPercentage: 0.85
                                        }
                                    ]
                                },
                                options: {
                                    responsive: true,
                                    legend: {
                                        position: 'top',
                                        labels: { boxWidth: 12, fontSize: 11 }
                                    },
                                    tooltips: { mode: 'index', intersect: false },
                                    scales: {
                                        xAxes: [{
                                            gridLines: { display: false },
                                            ticks: { fontSize: 10 }
                                        }],
                                        yAxes: [{
                                            ticks: {
                                                beginAtZero: true,
                                                fontSize: 10,
                                                callback: function(v) { return Number.isInteger(v) ? v : null; }
                                            },
                                            gridLines: { drawBorder: false }
                                        }]
                                    }
                                }
                            });
                        }
                    });
                }

                updateExportLink(_hrm_currentYear);
                loadChart(_hrm_currentYear);
            })();
        </script>

        <script>
            function changeLanguage(language) {
                fetch('/api/multilingual/set-language', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ language: language })
                }).then(function () {
                    var url = new URL(window.location);
                    url.searchParams.set('lang', language);
                    window.location.href = url.toString();
                }).catch(function (error) {
                    console.error('Error changing language:', error);
                    alert('Có lỗi xảy ra khi thay đổi ngôn ngữ');
                });
            }
        </script>
    </div>
</body>

</html>
