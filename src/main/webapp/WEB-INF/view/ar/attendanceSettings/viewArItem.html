<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <!-- Search Form -->
                    <form id="arItemSearchForm" class="row g-3 mb-4">
                        <div class="col-md-3">
                            <label for="searchArItemNo" class="form-label" th:text="#{ar.viewArItem.title.hangmuc}">Hạng mục</label>
                            <input type="text" class="form-control" id="searchArItemNo"
                                th:placeholder="#{ar.viewArItem.placeholder.search}" placeholder="Nhập mã hạng mục / tên">
                        </div>

                        <div class="col-md-3 d-flex align-items-end">
                            <button type="button" class="btn btn-primary me-2" onclick="arItemSearchData()">
                                <i class="bx bx-search"></i> <span th:text="#{common.search}">Tìm kiếm</span>
                            </button>
                            <button type="button" class="btn btn-secondary" onclick="arItemClearSearch()">
                                <i class="bx bx-x"></i> <span th:text="#{common.clearFilter}">Xóa lọc</span>
                            </button>
                            <button type="button" class="btn btn-success ms-2" onclick="arItemOpenModal()">
                                <i class="bx bx-plus"></i> <span th:text="#{common.addNew}">Thêm mới</span>
                            </button>
                        </div>
                    </form>

                    <!-- Data Table -->
                    <div class="table-responsive">
                        <table id="arItemTable" class="table table-striped table-bordered table-hover"
                            style="width:100%">
                            <thead class="table-light">
                                <tr>
                                    <th th:text="#{common.stt}">STT</th>
                                    <th th:text="#{ar.viewArItem.title.itemNo}">Mã hạng mục (No)</th>
                                    <th>ID</th>
                                    <th th:text="#{ar.viewArItem.title.shortName}">Tên viết tắt</th>
                                    <th th:text="#{ar.viewArItem.title.description}">Mô tả</th>
                                    <th th:text="#{ar.viewArItem.title.unit}">Đơn vị</th>
                                    <th th:text="#{ar.viewArItem.title.groupCode}">Mã nhóm</th>
                                    <th th:text="#{common.name}">Tên</th>
                                    <th th:text="#{common.orderno}">Sắp xếp</th>
                                    <th th:text="#{common.activity}">Trạng thái</th>
                                    <th class="text-center" style="width: 100px;" th:text="#{common.action}">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data loaded via AJAX -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Thêm/Sửa -->
<div class="modal fade" id="arItemModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="arItemModalTitle" th:text="#{ar.viewArItem.title.itemlist}">Danh sách hạng mục</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="arItemForm">
                    <input type="hidden" id="arItemItemNo" name="itemNo">

                    <h6 class="mb-3 text-primary border-bottom pb-2" th:text="#{common.multiLangInfo}">Thông tin Đa Ngôn Ngữ</h6>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label for="arItemNameVi" class="form-label" th:text="#{common.nameVi}">Tên Tiếng Việt <span
                                    class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="arItemNameVi" name="nameVi" required>
                        </div>
                        <div class="col-md-6">
                            <label for="arItemNameEn" class="form-label" th:text="#{common.nameEn}">Tên Tiếng Anh</label>
                            <input type="text" class="form-control" id="arItemNameEn" name="nameEn">
                        </div>
                        <div class="col-md-6">
                            <label for="arItemNameZh" class="form-label" th:text="#{common.nameZh}">Tên Tiếng Trung</label>
                            <input type="text" class="form-control" id="arItemNameZh" name="nameZh">
                        </div>
                        <div class="col-md-6">
                            <label for="arItemNameKo" class="form-label" th:text="#{common.nameKo}">Tên Tiếng Hàn</label>
                            <input type="text" class="form-control" id="arItemNameKo" name="nameKo">
                        </div>
                    </div>

                    <h6 class="mb-3 text-primary border-bottom pb-2" th:text="#{ar.viewArItem.title.iteminfo}">Thông tin Hạng Mục</h6>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="arItemItemId" class="form-label" th:text="#{ar.viewArItem.title.itemId}">ID hạng mục</label>
                            <input type="text" class="form-control" id="arItemItemId" name="itemId">
                        </div>
                        <div class="col-md-6">
                            <label for="arItemShortName" class="form-label" th:text="#{ar.viewArItem.title.shortName}">Tên rút gọn</label>
                            <input type="text" class="form-control" id="arItemShortName" name="shortName">
                        </div>
                        <div class="col-md-6">
                            <label for="arItemDescription" class="form-label" th:text="#{ar.viewArItem.title.description}">Mô tả</label>
                            <input type="text" class="form-control" id="arItemDescription" name="description">
                        </div>
                        <div class="col-md-6">
                            <label for="arItemUnit" class="form-label" th:text="#{ar.viewArItem.title.unit}">Đơn vị (ngày, giờ, phút)</label>
                            <input type="text" class="form-control" id="arItemUnit" name="unit">
                        </div>
                        <div class="col-md-6">
                            <label for="arItemItemGroupCode" class="form-label" th:text="#{ar.viewArItem.title.groupCode}">Mã nhóm dự án (CODE)</label>
                            <select class="form-select" id="arItemItemGroupCode" name="itemGroupCode"
                                data-parent-code="1429" th:attr="data-default-text=#{common.selectGroup}">
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="arItemItemIdMapping" class="form-label" th:text="#{ar.viewArItem.title.idMapping}">ID Mapping</label>
                            <input type="text" class="form-control" id="arItemItemIdMapping" name="itemIdMapping">
                        </div>
                        <div class="col-md-6">
                            <label for="arItemOrderno" class="form-label" th:text="#{common.orderno}">Sắp xếp</label>
                            <input type="number" class="form-control" id="arItemOrderno" name="orderno">
                        </div>
                        <div class="col-md-6">
                            <label for="arItemOrdernoSst" class="form-label" th:text="#{ar.viewArItem.title.ordernoSst}">Sắp xếp SST</label>
                            <input type="number" class="form-control" id="arItemOrdernoSst" name="ordernoSst">
                        </div>
                        <div class="col-md-6">
                            <label for="arItemActivity" class="form-label" th:text="#{common.activity}">Trạng thái (1: Hoạt động, 0: Ngừng)</label>
                            <input type="number" class="form-control" id="arItemActivity" name="activity" min="0"
                                max="1" value="1">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" th:text="#{common.close}">Đóng</button>
                <button type="button" class="btn btn-primary" onclick="arItemSaveData()" th:text="#{common.save}">Lưu</button>
            </div>
        </div>
    </div>
</div>

<template id="fragmentScripts">
    <script th:inline="javascript">
        $(document).ready(function () {
            var table = $('#arItemTable').DataTable({
                destroy: true,
                scrollY: "calc(100vh - 280px)",
                select: 'single',
                scrollCollapse: true,
                paging: true,
                searching: true,
                lengthChange: true,
                pageLength: 25,
                columnDefs: [
                    { "width": "2%", "targets": 0 },
                ],
                processing: true,

                dom: 'Blfrtip',
                buttons: [
                    'copy', 'csv', 'excel', 'pdf', 'print'
                ],
                ajax: {
                    url: '/ar/attendanceSettings/api/arItem',
                    dataSrc: '',
                    data: function (d) {
                        d.itemNo = $('#searchArItemNo').val();
                    }
                },
                columns: [
                    {
                        data: null,
                        render: function (data, type, row, meta) {
                            return meta.row + 1;
                        }
                    },
                    { data: 'itemNo' },
                    { data: 'itemId' },
                    { data: 'shortName' },
                    { data: 'description' },
                    { data: 'unit' },
                    { data: 'itemGroupCode' },
                    { data: 'nameVi' },
                    { data: 'orderno' },
                    {
                        data: 'activity',
                        render: function (data) {
                            return data == 1 ? '<span class="badge bg-success">Hoạt động</span>' : '<span class="badge bg-secondary">Ngừng</span>';
                        }
                    },
                    {
                        data: null,
                        className: "text-center",
                        render: function (data, type, row) {
                            return `
                                <div class="btn-group btn-group-sm">
                                    <button class="btn btn-warning" onclick="arItemEditRaw('${row.itemNo}')">
                                        <i class="bx bx-edit"></i>
                                    </button>
                                    <button class="btn btn-danger" onclick="arItemDeleteRaw('${row.itemNo}')">
                                        <i class="bx bx-trash"></i>
                                    </button>
                                </div>
                            `;
                        }
                    }
                ]
            });

            window.arItemSearchData = function () {
                table.ajax.reload();
            };

            window.arItemClearSearch = function () {
                $('#arItemSearchForm')[0].reset();
                table.ajax.reload();
            };

            // Mở modal thêm mới
            window.arItemOpenModal = function () {
                $('#arItemModalTitle').text('Thêm mới Hạng mục');
                $('#arItemForm')[0].reset();
                $('#arItemItemNo').val('');
                $('#arItemActivity').val('1'); // Mặc định hoạt động
                var modal = new bootstrap.Modal(document.getElementById('arItemModal'));
                modal.show();
            };

            // Sửa
            window.arItemEditRaw = function (id) {
                $.ajax({
                    url: '/ar/attendanceSettings/api/arItem/' + id,
                    type: 'GET',
                    success: function (data) {
                        $('#arItemModalTitle').text('Cập nhật Hạng mục');
                        $('#arItemItemNo').val(data.itemNo);
                        $('#arItemNameVi').val(data.nameVi);
                        $('#arItemNameEn').val(data.nameEn);
                        $('#arItemNameZh').val(data.nameZh);
                        $('#arItemNameKo').val(data.nameKo);

                        $('#arItemItemId').val(data.itemId);
                        $('#arItemShortName').val(data.shortName);
                        $('#arItemDescription').val(data.description);
                        $('#arItemUnit').val(data.unit);
                        $('#arItemItemGroupCode').val(data.itemGroupCode);
                        $('#arItemItemIdMapping').val(data.itemIdMapping);

                        $('#arItemOrderno').val(data.orderno);
                        $('#arItemOrdernoSst').val(data.ordernoSst);
                        $('#arItemActivity').val(data.activity);

                        var modal = new bootstrap.Modal(document.getElementById('arItemModal'));
                        modal.show();
                    },
                    error: function (err) {
                        if (typeof toastr !== 'undefined') toastr.error('Lỗi khi lấy thông tin: ' + (err.responseJSON ? err.responseJSON.error : err.responseText));
                        else alert('Lỗi khi lấy thông tin: ' + (err.responseJSON ? err.responseJSON.error : err.responseText));
                    }
                });
            };

            // Lưu dữ liệu
            window.arItemSaveData = function () {
                // Validate cơ bản
                if (!$('#arItemNameVi').val()) {
                    if (typeof toastr !== 'undefined') toastr.warning('Vui lòng nhập Tên tiếng Việt');
                    else alert('Vui lòng nhập Tên tiếng Việt');
                    return;
                }

                var formData = {
                    itemNo: $('#arItemItemNo').val() || null,
                    nameVi: $('#arItemNameVi').val(),
                    nameEn: $('#arItemNameEn').val(),
                    nameZh: $('#arItemNameZh').val(),
                    nameKo: $('#arItemNameKo').val(),
                    itemId: $('#arItemItemId').val(),
                    shortName: $('#arItemShortName').val(),
                    description: $('#arItemDescription').val(),
                    unit: $('#arItemUnit').val(),
                    itemGroupCode: $('#arItemItemGroupCode').val(),
                    itemIdMapping: $('#arItemItemIdMapping').val(),
                    orderno: $('#arItemOrderno').val() || null,
                    ordernoSst: $('#arItemOrdernoSst').val() || null,
                    activity: $('#arItemActivity').val() || 0
                };

                $.ajax({
                    url: '/ar/attendanceSettings/api/arItem/save',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(formData),
                    success: function (res) {
                        if (typeof toastr !== 'undefined') toastr.success(res.message || 'Lưu thành công');
                        else alert(res.message || 'Lưu thành công');
                        var modalEl = document.getElementById('arItemModal');
                        if (modalEl) {
                            var modal = bootstrap.Modal.getInstance(modalEl);
                            if (modal) {
                                modal.hide();
                            } else {
                                $(modalEl).modal('hide');
                            }
                        }
                        table.ajax.reload();
                    },
                    error: function (err) {
                        var errorMsg = (err.responseJSON && err.responseJSON.error) ? err.responseJSON.error : (err.responseText || "Lỗi không xác định");
                        if (typeof toastr !== 'undefined') toastr.error('Lỗi khi lưu: ' + errorMsg);
                        else alert('Lỗi khi lưu: ' + errorMsg);
                    }
                });
            };

            // Xóa
            window.arItemDeleteRaw = function (id) {
                if (confirm('Bạn có chắc chắn muốn xóa hạng mục này? Tất cả thông tin đa ngôn ngữ cũng sẽ bị xóa.')) {
                    $.ajax({
                        url: '/ar/attendanceSettings/api/arItem/delete/' + id,
                        type: 'DELETE',
                        success: function (res) {
                            if (typeof toastr !== 'undefined') toastr.success(res.message || 'Xóa thành công');
                            else alert(res.message || 'Xóa thành công');
                            table.ajax.reload();
                        },
                        error: function (err) {
                            var errorMsg = (err.responseJSON && err.responseJSON.error) ? err.responseJSON.error : (err.responseText || "Lỗi không xác định");
                            if (typeof toastr !== 'undefined') toastr.error('Lỗi khi xóa: ' + errorMsg);
                            else alert('Lỗi khi xóa: ' + errorMsg);
                        }
                    });
                }
            };
        });
    </script>
</template>
