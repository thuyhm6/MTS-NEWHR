<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <!-- Search Form -->
                    <form id="cycleParamSearchForm" class="row g-3 mb-4">
                        <div class="col-md-3">
                            <label for="searchCpnyId" class="form-label" th:text="#{ar.viewcycleparameter.title.gongsi}">Mã công ty</label>
                            <input type="text" class="form-control" id="searchCpnyId" th:placeholder="#{ar.viewcycleparameter.placeholder.cpnyId}" placeholder="Nhập mã công ty">
                        </div>
                        <div class="col-md-3">
                            <label for="searchStatNo" class="form-label" th:text="#{ar.viewcycleparameter.title.qujian}">Khoảng mã</label>
                            <input type="text" class="form-control" id="searchStatNo" th:placeholder="#{ar.viewcycleparameter.placeholder.statNo}" placeholder="Nhập khoảng mã">
                        </div>

                        <div class="col-md-3 d-flex align-items-end">
                            <button type="button" class="btn btn-primary me-2" onclick="cycleParamSearchData()">
                                <i class="bx bx-search"></i> <span th:text="#{common.search}">Tìm kiếm</span>
                            </button>
                            <button type="button" class="btn btn-secondary" onclick="cycleParamClearSearch()">
                                <i class="bx bx-x"></i> <span th:text="#{common.clearFilter}">Xóa lọc</span>
                            </button>
                            <button type="button" class="btn btn-success ms-2" onclick="cycleParamOpenModal()">
                                <i class="bx bx-plus"></i> <span th:text="#{common.addNew}">Thêm mới</span>
                            </button>
                        </div>
                    </form>

                    <!-- Data Table -->
                    <div class="table-responsive">
                        <table id="cycleParamTable" class="table table-striped table-bordered table-hover"
                            style="width:100%">
                            <thead class="table-light">
                                <tr>
                                    <th th:text="#{common.stt}">STT</th>
                                    <th th:text="#{ar.viewcycleparameter.title.gongsi}">Mã công ty</th>
                                    <th th:text="#{ar.viewcycleparameter.title.qujian}">Khoảng mã</th>
                                    <th th:text="#{ar.viewcycleparameter.title.kaishiriqi}">Từ ngày</th>
                                    <th th:text="#{ar.viewcycleparameter.title.jieshuriqi}">Đến ngày</th>
                                    <th th:text="#{common.orderno}">Sắp xếp</th>
                                    <th th:text="#{common.activity}">Trạng thái</th>
                                    <th class="text-center" style="width: 100px;" th:text="#{common.action}">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data loaded via AJAX -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Thêm/Sửa -->
<div class="modal fade" id="cycleParamModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="cycleParamModalTitle" th:text="#{ar.viewcycleparameter.title.cycleParamInfo}">Thông số chu kỳ</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="cycleParamForm">
                    <input type="hidden" id="cycleParamParamNo" name="paramNo">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="cycleParamCpnyId" class="form-label" th:text="#{ar.viewcycleparameter.title.gongsi}">Mã công ty <span
                                    class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="cycleParamCpnyId" name="cpnyId" required>
                        </div>
                        <div class="col-md-6">
                            <label for="cycleParamStatNo" class="form-label" th:text="#{ar.viewcycleparameter.title.qujian}">Khoảng mã <span
                                    class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="cycleParamStatNo" name="statNo" required>
                        </div>
                        <div class="col-md-6">
                            <label for="cycleParamStartDate" class="form-label" th:text="#{ar.viewcycleparameter.title.kaishiriqi}">Từ ngày</label>
                            <input type="text" class="form-control" id="cycleParamStartDate" name="startDate"
                                placeholder="YYYY-MM-DD">
                        </div>
                        <div class="col-md-6">
                            <label for="cycleParamEndDate" class="form-label" th:text="#{ar.viewcycleparameter.title.jieshuriqi}">Đến ngày</label>
                            <input type="text" class="form-control" id="cycleParamEndDate" name="endDate"
                                placeholder="YYYY-MM-DD">
                        </div>
                        <div class="col-md-6">
                            <label for="cycleParamOrderno" class="form-label" th:text="#{common.orderno}">Sắp xếp</label>
                            <input type="number" class="form-control" id="cycleParamOrderno" name="orderno">
                        </div>
                        <div class="col-md-6">
                            <label for="cycleParamActivity" class="form-label" th:text="#{common.activity}">Trạng thái (1: Hoạt động, 0:
                                Ngừng)</label>
                            <input type="number" class="form-control" id="cycleParamActivity" name="activity" min="0"
                                max="1" value="1">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                <button type="button" class="btn btn-primary" onclick="cycleParamSaveData()">Lưu</button>
            </div>
        </div>
    </div>
</div>

<template id="fragmentScripts">
    <script th:inline="javascript">
        $(document).ready(function () {
            var table = $('#cycleParamTable').DataTable({
                destroy: true,
                scrollY: "calc(100vh - 280px)",
                scrollCollapse: true,
                paging: true,
                searching: true,
                lengthChange: true,
                pageLength: 20,
                columnDefs: [
                    { "width": "2%", "targets": 0 },
                ],
                processing: true,

                dom: 'Blfrtip',
                buttons: [
                    'copy', 'csv', 'excel', 'pdf', 'print'
                ],
                ajax: {
                    url: '/ar/attendanceSettings/api/cycleParameter', // Địa chỉ API cần khớp với Controller
                    dataSrc: '',
                    data: function (d) {
                        d.cpnyId = $('#searchCpnyId').val();
                        d.statNo = $('#searchStatNo').val();
                    }
                },
                columns: [
                    {
                        data: null,
                        render: function (data, type, row, meta) {
                            return meta.row + 1;
                        }
                    },
                    { data: 'cpnyId' },
                    { data: 'statNo' },
                    { data: 'startDate' },
                    { data: 'endDate' },
                    { data: 'orderno' },
                    {
                        data: 'activity',
                        render: function (data) {
                            return data == 1 ? '<span class="badge bg-success">Hoạt động</span>' : '<span class="badge bg-secondary">Ngừng</span>';
                        }
                    },
                    {
                        data: null,
                        className: "text-center",
                        render: function (data, type, row) {
                            return `
                                <div class="btn-group btn-group-sm">
                                    <button class="btn btn-warning" onclick="cycleParamEditRaw('${row.paramNo}')">
                                        <i class="bx bx-edit"></i>
                                    </button>
                                    <button class="btn btn-danger" onclick="cycleParamDeleteRaw('${row.paramNo}')">
                                        <i class="bx bx-trash"></i>
                                    </button>
                                </div>
                            `;
                        }
                    }
                ]
            });

            window.cycleParamSearchData = function () {
                table.ajax.reload();
            };

            window.cycleParamClearSearch = function () {
                $('#cycleParamSearchForm')[0].reset();
                table.ajax.reload();
            };

            // Mở modal thêm mới
            window.cycleParamOpenModal = function () {
                $('#cycleParamModalTitle').text('Thêm mới Thông số chu kỳ');
                $('#cycleParamForm')[0].reset();
                $('#cycleParamParamNo').val('');
                $('#cycleParamActivity').val('1'); // Mặc định hoạt động
                var modal = new bootstrap.Modal(document.getElementById('cycleParamModal'));
                modal.show();
            };

            // Sửa
            window.cycleParamEditRaw = function (id) {
                $.ajax({
                    url: '/ar/attendanceSettings/api/cycleParameter/' + id,
                    type: 'GET',
                    success: function (data) {
                        $('#cycleParamModalTitle').text('Cập nhật Thông số chu kỳ');
                        $('#cycleParamParamNo').val(data.paramNo);
                        $('#cycleParamCpnyId').val(data.cpnyId);
                        $('#cycleParamStatNo').val(data.statNo);

                        // Parse date nếu có
                        if (data.startDate) {
                            var sd = data.startDate;
                            if (sd.includes('T')) sd = sd.split('T')[0];
                            $('#cycleParamStartDate').val(sd);
                        }
                        if (data.endDate) {
                            var ed = data.endDate;
                            if (ed.includes('T')) ed = ed.split('T')[0];
                            $('#cycleParamEndDate').val(ed);
                        }

                        $('#cycleParamOrderno').val(data.orderno);
                        $('#cycleParamActivity').val(data.activity);

                        var modal = new bootstrap.Modal(document.getElementById('cycleParamModal'));
                        modal.show();
                    },
                    error: function (err) {
                        if (typeof toastr !== 'undefined') toastr.error('Lỗi khi lấy thông tin: ' + (err.responseJSON ? err.responseJSON.error : err.responseText));
                        else alert('Lỗi khi lấy thông tin: ' + (err.responseJSON ? err.responseJSON.error : err.responseText));
                    }
                });
            };

            // Lưu dữ liệu
            window.cycleParamSaveData = function () {
                // Validate cơ bản
                if (!$('#cycleParamCpnyId').val() || !$('#cycleParamStatNo').val()) {
                    if (typeof toastr !== 'undefined') toastr.warning('Vui lòng nhập Mã công ty và Khoảng mã');
                    else alert('Vui lòng nhập Mã công ty và Khoảng mã');
                    return;
                }

                var formData = {
                    paramNo: $('#cycleParamParamNo').val() || null,
                    cpnyId: $('#cycleParamCpnyId').val(),
                    statNo: $('#cycleParamStatNo').val(),
                    startDate: $('#cycleParamStartDate').val() || null,
                    endDate: $('#cycleParamEndDate').val() || null,
                    orderno: $('#cycleParamOrderno').val() || null,
                    activity: $('#cycleParamActivity').val() || 0
                };

                $.ajax({
                    url: '/ar/attendanceSettings/api/cycleParameter/save',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(formData),
                    success: function (res) {
                        if (typeof toastr !== 'undefined') toastr.success(res.message || 'Lưu thành công');
                        else alert(res.message || 'Lưu thành công');
                        var modalEl = document.getElementById('cycleParamModal');
                        if (modalEl) {
                            var modal = bootstrap.Modal.getInstance(modalEl);
                            if (modal) {
                                modal.hide();
                            } else {
                                $(modalEl).modal('hide');
                            }
                        }
                        table.ajax.reload();
                    },
                    error: function (err) {
                        var errorMsg = (err.responseJSON && err.responseJSON.error) ? err.responseJSON.error : (err.responseText || "Lỗi không xác định");
                        if (typeof toastr !== 'undefined') toastr.error('Lỗi khi lưu: ' + errorMsg);
                        else alert('Lỗi khi lưu: ' + errorMsg);
                    }
                });
            };

            // Xóa
            window.cycleParamDeleteRaw = function (id) {
                if (confirm('Bạn có chắc chắn muốn xóa bản ghi này?')) {
                    $.ajax({
                        url: '/ar/attendanceSettings/api/cycleParameter/delete/' + id,
                        type: 'DELETE',
                        success: function (res) {
                            if (typeof toastr !== 'undefined') toastr.success(res.message || 'Xóa thành công');
                            else alert(res.message || 'Xóa thành công');
                            table.ajax.reload();
                        },
                        error: function (err) {
                            var errorMsg = (err.responseJSON && err.responseJSON.error) ? err.responseJSON.error : (err.responseText || "Lỗi không xác định");
                            if (typeof toastr !== 'undefined') toastr.error('Lỗi khi xóa: ' + errorMsg);
                            else alert('Lỗi khi xóa: ' + errorMsg);
                        }
                    });
                }
            };
        });
    </script>
</template>
