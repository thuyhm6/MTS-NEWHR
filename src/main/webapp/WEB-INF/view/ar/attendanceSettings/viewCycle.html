<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <!-- Search Form -->
                    <form id="cycleSearchForm" class="row g-3 mb-4">
                        <div class="col-md-3">
                            <label for="searchCycleStatNo" class="form-label" th:text="#{ar.viewcycle.title.chinhanh}">Chi nhánh</label>
                            <input type="text" class="form-control" id="searchCycleStatNo"
                                th:placeholder="#{ar.viewcycle.placeholder.search}" placeholder="Nhập mã chi nhánh / khoảng mã / tên">
                        </div>

                        <div class="col-md-3 d-flex align-items-end">
                            <button type="button" class="btn btn-primary me-2" onclick="cycleSearchData()">
                                <i class="bx bx-search"></i> <span th:text="#{common.search}">Tìm kiếm</span>
                            </button>
                            <button type="button" class="btn btn-secondary" onclick="cycleClearSearch()">
                                <i class="bx bx-x"></i> <span th:text="#{common.clearFilter}">Xóa lọc</span>
                            </button>
                            <button type="button" class="btn btn-success ms-2" onclick="cycleOpenModal()">
                                <i class="bx bx-plus"></i> <span th:text="#{common.addNew}">Thêm mới</span>
                            </button>
                        </div>
                    </form>

                    <!-- Data Table -->
                    <div class="table-responsive">
                        <table id="cycleTable" class="table table-striped table-bordered table-hover"
                            style="width:100%">
                            <thead class="table-light">
                                <tr>
                                    <th th:text="#{common.stt}">STT</th>
                                    <th th:text="#{ar.viewcycle.title.chinhanh}">Chi nhánh (Mã)</th>
                                    <th th:text="#{common.nameVi}">Tên Việt</th>
                                    <th th:text="#{common.nameEn}">Tên Anh</th>
                                    <th th:text="#{common.nameZh}">Tên Trung</th>
                                    <th th:text="#{common.nameKo}">Tên Hàn</th>
                                    <th th:text="#{ar.viewcycle.title.kaishiri}">Ngày bắt đầu</th>
                                    <th th:text="#{ar.viewcycle.title.jieshuri}">Ngày kết thúc</th>
                                    <th th:text="#{ar.viewcycle.title.tungay}">Từ ngày</th>
                                    <th th:text="#{ar.viewcycle.title.denngay}">Đến ngày</th>
                                    <th th:text="#{ar.viewcycle.title.beginMonthOffset}">Bắt đầu lệch tháng</th>
                                    <th th:text="#{ar.viewcycle.title.endMonthOffset}">Kết thúc lệch tháng</th>
                                    <th th:text="#{common.orderno}">Sắp xếp</th>
                                    <th th:text="#{common.activity}">Trạng thái</th>
                                    <th class="text-center" style="width: 100px;" th:text="#{common.action}">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data loaded via AJAX -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Thêm/Sửa -->
<div class="modal fade" id="cycleModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="cycleModalTitle" th:text="#{ar.viewcycle.title.chinhanh}">Chi nhánh (Khoảng mã)</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="cycleForm">
                    <input type="hidden" id="cycleStatNo" name="statNo">

                    <h6 class="mb-3 text-primary border-bottom pb-2" th:text="#{common.multiLangInfo}">Thông tin Đa Ngôn Ngữ</h6>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label for="cycleNameVi" class="form-label" th:text="#{common.nameVi}">Tên Tiếng Việt <span
                                    class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="cycleNameVi" name="nameVi" required>
                        </div>
                        <div class="col-md-6">
                            <label for="cycleNameEn" class="form-label" th:text="#{common.nameEn}">Tên Tiếng Anh</label>
                            <input type="text" class="form-control" id="cycleNameEn" name="nameEn">
                        </div>
                        <div class="col-md-6">
                            <label for="cycleNameZh" class="form-label" th:text="#{common.nameZh}">Tên Tiếng Trung</label>
                            <input type="text" class="form-control" id="cycleNameZh" name="nameZh">
                        </div>
                        <div class="col-md-6">
                            <label for="cycleNameKo" class="form-label" th:text="#{common.nameKo}">Tên Tiếng Hàn</label>
                            <input type="text" class="form-control" id="cycleNameKo" name="nameKo">
                        </div>
                    </div>

                    <h6 class="mb-3 text-primary border-bottom pb-2" th:text="#{ar.viewcycle.title.dateRange}">Thông số Khoảng Ngày</h6>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="cycleStartDay" class="form-label" th:text="#{ar.viewcycle.title.kaishiri}">Ngày bắt đầu</label>
                            <input type="number" class="form-control" id="cycleStartDay" name="startDay">
                        </div>
                        <div class="col-md-6">
                            <label for="cycleEndDay" class="form-label" th:text="#{ar.viewcycle.title.jieshuri}">Ngày kết thúc</label>
                            <input type="number" class="form-control" id="cycleEndDay" name="endDay">
                        </div>
                        <div class="col-md-6">
                            <label for="cycleValidDateFrom" class="form-label" th:text="#{ar.viewcycle.title.tungay}">Từ ngày</label>
                            <input type="text" class="form-control" id="cycleValidDateFrom" name="validDateFrom"
                                placeholder="YYYY-MM-DD">
                        </div>
                        <div class="col-md-6">
                            <label for="cycleValidDateTo" class="form-label" th:text="#{ar.viewcycle.title.denngay}">Đến ngày</label>
                            <input type="text" class="form-control" id="cycleValidDateTo" name="validDateTo"
                                placeholder="YYYY-MM-DD">
                        </div>
                        <div class="col-md-6">
                            <label for="cycleBeginMonthOffset" class="form-label" th:text="#{ar.viewcycle.title.beginMonthOffset}">Bắt đầu chênh lệch tháng</label>
                            <input type="number" class="form-control" id="cycleBeginMonthOffset" name="beginMonthOffset"
                                value="0">
                        </div>
                        <div class="col-md-6">
                            <label for="cycleEndMonthOffset" class="form-label" th:text="#{ar.viewcycle.title.endMonthOffset}">Kết thúc chênh lệch tháng</label>
                            <input type="number" class="form-control" id="cycleEndMonthOffset" name="endMonthOffset"
                                value="0">
                        </div>
                        <div class="col-md-6">
                            <label for="cycleOrderno" class="form-label" th:text="#{common.orderno}">Sắp xếp</label>
                            <input type="number" class="form-control" id="cycleOrderno" name="orderno">
                        </div>
                        <div class="col-md-6">
                            <label for="cycleActivity" class="form-label" th:text="#{common.activity}">Trạng thái (1: Hoạt động, 0: Ngừng)</label>
                            <input type="number" class="form-control" id="cycleActivity" name="activity" min="0" max="1"
                                value="1">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" th:text="#{common.close}">Đóng</button>
                <button type="button" class="btn btn-primary" onclick="cycleSaveData()" th:text="#{common.save}">Lưu</button>
            </div>
        </div>
    </div>
</div>

<template id="fragmentScripts">
    <script th:inline="javascript">
        $(document).ready(function () {
            var table = $('#cycleTable').DataTable({
                destroy: true,
                scrollY: "calc(100vh - 280px)",
                scrollCollapse: true,
                paging: true,
                searching: true,
                lengthChange: true,
                pageLength: 20,
                columnDefs: [
                    { "width": "2%", "targets": 0 },
                ],
                processing: true,

                dom: 'Blfrtip',
                buttons: [
                    'copy', 'csv', 'excel', 'pdf', 'print'
                ],
                ajax: {
                    url: '/ar/attendanceSettings/api/cycle',
                    dataSrc: '',
                    data: function (d) {
                        d.statNo = $('#searchCycleStatNo').val();
                    }
                },
                columns: [
                    {
                        data: null,
                        render: function (data, type, row, meta) {
                            return meta.row + 1;
                        }
                    },
                    { data: 'statNo' },
                    { data: 'nameVi' },
                    { data: 'nameEn' },
                    { data: 'nameZh' },
                    { data: 'nameKo' },
                    { data: 'startDay' },
                    { data: 'endDay' },
                    { data: 'validDateFrom' },
                    { data: 'validDateTo' },
                    { data: 'beginMonthOffset' },
                    { data: 'endMonthOffset' },
                    { data: 'orderno' },
                    {
                        data: 'activity',
                        render: function (data) {
                            return data == 1 ? '<span class="badge bg-success">Hoạt động</span>' : '<span class="badge bg-secondary">Ngừng</span>';
                        }
                    },
                    {
                        data: null,
                        className: "text-center",
                        render: function (data, type, row) {
                            return `
                                <div class="btn-group btn-group-sm">
                                    <button class="btn btn-warning" onclick="cycleEditRaw('${row.statNo}')">
                                        <i class="bx bx-edit"></i>
                                    </button>
                                    <button class="btn btn-danger" onclick="cycleDeleteRaw('${row.statNo}')">
                                        <i class="bx bx-trash"></i>
                                    </button>
                                </div>
                            `;
                        }
                    }
                ]
            });

            window.cycleSearchData = function () {
                table.ajax.reload();
            };

            window.cycleClearSearch = function () {
                $('#cycleSearchForm')[0].reset();
                table.ajax.reload();
            };

            // Mở modal thêm mới
            window.cycleOpenModal = function () {
                $('#cycleModalTitle').text('Thêm mới Chi nhánh');
                $('#cycleForm')[0].reset();
                $('#cycleStatNo').val('');
                $('#cycleActivity').val('1'); // Mặc định hoạt động
                $('#cycleBeginMonthOffset').val('0');
                $('#cycleEndMonthOffset').val('0');
                var modal = new bootstrap.Modal(document.getElementById('cycleModal'));
                modal.show();
            };

            // Sửa
            window.cycleEditRaw = function (id) {
                $.ajax({
                    url: '/ar/attendanceSettings/api/cycle/' + id,
                    type: 'GET',
                    success: function (data) {
                        $('#cycleModalTitle').text('Cập nhật Chi nhánh');
                        $('#cycleStatNo').val(data.statNo);
                        $('#cycleNameVi').val(data.nameVi);
                        $('#cycleNameEn').val(data.nameEn);
                        $('#cycleNameZh').val(data.nameZh);
                        $('#cycleNameKo').val(data.nameKo);

                        $('#cycleStartDay').val(data.startDay);
                        $('#cycleEndDay').val(data.endDay);
                        $('#cycleBeginMonthOffset').val(data.beginMonthOffset != null ? data.beginMonthOffset : 0);
                        $('#cycleEndMonthOffset').val(data.endMonthOffset != null ? data.endMonthOffset : 0);

                        // Parse date nếu có
                        if (data.validDateFrom) {
                            var sd = data.validDateFrom;
                            if (sd.includes('T')) sd = sd.split('T')[0];
                            $('#cycleValidDateFrom').val(sd);
                        }
                        if (data.validDateTo) {
                            var ed = data.validDateTo;
                            if (ed.includes('T')) ed = ed.split('T')[0];
                            $('#cycleValidDateTo').val(ed);
                        }

                        $('#cycleOrderno').val(data.orderno);
                        $('#cycleActivity').val(data.activity);

                        var modal = new bootstrap.Modal(document.getElementById('cycleModal'));
                        modal.show();
                    },
                    error: function (err) {
                        if (typeof toastr !== 'undefined') toastr.error('Lỗi khi lấy thông tin: ' + (err.responseJSON ? err.responseJSON.error : err.responseText));
                        else alert('Lỗi khi lấy thông tin: ' + (err.responseJSON ? err.responseJSON.error : err.responseText));
                    }
                });
            };

            // Lưu dữ liệu
            window.cycleSaveData = function () {
                // Validate cơ bản
                if (!$('#cycleNameVi').val()) {
                    if (typeof toastr !== 'undefined') toastr.warning('Vui lòng nhập Tên tiếng Việt');
                    else alert('Vui lòng nhập Tên tiếng Việt');
                    return;
                }

                var formData = {
                    statNo: $('#cycleStatNo').val() || null,
                    nameVi: $('#cycleNameVi').val(),
                    nameEn: $('#cycleNameEn').val(),
                    nameZh: $('#cycleNameZh').val(),
                    nameKo: $('#cycleNameKo').val(),
                    startDay: $('#cycleStartDay').val() || null,
                    endDay: $('#cycleEndDay').val() || null,
                    beginMonthOffset: $('#cycleBeginMonthOffset').val() || null,
                    endMonthOffset: $('#cycleEndMonthOffset').val() || null,
                    validDateFrom: $('#cycleValidDateFrom').val() || null,
                    validDateTo: $('#cycleValidDateTo').val() || null,
                    orderno: $('#cycleOrderno').val() || null,
                    activity: $('#cycleActivity').val() || 0
                };

                $.ajax({
                    url: '/ar/attendanceSettings/api/cycle/save',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(formData),
                    success: function (res) {
                        if (typeof toastr !== 'undefined') toastr.success(res.message || 'Lưu thành công');
                        else alert(res.message || 'Lưu thành công');
                        var modalEl = document.getElementById('cycleModal');
                        if (modalEl) {
                            var modal = bootstrap.Modal.getInstance(modalEl);
                            if (modal) {
                                modal.hide();
                            } else {
                                $(modalEl).modal('hide');
                            }
                        }
                        table.ajax.reload();
                    },
                    error: function (err) {
                        var errorMsg = (err.responseJSON && err.responseJSON.error) ? err.responseJSON.error : (err.responseText || "Lỗi không xác định");
                        if (typeof toastr !== 'undefined') toastr.error('Lỗi khi lưu: ' + errorMsg);
                        else alert('Lỗi khi lưu: ' + errorMsg);
                    }
                });
            };

            // Xóa
            window.cycleDeleteRaw = function (id) {
                if (confirm('Bạn có chắc chắn muốn xóa bản ghi này? Tất cả thông tin đa ngôn ngữ cũng sẽ bị xóa.')) {
                    $.ajax({
                        url: '/ar/attendanceSettings/api/cycle/delete/' + id,
                        type: 'DELETE',
                        success: function (res) {
                            if (typeof toastr !== 'undefined') toastr.success(res.message || 'Xóa thành công');
                            else alert(res.message || 'Xóa thành công');
                            table.ajax.reload();
                        },
                        error: function (err) {
                            var errorMsg = (err.responseJSON && err.responseJSON.error) ? err.responseJSON.error : (err.responseText || "Lỗi không xác định");
                            if (typeof toastr !== 'undefined') toastr.error('Lỗi khi xóa: ' + errorMsg);
                            else alert('Lỗi khi xóa: ' + errorMsg);
                        }
                    });
                }
            };
        });
    </script>
</template>
