<div th:fragment="content">
    <div class="row h-100">
        <!-- Left Pane: Shift Parent Tree (AR_SHIFT010) -->
        <div class="col-md-2 border-end p-3 bg-white mb-3">
            <h5 class="mb-3" th:text="#{ar.viewshift.title.shiftlist}">Danh sách Ca làm việc (Shift)</h5>
            <div class="d-flex mb-2">
                <input type="text" class="form-control me-2" id="arShift_searchTreeInput" th:placeholder="#{ar.viewshift.placeholder.search}" placeholder="Tìm kiếm ca...">
                <div class="btn-group">
                    <button class="btn btn-sm btn-success" onclick="arShiftOpenModal()" th:title="#{ar.viewshift.title.addshift}" title="Thêm mới ca làm việc"><i
                            class="bx bx-plus"></i></button>
                    <button class="btn btn-sm btn-warning" onclick="arShiftEditSelected()" th:title="#{ar.viewshift.title.editshift}" title="Sửa ca đăng chọn"><i
                            class="bx bx-edit"></i></button>
                    <button class="btn btn-sm btn-danger" onclick="arShiftDeleteSelected()" th:title="#{ar.viewshift.title.deleteshift}" title="Xóa ca đang chọn"><i
                            class="bx bx-trash"></i></button>
                </div>
            </div>

            <div class="tree-container" style="max-height: 700px; overflow-y: auto;">
                <div id="arShift_tree"></div>
            </div>
        </div>

        <!-- Right Pane: Shift Details Table (AR_SHIFT020) -->
        <div class="col-md-10 p-3 bg-white mb-3">
            <div class="card h-100 border-0">
                <div class="card-header bg-light d-flex justify-content-between align-items-center">
                    <span class="fw-bold" id="arShiftDetail_selectedParentLabel" th:text="#{ar.viewshift.title.bancicanshu}">Tham số ca làm việc</span>
                    <div>
                        <button class="btn btn-sm btn-success" onclick="arShiftDetailOpenModal()"><i
                                class="bx bx-plus"></i> <span th:text="#{ar.viewshift.title.adddetail}">Thêm chi tiết</span></button>
                    </div>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table id="arShiftDetailTable"
                            class="table table-striped table-bordered table-hover w-100 display nowrap">
                            <thead class="table-light">
                                <tr>
                                    <th th:text="#{common.stt}">STT</th>
                                    <th>PK No</th>
                                    <th th:text="#{ar.viewshift.title.hangmuc}">Hạng mục (Item)</th>
                                    <th th:text="#{ar.viewshift.title.beginoffset}">Độ lệch ngày b/đầu</th>
                                    <th th:text="#{ar.viewshift.title.start}">Giờ bắt đầu</th>
                                    <th th:text="#{ar.viewshift.title.endoffset}">Độ lệch ngày k/thúc</th>
                                    <th th:text="#{ar.viewshift.title.end}">Giờ kết thúc</th>
                                    <th th:text="#{common.orderno}">Sắp xếp</th>
                                    <th th:text="#{common.activity}">Trạng thái</th>
                                    <th th:text="#{common.action}">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data loaded via AJAX -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Ca làm việc (AR_SHIFT010) -->
    <div class="modal fade" id="arShiftModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="arShiftModalTitle" th:text="#{ar.viewshift.title.setupshift}">Thiết lập Ca làm việc (Shift)</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="arShiftForm">
                        <input type="hidden" id="shiftShiftNo" name="shiftNo">

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label" th:text="#{ar.viewshift.title.banciID}">Mã nhóm (Shift ID)</label>
                                <input type="text" class="form-control" id="shiftShiftId" name="shiftId">
                            </div>

                            <div class="col-md-6"><label class="form-label" th:text="#{common.nameVi}">Tên Tiếng Việt <span
                                        class="text-danger">*</span></label><input type="text" class="form-control"
                                    id="shiftNameVi" required></div>
                            <div class="col-md-6"><label class="form-label" th:text="#{common.nameEn}">Tên Tiếng Anh <span
                                        class="text-danger">*</span></label><input type="text" class="form-control"
                                    id="shiftNameEn" required></div>
                            <div class="col-md-6"><label class="form-label" th:text="#{common.nameZh}">Tên Tiếng Trung <span
                                        class="text-danger">*</span></label><input type="text" class="form-control"
                                    id="shiftNameZh" required></div>
                            <div class="col-md-6"><label class="form-label" th:text="#{common.nameKo}">Tên Tiếng Hàn <span
                                        class="text-danger">*</span></label><input type="text" class="form-control"
                                    id="shiftNameKo" required></div>

                            <div class="col-md-4">
                                <label class="form-label" th:text="#{ar.viewshift.title.shortname}">Tên rút gọn (Shortname)</label>
                                <input type="text" class="form-control" id="shiftShiftShortname">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label" th:text="#{ar.viewshift.title.datatype}">Kiểu dữ liệu (Datatype)</label>
                                <input type="number" class="form-control" id="shiftDatatype">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label" th:text="#{ar.viewshift.title.deptdistinguish}">Phân chia phòng ban</label>
                                <input type="text" class="form-control" id="shiftDeptDistinguishNo">
                            </div>

                            <div class="col-md-4">
                                <label class="form-label" th:text="#{ar.viewshift.title.kouchushijian}">Thời gian khấu trừ</label>
                                <input type="number" step="any" class="form-control" id="shiftDeductTime">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label" th:text="#{ar.viewshift.title.ottimestart}">Giờ bắt đầu OT</label>
                                <input type="text" class="form-control" id="shiftOtTimeStart" placeholder="HH:mm">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label" th:text="#{ar.viewshift.title.otallowance}">Phụ cấp OT</label>
                                <input type="number" step="any" class="form-control" id="shiftOtAllowance">
                            </div>

                            <div class="col-md-4">
                                <label class="form-label" th:text="#{ar.viewshift.title.shiftlength}">Độ dài ca (Shift length)</label>
                                <input type="number" step="any" class="form-control" id="shiftShiftLength">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label" th:text="#{common.orderno}">Sắp xếp</label>
                                <input type="number" class="form-control" id="shiftOrderno" value="0">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label" th:text="#{common.activity}">Trạng thái (Activity)</label>
                                <select class="form-select" id="shiftActivity">
                                    <option value="1" th:text="#{common.active}">Hoạt động</option>
                                    <option value="0" th:text="#{common.inactive}">Ngừng</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" th:text="#{common.close}">Đóng</button>
                    <button type="button" class="btn btn-primary" onclick="arShiftSaveData()" th:text="#{common.save}">Lưu</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Chi tiết ca (AR_SHIFT020) -->
    <div class="modal fade" id="arShiftDetailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="arShiftDetailModalTitle" th:text="#{ar.viewshift.title.shiftdetailtitle}">Chi tiết tham số ca làm việc</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="arShiftDetailForm">
                        <input type="hidden" id="detailPkNo">
                        <input type="hidden" id="detailShiftNo">

                        <div class="row g-3">
                            <div class="col-md-12">
                                <label class="form-label" th:text="#{ar.viewshift.title.hangmuc}">Hạng mục (Item) <span class="text-danger">*</span></label>
                                <select class="form-select" id="detailItemNo" required>
                                    <option value="" th:text="#{ar.viewshift.title.selecthangmuc}">-- Chọn hạng mục --</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label" th:text="#{ar.viewshift.title.beginoffset}">Độ lệch ngày bắt đầu</label>
                                <input type="number" class="form-control" id="detailBeginDayOffset" value="0">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" th:text="#{ar.viewshift.title.start}">Giờ bắt đầu</label>
                                <input type="time" class="form-control" id="detailFromTimeStr">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label" th:text="#{ar.viewshift.title.endoffset}">Độ lệch ngày kết thúc</label>
                                <input type="number" class="form-control" id="detailEndDayOffset" value="0">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" th:text="#{ar.viewshift.title.end}">Giờ kết thúc</label>
                                <input type="time" class="form-control" id="detailToTimeStr">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label" th:text="#{common.orderno}">Sắp xếp</label>
                                <input type="number" class="form-control" id="detailOrderno" value="0">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" th:text="#{common.activity}">Trạng thái (Activity)</label>
                                <select class="form-select" id="detailActivity">
                                    <option value="1" th:text="#{common.active}">Hoạt động</option>
                                    <option value="0" th:text="#{common.inactive}">Ngừng</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" th:text="#{common.close}">Đóng</button>
                    <button type="button" class="btn btn-primary" onclick="arShiftDetailSaveData()" th:text="#{ar.viewshift.title.savedetail}">Lưu chi
                        tiết</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <template id="fragmentScripts">
        <link rel="stylesheet" href="/assets/plugins/jstree/style.min.css" />
        <script src="/assets/plugins/jstree/jstree.min.js"></script>

        <script th:inline="javascript">
            $(document).ready(function () {
                var currentShiftNo = '';

                // 1. Tải chung (Company + Item dropdowns)
                function loadCommons() {
                    // ITEM FOR DETAIL Modal
                    $.ajax({
                        url: '/ar/attendanceSettings/api/arItem',
                        success: function (data) {
                            var itemSelect = $('#detailItemNo');
                            data.forEach(item => {
                                var txt = item.nameVi || item.shortName || item.itemNo;
                                itemSelect.append(new Option(txt, item.itemNo));
                            });
                        }
                    });
                }
                loadCommons();

                // 2. Tree (AR_SHIFT010)
                function loadShiftTree() {
                    $.ajax({
                        url: '/ar/attendanceSettings/api/shift',
                        success: function (data) {
                            if (!data || data.length === 0) {
                                $('#arShift_tree').html('<div class="text-muted p-2">Không có dữ liệu</div>');
                                currentShiftNo = '';
                                table.clear().draw();
                                return;
                            }

                            // Chỉ lấy activity=1 (Lọc có thể áp dụng tại đây hoặc lấy tất cả tùy yêu cầu, theo prompt là ACTIVITY = 1)
                            var treeData = data.filter(s => s.activity == 1).map(s => {
                                return {
                                    id: s.shiftNo,
                                    parent: '#',
                                    text: (s.nameVi || s.shiftShortname || s.shiftNo),
                                    icon: 'bx bx-time',
                                    state: { opened: false }
                                };
                            });

                            $('#arShift_tree').jstree("destroy").jstree({
                                'core': {
                                    'data': treeData,
                                    'themes': { 'name': 'default', 'responsive': true, 'dots': false },
                                    'multiple': false,
                                    'check_callback': true
                                },
                                'plugins': ['search', 'types']
                            });

                            // Reset selection
                            currentShiftNo = '';
                            table.clear().draw();
                        }
                    });
                }
                loadShiftTree();

                var to = false;
                $('#arShift_searchTreeInput').keyup(function () {
                    if (to) clearTimeout(to);
                    to = setTimeout(function () {
                        var v = $('#arShift_searchTreeInput').val();
                        $('#arShift_tree').jstree(true).search(v);
                    }, 250);
                });

                $('#arShift_tree').on("changed.jstree", function (e, data) {
                    if (data.selected.length) {
                        currentShiftNo = data.selected[0];
                        $('#arShiftDetail_selectedParentLabel').text('Tham số ca làm việc: ' + data.instance.get_node(data.selected[0]).text);
                        table.ajax.reload();
                    } else {
                        currentShiftNo = '';
                        $('#arShiftDetail_selectedParentLabel').text('Tham số ca làm việc');
                        table.clear().draw();
                    }
                });

                // 3. DataTable (AR_SHIFT020)
                var table = $('#arShiftDetailTable').DataTable({
                    destroy: true,
                    scrollY: "calc(100vh - 280px)",
                    scrollX: true,
                    select: 'single',
                    scrollCollapse: true,
                    paging: true,
                    searching: true,
                    lengthChange: true,
                    pageLength: 20,

                    ajax: {
                        url: '/ar/attendanceSettings/api/shiftDetail',
                        dataSrc: '',
                        data: function (d) {
                            d.shiftNo = currentShiftNo;
                        }
                    },
                    columns: [
                        { data: null, render: (d, t, r, m) => m.row + 1 },
                        { data: 'pkNo' },
                        { data: 'itemName' },
                        { data: 'beginDayOffset' },
                        { data: 'fromTimeStr' },
                        { data: 'endDayOffset' },
                        { data: 'toTimeStr' },
                        { data: 'orderno' },
                        { data: 'activity', render: d => d == 1 ? '<span class="badge bg-success">Hoạt động</span>' : '<span class="badge bg-secondary">Ngừng</span>' },
                        {
                            data: null, className: "text-center", render: function (data) {
                                return `
                                    <div class="btn-group btn-group-sm">
                                        <button class="btn btn-warning" onclick="arShiftDetailEdit('${data.pkNo}')"><i class="bx bx-edit"></i></button>
                                        <button class="btn btn-danger" onclick="arShiftDetailDelete('${data.pkNo}')"><i class="bx bx-trash"></i></button>
                                    </div>
                                `;
                            }
                        }
                    ]
                });

                // ==================== AR_SHIFT010 CRUD ====================
                window.arShiftOpenModal = function () {
                    $('#arShiftModalTitle').text('Thêm mới Ca làm việc (Shift)');
                    $('#arShiftForm')[0].reset();
                    $('#shiftShiftNo').val('');

                    new bootstrap.Modal(document.getElementById('arShiftModal')).show();
                };

                window.arShiftEditSelected = function () {
                    if (!currentShiftNo) {
                        toastr.warning('Vui lòng chọn 1 ca trên cây để sửa.');
                        return;
                    }
                    $.ajax({
                        url: '/ar/attendanceSettings/api/shift/' + currentShiftNo,
                        success: function (data) {
                            $('#arShiftModalTitle').text('Sửa Ca làm việc: ' + (data.nameVi || data.shiftNo));
                            $('#shiftShiftNo').val(data.shiftNo);
                            $('#shiftShiftId').val(data.shiftId);
                            $('#shiftNameVi').val(data.nameVi);
                            $('#shiftNameEn').val(data.nameEn);
                            $('#shiftNameZh').val(data.nameZh);
                            $('#shiftNameKo').val(data.nameKo);
                            $('#shiftShiftShortname').val(data.shiftShortname);
                            $('#shiftDatatype').val(data.datatype);
                            $('#shiftDeptDistinguishNo').val(data.deptDistinguishNo);
                            $('#shiftDeductTime').val(data.deductTime);
                            $('#shiftOtTimeStart').val(data.otTimeStart);
                            $('#shiftOtAllowance').val(data.otAllowance);
                            $('#shiftShiftLength').val(data.shiftLength);
                            $('#shiftOrderno').val(data.orderno);
                            $('#shiftActivity').val(data.activity);

                            new bootstrap.Modal(document.getElementById('arShiftModal')).show();
                        }
                    });
                };

                window.arShiftSaveData = function () {
                    // Validations
                    if (!$('#shiftNameVi').val() || !$('#shiftNameEn').val() || !$('#shiftNameZh').val() || !$('#shiftNameKo').val()) {
                        toastr.warning("Vui lòng nhập đầy đủ các thông tin bắt buộc (4 Tên)");
                        return;
                    }

                    var payload = {
                        shiftNo: $('#shiftShiftNo').val(),
                        shiftId: $('#shiftShiftId').val(),
                        nameVi: $('#shiftNameVi').val(),
                        nameEn: $('#shiftNameEn').val(),
                        nameZh: $('#shiftNameZh').val(),
                        nameKo: $('#shiftNameKo').val(),
                        shiftShortname: $('#shiftShiftShortname').val(),
                        datatype: $('#shiftDatatype').val() || null,
                        deptDistinguishNo: $('#shiftDeptDistinguishNo').val() || null,
                        deductTime: $('#shiftDeductTime').val() || null,
                        otTimeStart: $('#shiftOtTimeStart').val() || null,
                        otAllowance: $('#shiftOtAllowance').val() || null,
                        shiftLength: $('#shiftShiftLength').val() || null,
                        orderno: $('#shiftOrderno').val() || 0,
                        activity: $('#shiftActivity').val() || 1
                    };

                    $.ajax({
                        url: '/ar/attendanceSettings/api/shift/save',
                        type: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify(payload),
                        success: function (res) {
                            toastr.success(res.message);
                            var m = bootstrap.Modal.getInstance(document.getElementById('arShiftModal'));
                            if (m) m.hide();
                            loadShiftTree(); // reload tree
                        },
                        error: function (err) {
                            toastr.error("Lỗi khi lưu!");
                        }
                    });
                };

                window.arShiftDeleteSelected = function () {
                    if (!currentShiftNo) {
                        toastr.warning('Vui lòng chọn 1 ca trên cây để xóa.');
                        return;
                    }
                    if (confirm('Chắc chắn muốn xóa ca này và toàn bộ dữ liệu chi tiết của nó?')) {
                        $.ajax({
                            url: '/ar/attendanceSettings/api/shift/delete/' + currentShiftNo,
                            type: 'DELETE',
                            success: function (res) {
                                toastr.success(res.message);
                                currentShiftNo = '';
                                loadShiftTree();
                            },
                            error: function () {
                                toastr.error("Xóa thất bại!");
                            }
                        });
                    }
                };

                // ==================== AR_SHIFT020 CRUD ====================
                window.arShiftDetailOpenModal = function () {
                    if (!currentShiftNo) {
                        toastr.warning("Vui lòng chọn 1 ca trên danh sách bên trái trước.");
                        return;
                    }
                    $('#arShiftDetailModalTitle').text('Thêm mới Chi tiết');
                    $('#arShiftDetailForm')[0].reset();
                    $('#detailShiftNo').val(currentShiftNo);
                    $('#detailPkNo').val('');
                    new bootstrap.Modal(document.getElementById('arShiftDetailModal')).show();
                };

                window.arShiftDetailEdit = function (pkNo) {
                    $.ajax({
                        url: '/ar/attendanceSettings/api/shiftDetail/' + pkNo,
                        success: function (data) {
                            $('#arShiftDetailModalTitle').text('Cập nhật Chi tiết');
                            $('#detailPkNo').val(data.pkNo);
                            $('#detailShiftNo').val(data.shiftNo);
                            $('#detailItemNo').val(data.itemNo);
                            $('#detailBeginDayOffset').val(data.beginDayOffset);
                            $('#detailFromTimeStr').val(data.fromTimeStr);
                            $('#detailEndDayOffset').val(data.endDayOffset);
                            $('#detailToTimeStr').val(data.toTimeStr);
                            $('#detailOrderno').val(data.orderno);
                            $('#detailActivity').val(data.activity);

                            new bootstrap.Modal(document.getElementById('arShiftDetailModal')).show();
                        }
                    });
                };

                window.arShiftDetailSaveData = function () {
                    if (!$('#detailItemNo').val()) {
                        toastr.warning("Vui lòng chọn Hạng mục (Item).");
                        return;
                    }
                    var payload = {
                        pkNo: $('#detailPkNo').val() || null,
                        shiftNo: $('#detailShiftNo').val(),
                        itemNo: $('#detailItemNo').val(),
                        beginDayOffset: $('#detailBeginDayOffset').val() || 0,
                        fromTimeStr: $('#detailFromTimeStr').val(),
                        endDayOffset: $('#detailEndDayOffset').val() || 0,
                        toTimeStr: $('#detailToTimeStr').val(),
                        orderno: $('#detailOrderno').val() || 0,
                        activity: $('#detailActivity').val() || 1
                    };

                    $.ajax({
                        url: '/ar/attendanceSettings/api/shiftDetail/save',
                        type: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify(payload),
                        success: function (res) {
                            toastr.success(res.message);
                            var m = bootstrap.Modal.getInstance(document.getElementById('arShiftDetailModal'));
                            if (m) m.hide();
                            table.ajax.reload();
                        },
                        error: function () {
                            toastr.error("Lỗi lưu chi tiết!");
                        }
                    });
                };

                window.arShiftDetailDelete = function (pkNo) {
                    if (confirm('Chắc chắn muốn xóa tham số này?')) {
                        $.ajax({
                            url: '/ar/attendanceSettings/api/shiftDetail/delete/' + pkNo,
                            type: 'DELETE',
                            success: function (res) {
                                toastr.success(res.message);
                                table.ajax.reload();
                            },
                            error: function () {
                                toastr.error("Xóa thất bại!");
                            }
                        });
                    }
                };

                // Fix modal overflow issues
                $('.modal').on('shown.bs.modal', function () {
                    $(this).find('.modal-content').css({ 'max-height': '95vh', 'overflow-y': 'auto' });
                });
            });
        </script>
    </template>
</div>
