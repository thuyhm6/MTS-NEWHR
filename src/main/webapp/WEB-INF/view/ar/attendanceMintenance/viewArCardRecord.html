<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <form id="acr_searchForm" class="row g-3 mb-3">
                        <div class="col-md-3">
                            <label for="acr_keyword" class="form-label" th:text="#{common.search.empIdOrName}">Mã nhân viên / Họ tên</label>
                            <input type="text" class="form-control" id="acr_keyword"
                                   th:placeholder="#{common.placeholder.enterEmpId}" placeholder="Nhập mã hoặc họ tên">
                        </div>
                        <div class="col-md-2">
                            <label for="acr_fromDate" class="form-label" th:text="#{common.fromDate}">Từ ngày</label>
                            <input type="text" class="form-control js-daterangepicker" id="acr_fromDate"
                                   data-drp-format="YYYY-MM-DD" autocomplete="off">
                        </div>
                        <div class="col-md-2">
                            <label for="acr_toDate" class="form-label" th:text="#{common.toDate}">Đến ngày</label>
                            <input type="text" class="form-control js-daterangepicker" id="acr_toDate"
                                   data-drp-format="YYYY-MM-DD" autocomplete="off">
                        </div>
                        <div class="col-md-3">
                            <label for="acr_deptNo" class="form-label" th:text="#{common.deptName}">Phòng ban</label>
                            <input type="text" class="form-control" id="acr_deptNo"
                                   th:placeholder="#{common.select}" placeholder="Chọn phòng ban" readonly>
                        </div>
                        <div class="col-md-2">
                            <label for="acr_shiftNo" class="form-label" th:text="#{attSearch.shiftType}">Ca làm việc</label>
                            <select class="form-select" id="acr_shiftNo">
                                <option value="" th:text="#{attSearch.all}">-- Tất cả --</option>
                            </select>
                        </div>
                        <div class="col-12 d-flex gap-2 flex-wrap justify-content-end">
                            <button type="button" class="btn btn-primary" onclick="acrSearchData()">
                                <i class="bx bx-search"></i> <span th:text="#{common.search}">Tra cứu</span>
                            </button>
                            <button type="button" class="btn btn-secondary" onclick="acrClearSearch()">
                                <i class="bx bx-x"></i> <span th:text="#{common.clearFilter}">Xóa lọc</span>
                            </button>
                            <button type="button" class="btn btn-success" onclick="acrExportExcel()">
                                <i class="bx bx-export"></i> <span th:text="#{common.exportExcel}">Xuất Excel</span>
                            </button>
                            <button type="button" class="btn btn-info text-white" th:if="${sysMode == 'hrm'}" onclick="acrOpenAddModal()">
                                <i class="bx bx-plus"></i> <span th:text="#{acr.btn.addRecord}">Thêm bản ghi</span>
                            </button>
                            <button type="button" class="btn btn-danger" th:if="${sysMode == 'hrm'}" onclick="acrDeleteSelected()">
                                <i class="bx bx-trash"></i> <span th:text="#{acr.btn.deleteSelected}">Xóa đã chọn</span>
                            </button>
                            <button type="button" class="btn btn-warning text-dark" th:if="${sysMode == 'hrm'}" onclick="acrOpenImportModal()">
                                <i class="bx bx-card"></i> <span th:text="#{acr.btn.importFromDevice}">Đọc dữ liệu quẹt thẻ</span>
                            </button>
                            <button type="button" class="btn btn-info text-white" th:if="${sysMode == 'hrm'}" onclick="acrDownloadTemplate()">
                                <i class="bx bx-download"></i> <span th:text="#{common.downloadTemplate}">Tải File Mẫu</span>
                            </button>
                            <button type="button" class="btn btn-warning" th:if="${sysMode == 'hrm'}" onclick="acrImportTemplate()">
                                <i class="bx bx-upload"></i> <span th:text="#{common.importExcel}">Import Excel</span>
                            </button>
                        </div>
                    </form>

                    <div class="table-responsive">
                        <table id="acr_dataTable" class="table table-striped table-bordered table-hover" style="min-width: 100%;">
                            <thead class="table-light text-center align-middle">
                                <tr>
                                    <th th:text="#{common.stt}">STT</th>
                                    <th><input type="checkbox" id="acr_checkAll" onclick="acrToggleAll(this)"></th>
                                    <th th:text="#{common.empId}">Mã nhân viên</th>
                                    <th th:text="#{common.empName}">Họ tên</th>
                                    <th th:text="#{common.deptName}">Phòng ban</th>
                                    <th th:text="#{common.position}">Chức vụ</th>
                                    <th th:text="#{attSearch.shiftType}">Ca</th>
                                    <th th:text="#{attSearch.workDate}">Ngày công</th>
                                    <th th:text="#{acr.col.swipeTime}">Thời gian quẹt thẻ</th>
                                    <th th:text="#{acr.col.doorType}">Loại</th>
                                    <th th:text="#{acr.col.dataSource}">Nguồn dữ liệu</th>
                                    <th th:text="#{common.action}">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Đọc dữ liệu quẹt thẻ từ máy chủ -->
    <div class="modal fade" id="acr_imp_modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-md">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" th:text="#{acr.imp.title}">Đọc dữ liệu quẹt thẻ từ máy chủ</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="acr_imp_fromDate" class="form-label" th:text="#{common.fromDate}">Từ ngày</label>
                            <input type="text" class="form-control js-daterangepicker" id="acr_imp_fromDate"
                                   data-drp-format="YYYY-MM-DD" autocomplete="off">
                        </div>
                        <div class="col-md-6">
                            <label for="acr_imp_toDate" class="form-label" th:text="#{common.toDate}">Đến ngày</label>
                            <input type="text" class="form-control js-daterangepicker" id="acr_imp_toDate"
                                   data-drp-format="YYYY-MM-DD" autocomplete="off">
                        </div>
                    </div>

                    <!-- Spinner khi đang xử lý -->
                    <div id="acr_imp_spinner" class="text-center mt-3" style="display:none;">
                        <div class="spinner-border text-warning" role="status"></div>
                        <div class="mt-2 text-muted" th:text="#{acr.imp.processing}">Đang kết nối và đọc dữ liệu...</div>
                    </div>

                    <!-- Kết quả sau khi xử lý -->
                    <div id="acr_imp_result" class="mt-3" style="display:none;">
                        <hr>
                        <div id="acr_imp_result_content"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" th:text="#{common.close}">Đóng</button>
                    <button type="button" class="btn btn-warning text-dark" id="acr_imp_btnRun" onclick="acrRunImport()">
                        <i class="bx bx-cloud-download"></i>
                        <span th:text="#{acr.imp.btnRun}">Thực hiện</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Thêm/Sửa -->
    <div class="modal fade" id="acr_modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="acr_modalTitle" th:text="#{acr.modal.addTitle}">Thêm bản ghi quẹt thẻ</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="acr_f_recordNo">
                    <input type="hidden" id="acr_f_personId">
                    <input type="hidden" id="acr_f_empId">
                    <div class="row g-3">
                        <div class="col-md-12">
                            <label for="acr_f_empNameDisplay" class="form-label" th:text="#{acr.col.employee}">Nhân viên <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="acr_f_empNameDisplay"
                                       th:placeholder="#{empSearch.placeholder.empId}" placeholder="Chọn nhân viên..." autocomplete="off">
                                <button class="btn btn-outline-primary" type="button" onclick="openEmployeeSearchPopup()">
                                    <i class="bx bx-search"></i>
                                </button>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="acr_f_arDateStr" class="form-label" th:text="#{attSearch.workDate}">Ngày công <span class="text-danger">*</span></label>
                            <input type="text" class="form-control js-daterangepicker" id="acr_f_arDateStr"
                                   data-drp-format="YYYY/MM/DD" autocomplete="off" placeholder="YYYY/MM/DD">
                        </div>
                        <div class="col-md-6">
                            <label for="acr_f_swipeDateTime" class="form-label" th:text="#{acr.col.swipeTime}">Thời gian quẹt thẻ <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="acr_f_swipeDateTime"
                                   placeholder="YYYY/MM/DD HH:MM" maxlength="16" autocomplete="off">
                        </div>
                        <div class="col-md-6">
                            <label for="acr_f_doorType" class="form-label" th:text="#{acr.col.doorType}">Loại</label>
                            <select class="form-select" id="acr_f_doorType">
                                <option value="">-- Chọn --</option>
                                <option value="IN" th:text="#{acr.doorType.in}">Vào</option>
                                <option value="OUT" th:text="#{acr.doorType.out}">Ra</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="acr_f_remark" class="form-label" th:text="#{acr.col.remark}">Ghi chú</label>
                            <input type="text" class="form-control" id="acr_f_remark">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" th:text="#{common.cancel}">Hủy</button>
                    <button type="button" class="btn btn-primary" onclick="acrSaveRecord()" th:text="#{common.save}">Lưu</button>
                </div>
            </div>
        </div>
    </div>
</div>

<template id="fragmentScripts">
    <script th:inline="javascript">
        var sysMode = /*[[${sysMode}]]*/ 'hrm';
        var _acr_table = null;
        var _acr_pageBooted = false;
        var _acr_selectedDeptCodes = [];
        var _acr_isEdit = false;

        function acrFormatDate(dateObj) {
            var y = dateObj.getFullYear();
            var m = String(dateObj.getMonth() + 1).padStart(2, '0');
            var d = String(dateObj.getDate()).padStart(2, '0');
            return y + '-' + m + '-' + d;
        }

        function acrInitDefaultDateRange() {
            var today = new Date();
            var todayStr = acrFormatDate(today);
            $('#acr_fromDate').val(todayStr);
            $('#acr_toDate').val(todayStr);
            if ($('#acr_fromDate').data('daterangepicker')) {
                $('#acr_fromDate').data('daterangepicker').setStartDate(todayStr);
            }
            if ($('#acr_toDate').data('daterangepicker')) {
                $('#acr_toDate').data('daterangepicker').setStartDate(todayStr);
            }
        }

        function acrLoadShiftOptions() {
            return $.ajax({
                url: '/ar/attendanceSettings/api/shift',
                type: 'GET',
                success: function (data) {
                    var html = '<option value="">-- Tất cả --</option>';
                    (data || []).forEach(function (item) {
                        var code = item.shiftNo || '';
                        var name = item.nameVi || item.shiftName || code;
                        html += '<option value="' + code + '">' + name + '</option>';
                    });
                    $('#acr_shiftNo').html(html);
                }
            });
        }

        function acrInitDeptSelector() {
            if (typeof DeptTree === 'undefined') return;
            DeptTree.init('#acr_deptNo', function (selectedCodes) {
                _acr_selectedDeptCodes = selectedCodes || [];
            });
        }

        function acrInitTable() {
            _acr_table = $('#acr_dataTable').DataTable({
                destroy: true,
                scrollX: true,
                scrollY: 'calc(100vh - 330px)',
                scrollCollapse: true,
                paging: true,
                searching: false,
                lengthChange: true,
                pageLength: 25,
                processing: true,
                serverSide: true,
                dom: 'Blfrtip',
                buttons: [
                    { extend: 'excel', title: 'lich_su_ra_vao' }
                ],
                columnDefs: [
                    { visible: sysMode === 'hrm', targets: [1, 11] }
                ],
                ajax: {
                    url: '/ar/attendanceMintenance/api/cardRecord/list',
                    type: 'GET',
                    data: function (d) {
                        d.keyword  = $('#acr_keyword').val();
                        d.deptNos  = (_acr_selectedDeptCodes || []).join(',');
                        d.fromDate = $('#acr_fromDate').val();
                        d.toDate   = $('#acr_toDate').val();
                        d.shiftNo  = $('#acr_shiftNo').val();
                    }
                },
                initComplete: function () {
                    var $wrapper = $('#acr_dataTable_wrapper');
                    $wrapper.find('.dt-buttons').hide();
                },
                columns: [
                    {
                        data: null,
                        className: 'text-center',
                        orderable: false,
                        render: function (data, type, row, meta) {
                            var pageInfo = _acr_table ? _acr_table.page.info() : { start: 0 };
                            return pageInfo.start + meta.row + 1;
                        }
                    },
                    {
                        data: null,
                        className: 'text-center',
                        orderable: false,
                        render: function (data, type, row) {
                            var src = (row.insertBy || '').toUpperCase();
                            if (src === 'M' || src === 'A') return '';
                            return '<input type="checkbox" class="acr-row-chk" value="' + (row.recordNo || '') + '">';
                        }
                    },
                    { data: 'empId',          className: 'text-center' },
                    { data: 'localName' },
                    { data: 'deptName' },
                    { data: 'postGradeName' },
                    { data: 'shiftName',      className: 'text-center' },
                    { data: 'arDateStr',      className: 'text-center' },
                    { data: 'swipeTime',      className: 'text-center' },
                    { data: 'doorType',       className: 'text-center' },
                    { data: 'dataSourceName', className: 'text-center' },
                    {
                        data: null,
                        className: 'text-center',
                        orderable: false,
                        render: function (data, type, row) {
                            var src = (row.insertBy || '').toUpperCase();
                            var canDelete = src !== 'M' && src !== 'A';
                            var html = '<button class="btn btn-sm btn-warning me-1" onclick="acrOpenEditModal(' + row.recordNo + ')" title="Sửa">'
                                     + '<i class="bx bx-edit"></i></button>';
                            if (canDelete) {
                                html += '<button class="btn btn-sm btn-danger" onclick="acrDeleteOne(' + row.recordNo + ')" title="Xóa">'
                                      + '<i class="bx bx-trash"></i></button>';
                            }
                            return html;
                        }
                    }
                ]
            });
        }

        // Tải file Excel mẫu
        window.acrDownloadTemplate = function () {
            if (sysMode !== 'hrm') return;
            window.location.href = '/sy/excel/api/downloadTemplate?templateName=Card_Template';
        };

        // Mở modal import Excel (dùng shared component ExcelImport)
        window.acrImportTemplate = function () {
            if (sysMode !== 'hrm') return;
            ExcelImport.open('/ar/attendanceMintenance/api/macRecordTemp/uploadExcel', function (res) {
                if (_acr_table) {
                    _acr_table.ajax.reload(null, false);
                }
                if (typeof tabSystem !== 'undefined' && tabSystem && typeof tabSystem.openTab === 'function') {
                    tabSystem.openTab('/ar/attendanceMintenance/viewImportExcelTempMacRecordsList', 'Kết quả nhập');
                } else {
                    window.open('/ar/attendanceMintenance/viewImportExcelTempMacRecordsList', '_blank');
                }
            });
        };

        function acrBootPage() {
            if (_acr_pageBooted) return;
            if (!document.getElementById('acr_dataTable')) {
                setTimeout(acrBootPage, 30);
                return;
            }
            _acr_pageBooted = true;
            acrInitDefaultDateRange();
            acrInitDeptSelector();
            $.when(acrLoadShiftOptions()).always(function () {
                acrInitTable();
                if (_acr_table) _acr_table.ajax.reload();
            });

            // Nhấn Enter trong ô tên nhân viên → mở popup tìm kiếm với từ khóa đã nhập
            $('#acr_f_empNameDisplay').on('keydown', function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    openEmployeeSearchPopup($(this).val());
                }
            });

            // Auto-format YYYY/MM/DD HH:MM khi nhập swipeDateTime
            $('#acr_f_swipeDateTime').on('input', function () {
                var raw = this.value.replace(/[^0-9]/g, '');
                var r = '';
                if (raw.length > 0)  r += raw.substring(0, Math.min(4, raw.length));
                if (raw.length > 4)  r += '/' + raw.substring(4, Math.min(6, raw.length));
                if (raw.length > 6)  r += '/' + raw.substring(6, Math.min(8, raw.length));
                if (raw.length > 8)  r += ' ' + raw.substring(8, Math.min(10, raw.length));
                if (raw.length > 10) r += ':' + raw.substring(10, Math.min(12, raw.length));
                this.value = r;
            });
        }

        window.openEmployeeSearchPopup = function (keyword) {
            if (typeof EmployeeSearchModal !== 'undefined') {
                EmployeeSearchModal.open(function (employee) {
                    $('#acr_f_personId').val(employee.personId);
                    $('#acr_f_empId').val(employee.empId);
                    $('#acr_f_empNameDisplay').val(employee.empId + ' - ' + employee.localName);
                }, keyword);
                // clear() bên trong open() reset empOffice, đặt lại sau khi open() chạy xong
                $('#esm_empOffice').val('15119');
            } else {
                alert('Component tìm kiếm nhân viên chưa được tải!');
            }
        };

        function acrOpenAddModal() {
            if (sysMode !== 'hrm') return;
            _acr_isEdit = false;
            $('#acr_modalTitle').text(/*[[#{acr.modal.addTitle}]]*/ 'Thêm bản ghi quẹt thẻ');
            $('#acr_f_recordNo').val('');
            $('#acr_f_personId').val('');
            $('#acr_f_empId').val('');
            $('#acr_f_empNameDisplay').val('');
            $('#acr_f_arDateStr').val('');
            $('#acr_f_swipeDateTime').val('');
            $('#acr_f_doorType').val('');
            $('#acr_f_remark').val('');
            var modal = new bootstrap.Modal(document.getElementById('acr_modal'));
            modal.show();
        }

        function acrOpenEditModal(recordNo) {
            if (sysMode !== 'hrm') return;
            $.ajax({
                url: '/ar/attendanceMintenance/api/cardRecord/detail',
                type: 'GET',
                data: { recordNo: recordNo },
                success: function (res) {
                    if (!res.success) {
                        alert(res.message || 'Không thể tải dữ liệu bản ghi.');
                        return;
                    }
                    var d = res.data;
                    _acr_isEdit = true;
                    $('#acr_modalTitle').text(/*[[#{acr.modal.editTitle}]]*/ 'Chỉnh sửa bản ghi quẹt thẻ');
                    $('#acr_f_recordNo').val(d.recordNo);
                    $('#acr_f_personId').val(d.personId);
                    $('#acr_f_empId').val(d.empId || '');
                    $('#acr_f_empNameDisplay').val((d.empId || '') + (d.localName ? ' - ' + d.localName : ''));
                    $('#acr_f_arDateStr').val(d.arDateStr || '');
                    $('#acr_f_swipeDateTime').val(d.swipeDatetime || '');
                    $('#acr_f_doorType').val(d.doorType || '');
                    $('#acr_f_remark').val(d.remark || '');
                    var modal = new bootstrap.Modal(document.getElementById('acr_modal'));
                    modal.show();
                },
                error: function () {
                    alert('Lỗi khi tải thông tin bản ghi.');
                }
            });
        }

        function acrSaveRecord() {
            if (sysMode !== 'hrm') return;
            var personId      = $('#acr_f_personId').val().trim();
            var arDateStr     = $('#acr_f_arDateStr').val().trim();
            var swipeDateTime = $('#acr_f_swipeDateTime').val().trim();

            if (!personId) {
                alert(/*[[#{acr.msg.selectEmployee}]]*/ 'Vui lòng chọn nhân viên');
                return;
            }
            if (!arDateStr) {
                alert(/*[[#{acr.msg.selectWorkDate}]]*/ 'Vui lòng nhập ngày công');
                return;
            }
            if (!swipeDateTime || swipeDateTime.length < 16) {
                alert(/*[[#{acr.msg.selectDatetime}]]*/ 'Vui lòng nhập thời gian quẹt thẻ đúng định dạng YYYY/MM/DD HH:MM');
                return;
            }

            var payload = {
                recordNo:      $('#acr_f_recordNo').val() || null,
                personId:      personId,
                cardNo:        $('#acr_f_empId').val().trim() || null,
                arDateStr:     arDateStr,
                doorType:      $('#acr_f_doorType').val() || null,
                remark:        $('#acr_f_remark').val().trim() || null,
                swipeDatetime: swipeDateTime
            };

            var url = _acr_isEdit
                ? '/ar/attendanceMintenance/api/cardRecord/update'
                : '/ar/attendanceMintenance/api/cardRecord/insert';

            $.ajax({
                url: url,
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(payload),
                success: function (res) {
                    if (res.success) {
                        bootstrap.Modal.getInstance(document.getElementById('acr_modal')).hide();
                        if (_acr_table) _acr_table.ajax.reload(null, false);
                    } else {
                        alert(res.message || 'Lưu thất bại.');
                    }
                },
                error: function () {
                    alert('Lỗi khi lưu bản ghi.');
                }
            });
        }

        function acrDeleteOne(recordNo) {
            if (sysMode !== 'hrm') return;
            if (!confirm(/*[[#{acr.confirm.deleteRecord}]]*/ 'Bạn có chắc muốn xóa bản ghi này không?')) return;
            $.ajax({
                url: '/ar/attendanceMintenance/api/cardRecord/delete',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ recordNo: recordNo }),
                success: function (res) {
                    if (res.success) {
                        if (_acr_table) _acr_table.ajax.reload(null, false);
                    } else {
                        alert(res.message || 'Xóa thất bại.');
                    }
                },
                error: function () {
                    alert('Lỗi khi xóa bản ghi.');
                }
            });
        }

        function acrDeleteSelected() {
            if (sysMode !== 'hrm') return;
            var checked = $('.acr-row-chk:checked');
            if (checked.length === 0) {
                alert(/*[[#{acr.msg.selectToDelete}]]*/ 'Vui lòng chọn ít nhất một bản ghi để xóa');
                return;
            }
            if (!confirm(/*[[#{acr.confirm.deleteSelected}]]*/ 'Bạn có chắc muốn xóa các bản ghi đã chọn không?')) return;

            var promises = [];
            checked.each(function () {
                var rno = $(this).val();
                promises.push($.ajax({
                    url: '/ar/attendanceMintenance/api/cardRecord/delete',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ recordNo: rno })
                }));
            });

            $.when.apply($, promises).always(function () {
                if (_acr_table) _acr_table.ajax.reload(null, false);
                $('#acr_checkAll').prop('checked', false);
            });
        }

        window.acrSearchData = function () {
            if (_acr_table) _acr_table.ajax.reload();
        };

        window.acrClearSearch = function () {
            $('#acr_keyword').val('');
            $('#acr_deptNo').val('');
            $('#acr_shiftNo').val('');
            _acr_selectedDeptCodes = [];
            $('.auth-dept-chk-global').prop('checked', false).trigger('change');
            acrInitDefaultDateRange();
            if (_acr_table) _acr_table.ajax.reload();
        };

        window.acrToggleAll = function (chk) {
            $('.acr-row-chk').prop('checked', chk.checked);
        };

        window.acrExportExcel = function () {
            if (_acr_table) _acr_table.button('.buttons-excel').trigger();
        };

        function acrOpenImportModal() {
            if (sysMode !== 'hrm') return;
            var fromDate = $('#acr_fromDate').val();
            var toDate   = $('#acr_toDate').val();
            $('#acr_imp_fromDate').val(fromDate);
            $('#acr_imp_toDate').val(toDate);
            if ($('#acr_imp_fromDate').data('daterangepicker') && fromDate) {
                $('#acr_imp_fromDate').data('daterangepicker').setStartDate(fromDate);
            }
            if ($('#acr_imp_toDate').data('daterangepicker') && toDate) {
                $('#acr_imp_toDate').data('daterangepicker').setStartDate(toDate);
            }
            $('#acr_imp_spinner').hide();
            $('#acr_imp_result').hide();
            $('#acr_imp_result_content').html('');
            $('#acr_imp_btnRun').prop('disabled', false);
            new bootstrap.Modal(document.getElementById('acr_imp_modal')).show();
        }

        function acrRunImport() {
            var fromDate = $('#acr_imp_fromDate').val().trim();
            var toDate   = $('#acr_imp_toDate').val().trim();
            if (!fromDate || !toDate) {
                alert(/*[[#{acr.imp.msg.selectDate}]]*/ 'Vui lòng chọn khoảng thời gian cần đọc dữ liệu');
                return;
            }
            $('#acr_imp_btnRun').prop('disabled', true);
            $('#acr_imp_spinner').show();
            $('#acr_imp_result').hide();
            $('#acr_imp_result_content').html('');

            $.ajax({
                url: '/ar/attendanceMintenance/api/cardRecord/importFromDevice',
                type: 'POST',
                data: { fromDate: fromDate, toDate: toDate },
                success: function (res) {
                    $('#acr_imp_spinner').hide();
                    $('#acr_imp_btnRun').prop('disabled', false);
                    var html = '';
                    if (res.success) {
                        html = '<div class="alert alert-success">'
                             + '<i class="bx bx-check-circle me-1"></i><strong>' + (res.message || '') + '</strong><br>'
                             + '<ul class="mb-0 mt-2">'
                             + '<li>Tổng bản ghi từ máy chủ: <strong>' + (res.total || 0) + '</strong></li>'
                             + '<li>Đã lưu mới: <strong class="text-success">' + (res.imported || 0) + '</strong></li>'
                             + '<li>Bỏ qua (trùng): <strong class="text-secondary">' + (res.skipped || 0) + '</strong></li>'
                             + '<li>Không tìm thấy nhân viên: <strong class="text-warning">' + (res.notFound || 0) + '</strong></li>'
                             + '</ul></div>';
                        if (_acr_table) _acr_table.ajax.reload(null, false);
                    } else {
                        html = '<div class="alert alert-danger"><i class="bx bx-error-circle me-1"></i>' + (res.message || 'Lỗi không xác định') + '</div>';
                    }
                    $('#acr_imp_result_content').html(html);
                    $('#acr_imp_result').show();
                },
                error: function () {
                    $('#acr_imp_spinner').hide();
                    $('#acr_imp_btnRun').prop('disabled', false);
                    $('#acr_imp_result_content').html('<div class="alert alert-danger"><i class="bx bx-error-circle me-1"></i>Lỗi kết nối máy chủ, vui lòng thử lại.</div>');
                    $('#acr_imp_result').show();
                }
            });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', acrBootPage);
        }
        if (typeof $ !== 'undefined') {
            $(document).ready(acrBootPage);
        } else {
            acrBootPage();
        }
    </script>
</template>
