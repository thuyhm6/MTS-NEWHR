<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <form id="acrm_searchForm" class="row g-3 mb-3">
                        <div class="col-md-3">
                            <label for="acrm_keyword" class="form-label" th:text="#{common.search.empIdOrName}">Mã nhân viên / Họ tên</label>
                            <input type="text" class="form-control" id="acrm_keyword"
                                   th:placeholder="#{common.placeholder.enterEmpId}" placeholder="Nhập mã hoặc họ tên">
                        </div>
                        <div class="col-md-3">
                            <label for="acrm_deptNo" class="form-label" th:text="#{common.deptName}">Phòng ban</label>
                            <input type="text" class="form-control" id="acrm_deptNo"
                                   th:placeholder="#{common.select}" placeholder="Chọn phòng ban" readonly>
                        </div>
                        <div class="col-md-2">
                            <label for="acrm_fromDate" class="form-label" th:text="#{common.fromDate}">Từ ngày</label>
                            <input type="text" class="form-control js-daterangepicker" id="acrm_fromDate"
                                   data-drp-format="YYYY-MM-DD" autocomplete="off">
                        </div>
                        <div class="col-md-2">
                            <label for="acrm_toDate" class="form-label" th:text="#{common.toDate}">Đến ngày</label>
                            <input type="text" class="form-control js-daterangepicker" id="acrm_toDate"
                                   data-drp-format="YYYY-MM-DD" autocomplete="off">
                        </div>
                        <div class="col-md-2">
                            <label for="acrm_eatDate" class="form-label" th:text="#{acrm.filter.eatDate}">Phân loại</label>
                            <select class="form-select" id="acrm_eatDate">
                                <option value="" th:text="#{acrm.eatDate.all}">Tất cả</option>
                                <option value="BREAKFAST" th:text="#{acrm.eatDate.breakfast}">Bữa sáng</option>
                                <option value="LUNCH" th:text="#{acrm.eatDate.lunch}">Bữa trưa</option>
                                <option value="DINNER" th:text="#{acrm.eatDate.dinner}">Bữa tối</option>
                                <option value="NIGHT" th:text="#{acrm.eatDate.night}">Ca đêm</option>
                            </select>
                        </div>
                        <div class="col-12 d-flex gap-2 flex-wrap justify-content-end">
                            <button type="button" class="btn btn-primary" onclick="acrmSearchData()">
                                <i class="bx bx-search"></i> <span th:text="#{common.search}">Tra cứu</span>
                            </button>
                            <button type="button" class="btn btn-secondary" onclick="acrmClearSearch()">
                                <i class="bx bx-x"></i> <span th:text="#{common.clearFilter}">Xóa lọc</span>
                            </button>
                            <button type="button" class="btn btn-success" onclick="acrmExportExcel()">
                                <i class="bx bx-export"></i> <span th:text="#{common.exportExcel}">Xuất Excel</span>
                            </button>
                            <button type="button" class="btn btn-warning text-dark" onclick="avrmOpenImportModal()">
                                <i class="bx bx-bowl-hot"></i> <span th:text="#{acrm.imp.title}">Đọc dữ liệu suất ăn từ máy chủ</span>
                            </button>
                        </div>
                    </form>

                    <div class="table-responsive">
                        <table id="acrm_dataTable" class="table table-striped table-bordered table-hover" style="min-width: 100%;">
                            <thead class="table-light text-center align-middle">
                                <tr>
                                    <th th:text="#{common.stt}">STT</th>
                                    <th th:text="#{common.empId}">Mã nhân viên</th>
                                    <th th:text="#{common.empName}">Họ tên</th>
                                    <th th:text="#{common.deptName}">Phòng ban</th>
                                    <th th:text="#{common.position}">Chức vụ</th>
                                    <th th:text="#{acrm.col.attendanceDate}">Ngày công</th>
                                    <th th:text="#{acrm.col.rDate}">Ngày quẹt thẻ</th>
                                    <th th:text="#{acrm.col.rTime}">Thời gian quẹt thẻ</th>
                                    <th th:text="#{acrm.col.eatName}">Tên món ăn</th>
                                    <th th:text="#{acrm.col.eatDate}">Phân loại</th>
                                    <th th:text="#{acrm.col.amount}">Số lượng</th>
                                    <th th:text="#{acrm.col.outdoorTime}">Thời gian ra</th>
                                    <th th:text="#{acrm.col.remark}">Ghi chú</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Modal Đọc dữ liệu suất ăn từ máy chủ -->
    <div class="modal fade" id="acrm_imp_modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-md">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" th:text="#{acrm.imp.title}">Đọc dữ liệu suất ăn từ máy chủ</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="acrm_imp_fromDate" class="form-label" th:text="#{common.fromDate}">Từ ngày</label>
                            <input type="text" class="form-control js-daterangepicker" id="acrm_imp_fromDate"
                                   data-drp-format="YYYY-MM-DD" autocomplete="off">
                        </div>
                        <div class="col-md-6">
                            <label for="acrm_imp_toDate" class="form-label" th:text="#{common.toDate}">Đến ngày</label>
                            <input type="text" class="form-control js-daterangepicker" id="acrm_imp_toDate"
                                   data-drp-format="YYYY-MM-DD" autocomplete="off">
                        </div>
                    </div>

                    <!-- Spinner khi đang xử lý -->
                    <div id="acrm_imp_spinner" class="text-center mt-3" style="display:none;">
                        <div class="spinner-border text-warning" role="status"></div>
                        <div class="mt-2 text-muted" th:text="#{acrm.imp.processing}">Đang kết nối và đọc dữ liệu suất ăn...</div>
                    </div>

                    <!-- Kết quả sau khi xử lý -->
                    <div id="acrm_imp_result" class="mt-3" style="display:none;">
                        <hr>
                        <div id="acrm_imp_result_content"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" th:text="#{common.close}">Đóng</button>
                    <button type="button" class="btn btn-warning text-dark" id="acrm_imp_btnRun" onclick="avrmRunImport()">
                        <i class="bx bx-cloud-download"></i>
                        <span th:text="#{acrm.imp.btnRun}">Thực hiện</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<template id="fragmentScripts">
    <script th:inline="javascript">
        var _acrm_table = null;
        var _acrm_pageBooted = false;
        var _acrm_selectedDeptCodes = [];

        function acrmFormatDate(dateObj) {
            var y = dateObj.getFullYear();
            var m = String(dateObj.getMonth() + 1).padStart(2, '0');
            var d = String(dateObj.getDate()).padStart(2, '0');
            return y + '-' + m + '-' + d;
        }

        function acrmInitDefaultDateRange() {
            var today = new Date();
            var todayStr = acrmFormatDate(today);
            $('#acrm_fromDate').val(todayStr);
            $('#acrm_toDate').val(todayStr);
            if ($('#acrm_fromDate').data('daterangepicker')) {
                $('#acrm_fromDate').data('daterangepicker').setStartDate(todayStr);
            }
            if ($('#acrm_toDate').data('daterangepicker')) {
                $('#acrm_toDate').data('daterangepicker').setStartDate(todayStr);
            }
        }

        function acrmInitDeptSelector() {
            if (typeof DeptTree === 'undefined') return;
            DeptTree.init('#acrm_deptNo', function (selectedCodes) {
                _acrm_selectedDeptCodes = selectedCodes || [];
            });
        }

        function acrmInitTable() {
            _acrm_table = $('#acrm_dataTable').DataTable({
                destroy: true,
                scrollX: true,
                scrollY: 'calc(100vh - 330px)',
                scrollCollapse: true,
                paging: true,
                searching: false,
                lengthChange: true,
                pageLength: 25,
                processing: true,
                serverSide: true,
                dom: 'Blfrtip',
                buttons: [],
                ajax: {
                    url: '/ar/attendanceMintenance/api/macRecordEat/list',
                    type: 'GET',
                    data: function (d) {
                        d.keyword  = $('#acrm_keyword').val();
                        d.deptNos  = (_acrm_selectedDeptCodes || []).join(',');
                        d.fromDate = $('#acrm_fromDate').val();
                        d.toDate   = $('#acrm_toDate').val();
                        d.eatDate  = $('#acrm_eatDate').val();
                    }
                },
                columns: [
                    {
                        data: null,
                        className: 'text-center',
                        orderable: false,
                        render: function (data, type, row, meta) {
                            var pageInfo = _acrm_table ? _acrm_table.page.info() : { start: 0 };
                            return pageInfo.start + meta.row + 1;
                        }
                    },
                    { data: 'empId',          className: 'text-center' },
                    { data: 'localName' },
                    { data: 'deptName' },
                    { data: 'postGradeName' },
                    { data: 'attendanceDate', className: 'text-center' },
                    { data: 'rDate',          className: 'text-center' },
                    { data: 'rTime',          className: 'text-center' },
                    { data: 'eatName' },
                    { data: 'eatDate',        className: 'text-center' },
                    { data: 'amount',         className: 'text-center' },
                    { data: 'outdoorTime',    className: 'text-center' },
                    { data: 'remark' }
                ]
            });
        }

        window.acrmSearchData = function () {
            if (_acrm_table) _acrm_table.ajax.reload();
        };

        window.acrmClearSearch = function () {
            $('#acrm_keyword').val('');
            $('#acrm_deptNo').val('');
            $('#acrm_eatDate').val('');
            _acrm_selectedDeptCodes = [];
            $('.auth-dept-chk-global').prop('checked', false).trigger('change');
            acrmInitDefaultDateRange();
            if (_acrm_table) _acrm_table.ajax.reload();
        };

        window.acrmExportExcel = function () {
            var params = new URLSearchParams({
                keyword:  $('#acrm_keyword').val(),
                deptNos:  (_acrm_selectedDeptCodes || []).join(','),
                fromDate: $('#acrm_fromDate').val(),
                toDate:   $('#acrm_toDate').val(),
                eatDate:  $('#acrm_eatDate').val()
            });
            window.location.href = '/ar/attendanceMintenance/api/macRecordEat/exportExcel?' + params.toString();
        };

        function avrmOpenImportModal() {
            var fromDate = $('#acrm_fromDate').val();
            var toDate   = $('#acrm_toDate').val();
            $('#acrm_imp_fromDate').val(fromDate);
            $('#acrm_imp_toDate').val(toDate);
            if ($('#acrm_imp_fromDate').data('daterangepicker') && fromDate) {
                $('#acrm_imp_fromDate').data('daterangepicker').setStartDate(fromDate);
            }
            if ($('#acrm_imp_toDate').data('daterangepicker') && toDate) {
                $('#acrm_imp_toDate').data('daterangepicker').setStartDate(toDate);
            }
            $('#acrm_imp_spinner').hide();
            $('#acrm_imp_result').hide();
            $('#acrm_imp_result_content').html('');
            $('#acrm_imp_btnRun').prop('disabled', false);
            new bootstrap.Modal(document.getElementById('acrm_imp_modal')).show();
        }

        function avrmRunImport() {
            var fromDate = $('#acrm_imp_fromDate').val().trim();
            var toDate   = $('#acrm_imp_toDate').val().trim();
            if (!fromDate || !toDate) {
                alert(/*[[#{acrm.imp.msg.selectDate}]]*/ 'Vui lòng chọn khoảng thời gian cần đọc dữ liệu');
                return;
            }
            $('#acrm_imp_btnRun').prop('disabled', true);
            $('#acrm_imp_spinner').show();
            $('#acrm_imp_result').hide();
            $('#acrm_imp_result_content').html('');

            $.ajax({
                url: '/ar/attendanceMintenance/api/macRecordEat/importFromDevice',
                type: 'POST',
                data: { fromDate: fromDate, toDate: toDate },
                success: function (res) {
                    $('#acrm_imp_spinner').hide();
                    $('#acrm_imp_btnRun').prop('disabled', false);
                    var html = '';
                    if (res.success) {
                        html = '<div class="alert alert-success">'
                             + '<i class="bx bx-check-circle me-1"></i><strong>' + (res.message || '') + '</strong><br>'
                             + '<ul class="mb-0 mt-2">'
                             + '<li>Tổng bản ghi từ máy chủ: <strong>' + (res.total || 0) + '</strong></li>'
                             + '<li>Đã lưu mới: <strong class="text-success">' + (res.imported || 0) + '</strong></li>'
                             + '<li>Bỏ qua (trùng): <strong class="text-secondary">' + (res.skipped || 0) + '</strong></li>'
                             + '<li>Không hợp lệ: <strong class="text-warning">' + (res.notFound || 0) + '</strong></li>'
                             + '</ul></div>';
                        if (_acrm_table) _acrm_table.ajax.reload(null, false);
                    } else {
                        html = '<div class="alert alert-danger"><i class="bx bx-error-circle me-1"></i>' + (res.message || 'Lỗi không xác định') + '</div>';
                    }
                    $('#acrm_imp_result_content').html(html);
                    $('#acrm_imp_result').show();
                },
                error: function () {
                    $('#acrm_imp_spinner').hide();
                    $('#acrm_imp_btnRun').prop('disabled', false);
                    $('#acrm_imp_result_content').html('<div class="alert alert-danger"><i class="bx bx-error-circle me-1"></i>Lỗi kết nối máy chủ, vui lòng thử lại.</div>');
                    $('#acrm_imp_result').show();
                }
            });
        }

        function acrmBootPage() {
            if (_acrm_pageBooted) return;
            if (!document.getElementById('acrm_dataTable')) {
                setTimeout(acrmBootPage, 30);
                return;
            }
            _acrm_pageBooted = true;
            acrmInitDefaultDateRange();
            acrmInitDeptSelector();
            acrmInitTable();
            if (_acrm_table) _acrm_table.ajax.reload();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', acrmBootPage);
        }
        if (typeof $ !== 'undefined') {
            $(document).ready(acrmBootPage);
        } else {
            acrmBootPage();
        }
    </script>
</template>
