<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <!-- Data Table with DataTables -->
            <div class="card">
                <!-- Search Form -->
                <div class="card-body">
                    <div class="row">
                        <div class="col-12">
                            <div class="card">
                                <div class="card-body p-1">
                                    <form class="searchForm" id="contractSearchFormExpired">
                                        <div class="row g-3">
                                            <div class="col-md-2">
                                                <label for="searchContractNoExpired" class="form-label" th:text="#{hrm.viewExpiredContract.title.contractNo}">Số hợp

                                                <input type="text" class="form-control" id="searchContractNoExpired"
                                                    name="contractNo" th:placeholder="#{hrm.viewContract.title.contractNoPlaceholder}" placeholder="Nhập số hợp đồng">

                                            <div class="col-md-2">
                                                <label for="searchEmpIdExpired" class="form-label" th:text="#{hrm.viewExpiredContract.title.empId}">Mã nhân viên</label>

                                            <div class="col-md-2">
                                                <label for="searchContractTypeExpired" class="form-label" th:text="#{hrm.viewExpiredContract.title.contractType}">Loại hợp

                                                <select class="form-select" id="searchContractTypeExpired"
                                                    name="contractType">

                                                <input type="date" class="form-control" id="searchStartDateToExpired"

                                            </div>
                                            <div class="col-md-2">
                                                <label for="searchEndDateFromExpired" class="form-label" th:text="#{hrm.viewContract.title.endDateFrom}">Ngày kết thúc
                                                    từ</label>
                                                <input type="date" class="form-control" id="searchEndDateFromExpired"
                                                    name="endDateFrom">
                                            </div>
                                            <div class="col-md-2">
                                                <label for="searchEndDateToExpired" class="form-label" th:text="#{hrm.viewContract.title.endDateTo}">Ngày kết thúc
                                                    đến</label>
                                                <input type="date" class="form-control" id="searchEndDateToExpired"
                                                    name="endDateTo">
                                            </div>
                                            <div class="col-md-2">
                                                <label for="searchActivityExpired" class="form-label" th:text="#{hrm.viewExpiredContract.title.activity}">Hoạt động</label>
                                                <select class="form-select" id="searchActivityExpired" name="activity">
                                                    <option value="" th:text="#{hrm.viewContract.title.all}">Tất cả</option>
                                                    <option value="ACTIVE" th:text="#{hrm.editContract.title.active}">Hoạt động</option>
                                                    <option value="INACTIVE" th:text="#{hrm.editContract.title.inactive}">Không hoạt động</option>
                                                </select>
                                            </div>
                                            <div class="col-md-2">
                                                <label for="searchWorkPositionExpired" class="form-label" th:text="#{hrm.viewExpiredContract.title.workPosition}">Vị trí làm
                                                    việc</label>
                                                <input type="text" class="form-control" id="searchWorkPositionExpired"
                                                    name="workPosition" th:placeholder="#{hrm.viewContract.title.workPositionPlaceholder}" placeholder="Nhập vị trí làm việc">
                                            </div>
                                            <div class="col-md-2">
                                                <label for="searchSalaryFromExpired" class="form-label" th:text="#{hrm.viewContract.title.salaryFrom}">Lương từ</label>

                                            <div class="col-md-2">
                                                <label for="searchSalaryToExpired" class="form-label" th:text="#{hrm.viewContract.title.salaryTo}">Lương đến</label>
                                                <input type="number" class="form-control" id="searchSalaryToExpired"
                                                    name="salaryTo" th:placeholder="#{hrm.viewContract.title.salaryToPlaceholder}" placeholder="Nhập lương tối đa">

                                        <div class="row mt-3">
                                            <div class="col-12">
                                                <button type="button" class="btn btn-primary"
                                                    onclick="performSearchExpired()">

                                                <button type="button" class="btn btn-secondary ms-2"
                                                    onclick="clearSearchExpired()">

                                                    onclick="exportSearchResultsExpired()">

                <!-- Include Edit Contract Modal for Reuse -->
                <div th:replace="~{hrm/contract/editContract :: content}"></div>
                <div class="card-body">
                    <!-- Error Message -->
                    <div id="error-message-expired" class="alert alert-danger d-none" role="alert">
                        <i class="bx bx-error"></i>
                        <span id="error-text-expired"></span>
                    </div>

                    <!-- DataTables Table -->
                    <div class="table-responsive">
                        <table id="contractsTableExpired" class="table table-striped table-hover">
                            <thead class="table-dark">
                                <tr>
                                    <th th:text="#{hrm.viewContract.title.stt}">STT</th>
                                    <th th:text="#{hrm.viewContract.title.contractNo}">Số hợp đồng</th>
                                    <th th:text="#{hrm.viewContract.title.empId}">Mã nhân viên</th>
                                    <th th:text="#{hrm.viewContract.title.contractName}">Tên hợp đồng</th>
                                    <th th:text="#{hrm.viewContract.title.contractType}">Loại hợp đồng</th>
                                    <th th:text="#{hrm.viewContract.title.startDate}">Ngày bắt đầu</th>
                                    <th th:text="#{hrm.viewContract.title.endDate}">Ngày kết thúc</th>
                                    <th th:text="#{hrm.viewContract.title.dept}">Phòng ban</th>
                                    <th th:text="#{hrm.viewContract.title.position}">Vị trí</th>
                                    <th th:text="#{hrm.viewContract.title.salary}">Lương</th>
                                    <th th:text="#{hrm.viewContract.title.activity}">Hoạt động</th>
                                    <th th:text="#{hrm.viewContract.title.createDate}">Ngày tạo</th>

                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- DataTables JavaScript -->
    <template id="fragmentScripts">
        <script th:inline="none">
            $(document).ready(function () {
                // Get CSRF token
                var csrfToken = $('meta[name="_csrf"]').attr('content');
                var csrfHeader = $('meta[name="_csrf_header"]').attr('content');

                // Initialize Date Filters for "Next 7 Days"
                var today = new Date();
                var next7Days = new Date();
                next7Days.setDate(today.getDate() + 7);

                // Format as YYYY-MM-DD
                function formatDate(date) {
                    var d = new Date(date),
                        month = '' + (d.getMonth() + 1),
                        day = '' + d.getDate(),
                        year = d.getFullYear();

                    if (month.length < 2) month = '0' + month;
                    if (day.length < 2) day = '0' + day;

                    return [year, month, day].join('-');
                }

                // Set default filter: End Contract Date within [Today, Today + 7]
                $('#searchEndDateFromExpired').val(formatDate(today));
                $('#searchEndDateToExpired').val(formatDate(next7Days));

                // Initialize DataTable
                try {
                    // Check if DataTable already exists and destroy it
                    if ($.fn.DataTable.isDataTable('#contractsTableExpired')) {
                        $('#contractsTableExpired').DataTable().destroy();
                    }

                    var table = $('#contractsTableExpired').DataTable({
                        processing: true,
                        serverSide: true,
                        ajax: {
                            url: '/hrm/contractInfo/contracts',
                            type: 'POST',
                            contentType: 'application/json',
                            beforeSend: function (xhr) {
                                console.log('Sending DataTables request to:', '/hrm/contractInfo/contracts');
                            },
                            headers: (function () {
                                var headers = {
                                    'X-Requested-With': 'XMLHttpRequest',
                                    'Content-Type': 'application/json'
                                };
                                if (csrfToken && csrfHeader) {
                                    headers[csrfHeader] = csrfToken;
                                }
                                return headers;
                            })(),
                            data: function (d) {
                                // Add search form parameters
                                d.contractNo = document.getElementById('searchContractNoExpired').value;
                                d.empId = document.getElementById('searchEmpIdExpired').value;
                                d.contractType = document.getElementById('searchContractTypeExpired').value;
                                d.department = document.getElementById('searchDepartmentExpired').value;
                                d.startDateFrom = document.getElementById('searchStartDateFromExpired').value;
                                d.startDateTo = document.getElementById('searchStartDateToExpired').value;
                                d.endDateFrom = document.getElementById('searchEndDateFromExpired').value;
                                d.endDateTo = document.getElementById('searchEndDateToExpired').value;
                                d.activity = document.getElementById('searchActivityExpired').value;
                                d.workPosition = document.getElementById('searchWorkPositionExpired').value;
                                d.salaryFrom = document.getElementById('searchSalaryFromExpired').value;
                                d.salaryTo = document.getElementById('searchSalaryToExpired').value;

                                var data = JSON.stringify(d);
                                if (csrfToken && csrfHeader) {
                                    // Add CSRF token if available
                                    var jsonData = JSON.parse(data);
                                    jsonData._csrf = csrfToken;
                                    data = JSON.stringify(jsonData);
                                }
                                return data;
                            },
                            dataSrc: function (json) {
                                if (json.error) {
                                    showErrorExpired(json.error);
                                    return [];
                                }
                                return json.data;
                            },
                            error: function (xhr, error, thrown) {
                                console.error('DataTables AJAX error:', error);
                                showErrorExpired('Lỗi khi tải dữ liệu: ' + (xhr.responseJSON?.error || thrown));
                            }
                        },
                        columns: [
                            {
                                data: null,
                                orderable: false,
                                searchable: false,
                                render: function (data, type, row, meta) {
                                    return meta.row + meta.settings._iDisplayStart + 1;
                                }
                            },
                            {
                                data: 'contractNo',
                                render: function (data, type, row) {
                                    return '<span class="badge bg-primary">' + (data || '') + '</span>';
                                }
                            },
                            {
                                data: 'empId',
                                render: function (data, type, row) {
                                    return '<span class="badge bg-info">' + (data || '') + '</span>';
                                }
                            },
                            { data: 'contractName' },
                            { data: 'contractTypeName' },
                            {
                                data: 'startContractDate',
                                render: function (data, type, row) {
                                    if (data) {
                                        var date = new Date(data);
                                        return '<small>' + date.toLocaleDateString('vi-VN') + '</small>';
                                    }
                                    return '<small class="text-muted">-</small>';
                                }
                            },
                            {
                                data: 'endContractDate',
                                render: function (data, type, row) {
                                    if (data) {
                                        var date = new Date(data);
                                        return '<small>' + date.toLocaleDateString('vi-VN') + '</small>';
                                    }
                                    return '<small class="text-muted">-</small>';
                                }
                            },
                            { data: 'deptNo' },
                            { data: 'workPosition' },
                            {
                                data: 'salary',
                                render: function (data, type, row) {
                                    if (data) {
                                        return '<span class="text-success fw-bold">' +
                                            new Intl.NumberFormat('vi-VN').format(data) + ' VNĐ</span>';
                                    }
                                    return '<small class="text-muted">-</small>';
                                }
                            },
                            {
                                data: 'activity',
                                render: function (data, type, row) {
                                    if (data === 'ACTIVE') {
                                        return '<span class="badge bg-success">Hoạt động</span>';
                                    } else {
                                        return '<span class="badge bg-secondary">Không hoạt động</span>';
                                    }
                                }
                            },
                            {
                                data: 'createDate',
                                render: function (data, type, row) {
                                    if (data) {
                                        var date = new Date(data);
                                        return '<small>' + date.toLocaleDateString('vi-VN') + ' ' +
                                            date.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' }) + '</small>';
                                    }
                                    return '<small class="text-muted">-</small>';
                                }
                            },
                            {
                                data: null,
                                orderable: false,
                                searchable: false,
                                render: function (data, type, row) {
                                    return '<div class="btn-group btn-group-sm">' +
                                        '<button type="button" class="btn btn-outline-primary" title="Xem chi tiết" onclick="viewContract(\'' + row.contractNo + '\')">' +
                                        '<i class="bx bx-show"></i>' +
                                        '</button>' +
                                        '<button type="button" class="btn btn-warning" title="Gia hạn" onclick="extendContract(\'' + row.contractNo + '\')">' +
                                        '<i class="bx bx-up-arrow-circle"></i> Gia hạn' +
                                        '</button>' +
                                        '</div>';
                                }
                            }
                        ],
                        pageLength: 10,
                        order: [[6, 'asc']], // Sort by end date ascending (closest expiry first)
                        lengthMenu: [[10, 25, 50, 100, -1], [10, 25, 50, 100, "Tất cả"]],
                        responsive: true,
                        autoWidth: false,
                        scrollCollapse: true,
                        language: {
                            processing: "Đang xử lý...",
                            lengthMenu: "Hiển thị _MENU_ bản ghi",
                            zeroRecords: "Không tìm thấy dữ liệu",
                            info: "Hiển thị _START_ đến _END_ của _TOTAL_ bản ghi",
                            infoEmpty: "Hiển thị 0 đến 0 của 0 bản ghi",
                            infoFiltered: "(được lọc từ _MAX_ tổng số bản ghi)",
                            search: "Tìm kiếm:",
                            paginate: {
                                first: "Đầu",
                                last: "Cuối",
                                next: "Tiếp",
                                previous: "Trước"
                            }
                        }
                    });

                    console.log('Contract DataTable initialized successfully');

                } catch (error) {
                    console.error('Error initializing DataTable:', error);
                    showErrorExpired('Lỗi khởi tạo DataTable: ' + error.message);
                }

                // Function to show error message
                function showErrorExpired(message) {
                    $('#error-text-expired').text(message);
                    $('#error-message-expired').removeClass('d-none');
                    setTimeout(function () {
                        $('#error-message-expired').addClass('d-none');
                    }, 5000);
                }
            });
        </script>

        <!-- Contract Management Functions -->
        <script>
            // Wait for jQuery to be ready
            $(document).ready(function () {
                console.log('Contract management functions ready');

                // Search form functions
                window.performSearchExpired = function () {
                    if ($.fn.DataTable.isDataTable('#contractsTableExpired')) {
                        $('#contractsTableExpired').DataTable().ajax.reload();
                    }
                };

                window.clearSearchExpired = function () {
                    document.getElementById('searchContractNoExpired').value = '';
                    document.getElementById('searchEmpIdExpired').value = '';
                    document.getElementById('searchContractTypeExpired').value = '';
                    document.getElementById('searchDepartmentExpired').value = '';
                    document.getElementById('searchStartDateFromExpired').value = '';
                    document.getElementById('searchStartDateToExpired').value = '';
                    // Reset date range for ending date to default
                    var today = new Date();
                    var next7Days = new Date();
                    next7Days.setDate(today.getDate() + 7);
                    document.getElementById('searchEndDateFromExpired').value = today.toISOString().split('T')[0];
                    document.getElementById('searchEndDateToExpired').value = next7Days.toISOString().split('T')[0];

                    document.getElementById('searchActivityExpired').value = '';
                    document.getElementById('searchWorkPositionExpired').value = '';
                    document.getElementById('searchSalaryFromExpired').value = '';
                    document.getElementById('searchSalaryToExpired').value = '';

                    if ($.fn.DataTable.isDataTable('#contractsTableExpired')) {
                        $('#contractsTableExpired').DataTable().ajax.reload();
                    }
                };

                window.exportSearchResultsExpired = function () {
                    // Get current search parameters
                    const searchParams = {
                        contractNo: document.getElementById('searchContractNoExpired').value,
                        empId: document.getElementById('searchEmpIdExpired').value,
                        contractType: document.getElementById('searchContractTypeExpired').value,
                        department: document.getElementById('searchDepartmentExpired').value,
                        startDateFrom: document.getElementById('searchStartDateFromExpired').value,
                        startDateTo: document.getElementById('searchStartDateToExpired').value,
                        endDateFrom: document.getElementById('searchEndDateFromExpired').value,
                        endDateTo: document.getElementById('searchEndDateToExpired').value,
                        activity: document.getElementById('searchActivityExpired').value,
                        workPosition: document.getElementById('searchWorkPositionExpired').value,
                        salaryFrom: document.getElementById('searchSalaryFromExpired').value,
                        salaryTo: document.getElementById('searchSalaryToExpired').value
                    };

                    let exportUrl = '/hrm/contractInfo/export?';
                    const params = new URLSearchParams();

                    Object.keys(searchParams).forEach(key => {
                        if (searchParams[key]) {
                            params.append(key, searchParams[key]);
                        }
                    });

                    exportUrl += params.toString();
                    window.open(exportUrl, '_blank');
                };

                // Add New (Extend is a form of Add)
                window.addNewContract = function () {
                    $('#addContractForm')[0].reset();
                    $('#addActivity').val('ACTIVE');
                    $('#addContractType').val('FULL_TIME');
                    $('#addContractModal').modal('show');
                };

                window.saveNewContract = function () {
                    // Reuse existing save function logic (duplicated here for completeness or assumption it exists in included file? No, original had it inline)
                    // We need to implement it or reuse if it was global.
                    // The original file had it inside $(document).ready.

                    const contractNo = $('#addContractNo').val().trim();
                    const empId = $('#addEmpId').val().trim();
                    const contractName = $('#addContractName').val().trim();

                    if (!contractNo) {
                        showErrorMessage('Vui lòng nhập số hợp đồng');
                        $('#addContractNo').focus();
                        return;
                    }
                    if (!empId) {
                        showErrorMessage('Vui lòng nhập mã nhân viên');
                        $('#addEmpId').focus();
                        return;
                    }

                    const formData = {
                        contractNo: $('#addContractNo').val(),
                        empId: $('#addEmpId').val(),
                        contractTypeCode: $('#addContractTypeCode').val(),
                        startContractDate: $('#addStartContractDate').val(),
                        endContractDate: $('#addEndContractDate').val(),
                        remark: $('#addRemark').val(),
                        workTime: $('#addWorkTime').val(),
                        workPosition: $('#addWorkPosition').val(),
                        workContent: $('#addWorkContent').val(),
                        salary: $('#addSalary').val(),
                        deptNo: $('#addDeptno').val(),
                        positionNo: $('#addPositionNo').val(),
                        postGradeNo: $('#addPostGradeNo').val(),
                        workHourType: $('#addWorkHourType').val(),
                        totalPeriod: $('#addTotalPeriod').val(),
                        contractName: $('#addContractName').val(),
                        changeDate: $('#addChangeDate').val(),
                        contractType: $('#addContractType').val(),
                        totalPeriod08: $('#addTotalPeriod08').val(),
                        activity: $('#addActivity').val()
                    };

                    $.ajax({
                        url: '/hrm/contractInfo/api/contract/add',
                        type: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify(formData),
                        success: function (response) {
                            $('#addContractModal').modal('hide');
                            showSuccessMessage('Gia hạn (thêm mới) hợp đồng thành công!');
                            if ($.fn.DataTable.isDataTable('#contractsTable')) {
                                $('#contractsTable').DataTable().ajax.reload();
                            }
                        },
                        error: function (xhr, status, error) {
                            let errorMessage = 'Lỗi: ' + error;
                            if (xhr.responseJSON && xhr.responseJSON.message) {
                                errorMessage = xhr.responseJSON.message;
                            } else if (xhr.responseJSON && xhr.responseJSON.error) {
                                errorMessage = xhr.responseJSON.error;
                            }
                            showErrorMessage(errorMessage);
                        }
                    });
                };


                // Extend Logic
                window.extendContract = function (contractNo) {
                    console.log('Extending contract:', contractNo);

                    $.ajax({
                        url: '/hrm/contractInfo/api/contract/' + contractNo,
                        type: 'GET',
                        success: function (contract) {
                            // Calculate next contract type and dates
                            let nextTypeCode = '';
                            let nextTypeName = ''; // If we want to display it
                            let durationMonths = 0;
                            let isIndefinite = false;

                            // CONTRACT_TYPE_CODE Logic:
                            // 14014302 (Probation & Training) OR 123204 (Probation) -> 14014303 (1 Year)
                            // 14014303 (1 Year) -> 123203 (2 Year)
                            // 123203 (2 Year) -> 14014305 (Indefinite)

                            let currentCode = contract.contractTypeCode;
                            console.log('Current Contract Type Code:', currentCode);

                            if (currentCode == '14014302' || currentCode == '123204') {
                                nextTypeCode = '14014303'; // -> 1 Year
                                durationMonths = 12;
                            } else if (currentCode == '14014303') {
                                nextTypeCode = '123203'; // -> 2 Year
                                durationMonths = 24;
                            } else if (currentCode == '123203') {
                                nextTypeCode = '14014305'; // -> Indefinite
                                isIndefinite = true;
                            } else {
                                // Fallback: 1 Year extension or keep same?
                                // Default to 1 Year if unknown
                                nextTypeCode = '14014303';
                                durationMonths = 12;
                            }

                            // Open Add Modal
                            $('#addContractForm')[0].reset();
                            $('#addActivity').val('ACTIVE');
                            $('#addContractModal').modal('show');

                            // Fill fields
                            $('#addEmpId').val(contract.empId);
                            $('#addContractName').val('Gia hạn - ' + (contract.contractName || ''));
                            $('#addContractTypeCode').val(nextTypeCode);
                            $('#addDeptno').val(contract.deptNo);
                            $('#addWorkPosition').val(contract.workPosition);
                            $('#addSalary').val(contract.salary);
                            $('#addWorkTime').val(contract.workTime);
                            $('#addWorkHourType').val(contract.workHourType);
                            // Set contract type dropdown based on code?
                            // This might be tricky if the dropdown uses different enums. 
                            // Assuming 'FULL_TIME' as generic default.
                            $('#addContractType').val('FULL_TIME');


                            // Dates
                            if (contract.endContractDate) {
                                let oldEnd = new Date(contract.endContractDate);
                                let newStart = new Date(oldEnd);
                                newStart.setDate(oldEnd.getDate() + 1);

                                // Format YYYY-MM-DD
                                let startStr = newStart.toISOString().split('T')[0];
                                $('#addStartContractDate').val(startStr);

                                if (!isIndefinite) {
                                    let newEnd = new Date(newStart);
                                    newEnd.setMonth(newStart.getMonth() + durationMonths);
                                    newEnd.setDate(newEnd.getDate() - 1);
                                    let endStr = newEnd.toISOString().split('T')[0];
                                    $('#addEndContractDate').val(endStr);
                                } else {
                                    $('#addEndContractDate').val(''); // Empty for indefinite
                                }
                            } else {
                                // If no end date, maybe start today?
                                let today = new Date().toISOString().split('T')[0];
                                $('#addStartContractDate').val(today);
                                // Default 1 year if logic failed
                                let nextYear = new Date();
                                nextYear.setFullYear(nextYear.getFullYear() + 1);
                                $('#addEndContractDate').val(nextYear.toISOString().split('T')[0]);
                            }
                        },
                        error: function (xhr, status, error) {
                            showErrorMessage('Lỗi khi tải thông tin hợp đồng: ' + error);
                        }
                    });
                };

                window.viewContract = function (contractNo) {
                    $.ajax({
                        url: '/hrm/contractInfo/api/contract/' + contractNo,
                        type: 'GET',
                        success: function (response) {
                            showContractDetails(response);
                        },

                    });
                };
