<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <!-- Data Table with DataTables -->
            <div class="card">
                <!-- Search Form -->
                <div class="card-body">
                    <div class="row">
                        <div class="col-12">
                            <div class="card">
                                <div class="card-body p-1">
                                    <form class="searchForm" id="contractSearchFormForSearch">
                                        <div class="row g-3">
                                            <div class="col-md-2">
                                                <label for="searchContractNoForSearch" class="form-label" th:text="#{hrm.viewContract.title.contractNo}">Số hợp
                                                    đồng</label>
                                                <input type="text" class="form-control" id="searchContractNoForSearch"
                                                    name="contractNo" th:placeholder="#{hrm.viewContract.title.contractNoPlaceholder}" placeholder="Nhập số hợp đồng">
                                            </div>
                                            <div class="col-md-2">
                                                <label for="searchEmpIdForSearch" class="form-label" th:text="#{hrm.viewContract.title.empId}">Mã nhân
                                                    viên</label>
                                                <input type="text" class="form-control" id="searchEmpIdForSearch"
                                                    name="empId" th:placeholder="#{hrm.viewContract.title.empIdPlaceholder}" placeholder="Nhập mã nhân viên">
                                            </div>
                                            <div class="col-md-2">
                                                <label for="searchContractTypeForSearch" class="form-label" th:text="#{hrm.viewContract.title.contractType}">Loại hợp
                                                    đồng</label>
                                                <select class="form-select" id="searchContractTypeForSearch"
                                                    name="contractType">
                                                    <option value="" th:text="#{hrm.viewContract.title.all}">Tất cả</option>
                                                    <option value="FULL_TIME" th:text="#{hrm.editContract.title.fullTime}">Toàn thời gian</option>
                                                    <option value="PART_TIME" th:text="#{hrm.editContract.title.partTime}">Bán thời gian</option>
                                                    <option value="INTERN" th:text="#{hrm.editContract.title.intern}">Thực tập</option>
                                                    <option value="CONSULTANT" th:text="#{hrm.editContract.title.consultant}">Tư vấn</option>
                                                </select>
                                            </div>
                                            <div class="col-md-2">
                                                <label for="searchDepartmentForSearch" class="form-label" th:text="#{hrm.viewContract.title.dept}">Phòng
                                                    ban</label>
                                                <input type="text" class="form-control" id="searchDepartmentForSearch"
                                                    name="department" th:placeholder="#{hrm.viewContract.title.deptPlaceholder}" placeholder="Nhập phòng ban">
                                            </div>
                                            <div class="col-md-2">
                                                <label for="searchStartDateFromForSearch" class="form-label" th:text="#{hrm.viewContract.title.startDateFrom}">Ngày bắt
                                                    đầu
                                                    từ</label>
                                                <input type="date" class="form-control"
                                                    id="searchStartDateFromForSearch" name="startDateFrom">
                                            </div>
                                            <div class="col-md-2">
                                                <label for="searchStartDateToForSearch" class="form-label" th:text="#{hrm.viewContract.title.startDateTo}">Ngày bắt đầu
                                                    đến</label>
                                                <input type="date" class="form-control" id="searchStartDateToForSearch"
                                                    name="startDateTo">
                                            </div>
                                            <div class="col-md-2">
                                                <label for="searchEndDateFromForSearch" class="form-label" th:text="#{hrm.viewContract.title.endDateFrom}">Ngày kết thúc
                                                    từ</label>
                                                <input type="date" class="form-control" id="searchEndDateFromForSearch"
                                                    name="endDateFrom">
                                            </div>
                                            <div class="col-md-2">
                                                <label for="searchEndDateToForSearch" class="form-label" th:text="#{hrm.viewContract.title.endDateTo}">Ngày kết thúc
                                                    đến</label>
                                                <input type="date" class="form-control" id="searchEndDateToForSearch"
                                                    name="endDateTo">
                                            </div>
                                            <div class="col-md-2">
                                                <label for="searchActivityForSearch" class="form-label" th:text="#{hrm.viewContract.title.activity}">Hoạt
                                                    động</label>
                                                <select class="form-select" id="searchActivityForSearch"
                                                    name="activity">
                                                    <option value="" th:text="#{hrm.viewContract.title.all}">Tất cả</option>
                                                    <option value="ACTIVE" th:text="#{hrm.editContract.title.active}">Hoạt động</option>
                                                    <option value="INACTIVE" th:text="#{hrm.editContract.title.inactive}">Không hoạt động</option>
                                                </select>
                                            </div>
                                            <div class="col-md-2">
                                                <label for="searchWorkPositionForSearch" class="form-label" th:text="#{hrm.viewContract.title.workPosition}">Vị trí làm
                                                    việc</label>
                                                <input type="text" class="form-control" id="searchWorkPositionForSearch"
                                                    name="workPosition" th:placeholder="#{hrm.viewContract.title.workPositionPlaceholder}" placeholder="Nhập vị trí làm việc">
                                            </div>
                                            <div class="col-md-2">
                                                <label for="searchSalaryFromForSearch" class="form-label" th:text="#{hrm.viewContract.title.salaryFrom}">Lương
                                                    từ</label>
                                                <input type="number" class="form-control" id="searchSalaryFromForSearch"
                                                    name="salaryFrom" th:placeholder="#{hrm.viewContract.title.salaryFromPlaceholder}" placeholder="Nhập lương tối thiểu">
                                            </div>
                                            <div class="col-md-2">
                                                <label for="searchSalaryToForSearch" class="form-label" th:text="#{hrm.viewContract.title.salaryTo}">Lương
                                                    đến</label>
                                                <input type="number" class="form-control" id="searchSalaryToForSearch"
                                                    name="salaryTo" th:placeholder="#{hrm.viewContract.title.salaryToPlaceholder}" placeholder="Nhập lương tối đa">
                                            </div>
                                        </div>
                                        <div class="row mt-3">
                                            <div class="col-12">
                                                <button type="button" class="btn btn-primary"
                                                    onclick="performSearchForSearch()">
                                                    <i class="bx bx-search me-1"></i> <span th:text="#{hrm.viewContract.title.search}">Tìm kiếm</span>
                                                </button>
                                                <button type="button" class="btn btn-secondary ms-2"
                                                    onclick="clearSearchForSearch()">
                                                    <i class="bx bx-x me-1"></i> <span th:text="#{hrm.viewContract.title.clearFilter}">Xóa bộ lọc</span>
                                                </button>
                                                <button type="button" class="btn btn-outline-info ms-2"
                                                    onclick="exportSearchResultsForSearch()">
                                                    <i class="bx bx-download me-1"></i> <span th:text="#{hrm.viewContract.title.exportResult}">Xuất kết quả</span>
                                                </button>
                                            </div>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card-body">
                    <!-- Error Message -->
                    <div id="error-message-forsearch" class="alert alert-danger d-none" role="alert">
                        <i class="bx bx-error"></i>
                        <span id="error-text-forsearch"></span>
                    </div>

                    <!-- DataTables Table -->
                    <div class="table-responsive">
                        <table id="contractsTableForSearch" class="table table-striped table-hover">
                            <thead class="table-dark">
                                <tr>
                                    <th th:text="#{hrm.viewContract.title.stt}">STT</th>
                                    <th th:text="#{hrm.viewContract.title.contractNo}">Số hợp đồng</th>
                                    <th th:text="#{hrm.viewContract.title.empId}">Mã nhân viên</th>
                                    <th th:text="#{hrm.viewContract.title.contractName}">Tên hợp đồng</th>
                                    <th th:text="#{hrm.viewContract.title.contractType}">Loại hợp đồng</th>
                                    <th th:text="#{hrm.viewContract.title.startDate}">Ngày bắt đầu</th>
                                    <th th:text="#{hrm.viewContract.title.endDate}">Ngày kết thúc</th>
                                    <th th:text="#{hrm.viewContract.title.dept}">Phòng ban</th>
                                    <th th:text="#{hrm.viewContract.title.position}">Vị trí</th>
                                    <th th:text="#{hrm.viewContract.title.salary}">Lương</th>
                                    <th th:text="#{hrm.viewContract.title.activity}">Hoạt động</th>
                                    <th th:text="#{hrm.viewContract.title.createDate}">Ngày tạo</th>
                                    <th th:text="#{hrm.viewContract.title.action}">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data will be loaded by DataTables -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- DataTables JavaScript -->
    <template id="fragmentScripts">
        <script th:inline="none">
            $(document).ready(function () {
                // Get CSRF token
                var csrfToken = $('meta[name="_csrf"]').attr('content');
                var csrfHeader = $('meta[name="_csrf_header"]').attr('content');

                // Initialize DataTable
                try {
                    // Check if DataTable already exists and destroy it
                    if ($.fn.DataTable.isDataTable('#contractsTableForSearch')) {
                        $('#contractsTableForSearch').DataTable().destroy();
                    }

                    var table = $('#contractsTableForSearch').DataTable({
                        processing: true,
                        serverSide: true,
                        ajax: {
                            url: '/hrm/contractInfo/contracts',
                            type: 'POST',
                            contentType: 'application/json',
                            beforeSend: function (xhr) {
                                console.log('Sending DataTables request to:', '/hrm/contractInfo/contracts');
                            },
                            headers: (function () {
                                var headers = {
                                    'X-Requested-With': 'XMLHttpRequest',
                                    'Content-Type': 'application/json'
                                };
                                if (csrfToken && csrfHeader) {
                                    headers[csrfHeader] = csrfToken;
                                }
                                return headers;
                            })(),
                            data: function (d) {
                                // Add search form parameters
                                d.contractNo = document.getElementById('searchContractNoForSearch').value;
                                d.empId = document.getElementById('searchEmpIdForSearch').value;
                                d.contractType = document.getElementById('searchContractTypeForSearch').value;
                                d.department = document.getElementById('searchDepartmentForSearch').value;
                                d.startDateFrom = document.getElementById('searchStartDateFromForSearch').value;
                                d.startDateTo = document.getElementById('searchStartDateToForSearch').value;
                                d.endDateFrom = document.getElementById('searchEndDateFromForSearch').value;
                                d.endDateTo = document.getElementById('searchEndDateToForSearch').value;
                                d.activity = document.getElementById('searchActivityForSearch').value;
                                d.workPosition = document.getElementById('searchWorkPositionForSearch').value;
                                d.salaryFrom = document.getElementById('searchSalaryFromForSearch').value;
                                d.salaryTo = document.getElementById('searchSalaryToForSearch').value;

                                var data = JSON.stringify(d);
                                if (csrfToken && csrfHeader) {
                                    // Add CSRF token if available
                                    var jsonData = JSON.parse(data);
                                    jsonData._csrf = csrfToken;
                                    data = JSON.stringify(jsonData);
                                }
                                return data;
                            },
                            dataSrc: function (json) {
                                if (json.error) {
                                    showErrorForSearch(json.error);
                                    return [];
                                }
                                return json.data;
                            },
                            error: function (xhr, error, thrown) {
                                console.error('DataTables AJAX error:', error);
                                showErrorForSearch('Lỗi khi tải dữ liệu: ' + (xhr.responseJSON?.error || thrown));
                            }
                        },
                        columns: [
                            {
                                data: null,
                                orderable: false,
                                searchable: false,
                                render: function (data, type, row, meta) {
                                    return meta.row + meta.settings._iDisplayStart + 1;
                                }
                            },
                            {
                                data: 'contractNo',
                                render: function (data, type, row) {
                                    return '<span class="badge bg-primary">' + (data || '') + '</span>';
                                }
                            },
                            {
                                data: 'empId',
                                render: function (data, type, row) {
                                    return '<span class="badge bg-info">' + (data || '') + '</span>';
                                }
                            },
                            { data: 'contractName' },
                            { data: 'contractTypeName' },
                            {
                                data: 'startContractDate',
                                render: function (data, type, row) {
                                    if (data) {
                                        var date = new Date(data);
                                        return '<small>' + date.toLocaleDateString('vi-VN') + '</small>';
                                    }
                                    return '<small class="text-muted">-</small>';
                                }
                            },
                            {
                                data: 'endContractDate',
                                render: function (data, type, row) {
                                    if (data) {
                                        var date = new Date(data);
                                        return '<small>' + date.toLocaleDateString('vi-VN') + '</small>';
                                    }
                                    return '<small class="text-muted">-</small>';
                                }
                            },
                            { data: 'deptNo' },
                            { data: 'workPosition' },
                            {
                                data: 'salary',
                                render: function (data, type, row) {
                                    if (data) {
                                        return '<span class="text-success fw-bold">' +
                                            new Intl.NumberFormat('vi-VN').format(data) + ' VNĐ</span>';
                                    }
                                    return '<small class="text-muted">-</small>';
                                }
                            },
                            {
                                data: 'activity',
                                render: function (data, type, row) {
                                    if (data === 'ACTIVE') {
                                        return '<span class="badge bg-success">Hoạt động</span>';
                                    } else {
                                        return '<span class="badge bg-secondary">Không hoạt động</span>';
                                    }
                                }
                            },
                            {
                                data: 'createDate',
                                render: function (data, type, row) {
                                    if (data) {
                                        var date = new Date(data);
                                        return '<small>' + date.toLocaleDateString('vi-VN') + ' ' +
                                            date.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' }) + '</small>';
                                    }
                                    return '<small class="text-muted">-</small>';
                                }
                            },
                            {
                                data: null,
                                orderable: false,
                                searchable: false,
                                render: function (data, type, row) {
                                    return '<div class="btn-group btn-group-sm">' +
                                        '<button type="button" class="btn btn-outline-primary" title="Xem chi tiết" onclick="viewContractForSearch(\'' + row.contractNo + '\')">' +
                                        '<i class="bx bx-show"></i>' +
                                        '</button>' +
                                        '</div>';
                                }
                            }
                        ],
                        pageLength: 10,
                        order: [[5, 'desc']], // Sort by start date descending
                        lengthMenu: [[10, 25, 50, 100, -1], [10, 25, 50, 100, "Tất cả"]],
                        responsive: true,
                        autoWidth: false,
                        scrollY: "calc(100vh - 280px)",
                        scrollCollapse: true,
                        paging: true,
                        dom: 'lBfrtip',
                        buttons: [
                            {
                                extend: 'copy',
                                text: 'Sao chép',
                                className: 'btn btn-sm btn-outline-secondary'
                            },
                            {
                                extend: 'csv',
                                text: 'Xuất CSV',
                                className: 'btn btn-sm btn-outline-success'
                            },
                            {
                                extend: 'excel',
                                text: 'Xuất Excel',
                                className: 'btn btn-sm btn-outline-success'
                            },
                            {
                                extend: 'pdf',
                                text: 'Xuất PDF',
                                className: 'btn btn-sm btn-outline-danger'
                            },
                            {
                                extend: 'print',
                                text: 'In',
                                className: 'btn btn-sm btn-outline-info'
                            }
                        ],
                        language: {
                            processing: "Đang xử lý...",
                            lengthMenu: "Hiển thị _MENU_ bản ghi",
                            zeroRecords: "Không tìm thấy dữ liệu",
                            info: "Hiển thị _START_ đến _END_ của _TOTAL_ bản ghi",
                            infoEmpty: "Hiển thị 0 đến 0 của 0 bản ghi",
                            infoFiltered: "(được lọc từ _MAX_ tổng số bản ghi)",
                            search: "Tìm kiếm:",
                            paginate: {
                                first: "Đầu",
                                last: "Cuối",
                                next: "Tiếp",
                                previous: "Trước"
                            }
                        }
                    });

                } catch (error) {
                    console.error('Error initializing DataTable:', error);
                    showErrorForSearch('Lỗi khởi tạo DataTable: ' + error.message);
                }

                // Function to show error message
                function showErrorForSearch(message) {
                    $('#error-text-forsearch').text(message);
                    $('#error-message-forsearch').removeClass('d-none');
                    setTimeout(function () {
                        $('#error-message-forsearch').addClass('d-none');
                    }, 5000);
                }
            });
        </script>

        <!-- Search Functions -->
        <script>
            // Data for search functions in global scope with unique names

            window.performSearchForSearch = function () {
                if ($.fn.DataTable.isDataTable('#contractsTableForSearch')) {
                    $('#contractsTableForSearch').DataTable().ajax.reload();
                }
            };

            window.clearSearchForSearch = function () {
                document.getElementById('contractSearchFormForSearch').reset();
                if ($.fn.DataTable.isDataTable('#contractsTableForSearch')) {
                    $('#contractsTableForSearch').DataTable().ajax.reload();
                }
            };

            window.exportSearchResultsForSearch = function () {
                const searchParams = {
                    contractNo: document.getElementById('searchContractNoForSearch').value,
                    empId: document.getElementById('searchEmpIdForSearch').value,
                    contractType: document.getElementById('searchContractTypeForSearch').value,
                    department: document.getElementById('searchDepartmentForSearch').value,
                    startDateFrom: document.getElementById('searchStartDateFromForSearch').value,
                    startDateTo: document.getElementById('searchStartDateToForSearch').value,
                    endDateFrom: document.getElementById('searchEndDateFromForSearch').value,
                    endDateTo: document.getElementById('searchEndDateToForSearch').value,
                    activity: document.getElementById('searchActivityForSearch').value,
                    workPosition: document.getElementById('searchWorkPositionForSearch').value,
                    salaryFrom: document.getElementById('searchSalaryFromForSearch').value,
                    salaryTo: document.getElementById('searchSalaryToForSearch').value
                };

                let exportUrl = '/hrm/contractInfo/export?';
                const params = new URLSearchParams();

                Object.keys(searchParams).forEach(key => {
                    if (searchParams[key]) {
                        params.append(key, searchParams[key]);
                    }
                });

                exportUrl += params.toString();
                window.open(exportUrl, '_blank');
            };

            window.viewContractForSearch = function (contractNo) {
                $.ajax({
                    url: '/hrm/contractInfo/api/contract/' + contractNo,
                    type: 'GET',
                    success: function (response) {
                        showContractDetailsForSearch(response);
                    },
                    error: function (xhr, status, error) {
                        alert('Lỗi khi tải chi tiết hợp đồng: ' + error);
                    }
                });
            };

            window.showContractDetailsForSearch = function (contract) {
                const detailsHtml = `
                <div class="modal fade" id="viewContractModalForSearch" tabindex="-1">
                    <div class="modal-dialog modal-lg">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">Chi tiết hợp đồng: ${contract.contractNo}</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <div class="row">
                                    <div class="col-md-6">
                                        <h6>Thông tin cơ bản</h6>
                                        <table class="table table-sm">
                                            <tr><td><strong>Số hợp đồng:</strong></td><td>${contract.contractNo || '-'}</td></tr>
                                            <tr><td><strong>Tên hợp đồng:</strong></td><td>${contract.contractName || '-'}</td></tr>
                                            <tr><td><strong>Mã nhân viên:</strong></td><td>${contract.empId || '-'}</td></tr>
                                            <tr><td><strong>Loại hợp đồng:</strong></td><td>${contract.contractType || '-'}</td></tr>
                                            <tr><td><strong>Ngày bắt đầu:</strong></td><td>${contract.startContractDate || '-'}</td></tr>
                                            <tr><td><strong>Ngày kết thúc:</strong></td><td>${contract.endContractDate || '-'}</td></tr>
                                        </table>
                                    </div>
                                    <div class="col-md-6">
                                        <h6>Thông tin công việc</h6>
                                        <table class="table table-sm">
                                            <tr><td><strong>Phòng ban:</strong></td><td>${contract.deptNo || '-'}</td></tr>
                                            <tr><td><strong>Vị trí:</strong></td><td>${contract.workPosition || '-'}</td></tr>
                                            <tr><td><strong>Lương:</strong></td><td>${contract.salary ? new Intl.NumberFormat('vi-VN').format(contract.salary) + ' VNĐ' : '-'}</td></tr>
                                            <tr><td><strong>Thời gian làm việc:</strong></td><td>${contract.workTime || '-'}</td></tr>
                                            <tr><td><strong>Loại giờ làm:</strong></td><td>${contract.workHourType || '-'}</td></tr>
                                            <tr><td><strong>Hoạt động:</strong></td><td>${contract.activity || '-'}</td></tr>
                                        </table>
                                    </div>
                                </div>
                                <div class="row mt-3">
                                    <div class="col-12">
                                        <h6>Nội dung công việc</h6>
                                        <p class="text-muted">${contract.workContent || 'Không có thông tin'}</p>
                                    </div>
                                </div>
                                <div class="row mt-3">
                                    <div class="col-12">
                                        <h6>Ghi chú</h6>
                                        <p class="text-muted">${contract.remark || 'Không có ghi chú'}</p>
                                    </div>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;

                $('#viewContractModalForSearch').remove();
                $('body').append(detailsHtml);
                $('#viewContractModalForSearch').modal('show');
            };
        </script>
    </template>
</div>
