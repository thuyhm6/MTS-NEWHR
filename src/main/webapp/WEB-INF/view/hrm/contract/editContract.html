<!-- Edit Contract Modal -->
<div th:fragment="content">
    <!-- Edit Contract Modal -->
    <div class="modal fade" id="contractEditModal" tabindex="-1" aria-labelledby="contractEditModalLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="contractEditModalLabel" th:text="#{hrm.editContract.title.editTitle}">Chỉnh sửa thông tin hợp đồng</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="contractEditForm">
                        <div class="row">
                            <!-- Basic Information -->
                            <div class="col-md-6">
                                <h6 class="text-primary mb-3" th:text="#{hrm.editContract.title.basicInfo}">Thông tin cơ bản</h6>

                                <div class="mb-3">
                                    <label for="contractEditContractNo" class="form-label" th:text="#{hrm.editContract.title.contractNo}">Số hợp đồng <span
                                            class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="contractEditContractNo"
                                        name="contractNo" required readonly>
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditEmpId" class="form-label" th:text="#{hrm.editContract.title.empId}">Mã nhân viên <span
                                            class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="contractEditEmpId" name="empId"
                                        required>
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditContractName" class="form-label" th:text="#{hrm.editContract.title.contractName}">Tên hợp đồng <span
                                            class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="contractEditContractName"
                                        name="contractName" required>
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditContractType" class="form-label" th:text="#{hrm.editContract.title.contractType}">Loại hợp đồng</label>
                                    <select class="form-select" id="contractEditContractType" name="contractType">
                                        <option value="FULL_TIME" th:text="#{hrm.editContract.title.fullTime}">Toàn thời gian</option>
                                        <option value="PART_TIME" th:text="#{hrm.editContract.title.partTime}">Bán thời gian</option>
                                        <option value="INTERN" th:text="#{hrm.editContract.title.intern}">Thực tập</option>
                                        <option value="CONSULTANT" th:text="#{hrm.editContract.title.consultant}">Tư vấn</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditContractTypeCode" class="form-label" th:text="#{hrm.editContract.title.contractTypeCode}">Mã loại hợp
                                        đồng</label>
                                    <input type="text" class="form-control" id="contractEditContractTypeCode"
                                        name="contractTypeCode">
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditStartContractDate" class="form-label" th:text="#{hrm.editContract.title.startContractDate}">Ngày bắt đầu hợp
                                        đồng</label>
                                    <input type="date" class="form-control" id="contractEditStartContractDate"
                                        name="startContractDate">
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditEndContractDate" class="form-label" th:text="#{hrm.editContract.title.endContractDate}">Ngày kết thúc hợp
                                        đồng</label>
                                    <input type="date" class="form-control" id="contractEditEndContractDate"
                                        name="endContractDate">
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditChangeDate" class="form-label" th:text="#{hrm.editContract.title.changeDate}">Ngày thay đổi</label>
                                    <input type="date" class="form-control" id="contractEditChangeDate"
                                        name="changeDate">
                                </div>
                            </div>

                            <!-- Work Information -->
                            <div class="col-md-6">
                                <h6 class="text-primary mb-3" th:text="#{hrm.editContract.title.workInfo}">Thông tin công việc</h6>

                                <div class="mb-3">
                                    <label for="contractEditDeptno" class="form-label" th:text="#{hrm.editContract.title.dept}">Phòng ban</label>
                                    <input type="text" class="form-control" id="contractEditDeptno" name="deptno">
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditWorkPosition" class="form-label" th:text="#{hrm.editContract.title.workPosition}">Vị trí làm việc</label>
                                    <input type="text" class="form-control" id="contractEditWorkPosition"
                                        name="workPosition">
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditPositionNo" class="form-label" th:text="#{hrm.editContract.title.positionNo}">Mã chức vụ</label>
                                    <input type="text" class="form-control" id="contractEditPositionNo"
                                        name="positionNo">
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditPostGradeNo" class="form-label" th:text="#{hrm.editContract.title.postGradeNo}">Mã cấp bậc</label>
                                    <input type="text" class="form-control" id="contractEditPostGradeNo"
                                        name="postGradeNo">
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditSalary" class="form-label" th:text="#{hrm.editContract.title.salary}">Lương</label>
                                    <input type="number" class="form-control" id="contractEditSalary" name="salary"
                                        min="0">
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditWorkTime" class="form-label" th:text="#{hrm.editContract.title.workTime}">Thời gian làm việc</label>
                                    <input type="text" class="form-control" id="contractEditWorkTime" name="workTime">
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditWorkHourType" class="form-label" th:text="#{hrm.editContract.title.workHourType}">Loại giờ làm việc</label>
                                    <select class="form-select" id="contractEditWorkHourType" name="workHourType">
                                        <option value="" th:text="#{hrm.editContract.title.selectWorkHourType}">Chọn loại giờ làm việc</option>
                                        <option value="FULL_TIME" th:text="#{hrm.editContract.title.fullTime}">Toàn thời gian</option>
                                        <option value="PART_TIME" th:text="#{hrm.editContract.title.partTime}">Bán thời gian</option>
                                        <option value="OVERTIME" th:text="#{hrm.editContract.title.overtime}">Tăng ca</option>
                                        <option value="FLEXIBLE" th:text="#{hrm.editContract.title.flexible}">Linh hoạt</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditTotalPeriod" class="form-label" th:text="#{hrm.editContract.title.totalPeriod}">Tổng thời gian</label>
                                    <input type="text" class="form-control" id="contractEditTotalPeriod"
                                        name="totalPeriod">
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditTotalPeriod08" class="form-label" th:text="#{hrm.editContract.title.totalPeriod08}">Tổng thời gian 08</label>
                                    <input type="text" class="form-control" id="contractEditTotalPeriod08"
                                        name="totalPeriod08">
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditActivity" class="form-label" th:text="#{hrm.editContract.title.activity}">Trạng thái hoạt động</label>
                                    <select class="form-select" id="contractEditActivity" name="activity">
                                        <option value="ACTIVE" th:text="#{hrm.editContract.title.active}">Hoạt động</option>
                                        <option value="INACTIVE" th:text="#{hrm.editContract.title.inactive}">Không hoạt động</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- Work Content and Remarks -->
                        <div class="row mt-3">
                            <div class="col-12">
                                <h6 class="text-primary mb-3" th:text="#{hrm.editContract.title.contentAndRemark}">Nội dung và ghi chú</h6>

                                <div class="mb-3">
                                    <label for="contractEditWorkContent" class="form-label" th:text="#{hrm.editContract.title.workContent}">Nội dung công việc</label>
                                    <textarea class="form-control" id="contractEditWorkContent" name="workContent"
                                        rows="4" th:placeholder="#{hrm.editContract.title.workContentPlaceholder}">Mô tả chi tiết nội dung công việc...</textarea>
                                </div>

                                <div class="mb-3">
                                    <label for="contractEditRemark" class="form-label" th:text="#{hrm.editContract.title.remark}">Ghi chú</label>
                                    <textarea class="form-control" id="contractEditRemark" name="remark" rows="3"
                                        th:placeholder="#{hrm.editContract.title.remarkPlaceholder}">Ghi chú thêm về hợp đồng...</textarea>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        <i class="bx bx-x me-1"></i> <span th:text="#{hrm.editContract.title.cancel}">Hủy</span>
                    </button>
                    <button type="button" class="btn btn-primary" onclick="contractSaveChanges()">
                        <i class="bx bx-save me-1"></i> <span th:text="#{hrm.editContract.title.saveChanges}">Lưu thay đổi</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Contract Modal -->
    <div class="modal fade" id="contractAddModal" tabindex="-1" aria-labelledby="contractAddModalLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="contractAddModalLabel" th:text="#{hrm.editContract.title.addTitle}">Thêm mới hợp đồng</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="contractAddForm">
                        <div class="row">
                            <!-- Basic Information -->
                            <div class="col-md-6">
                                <h6 class="text-primary mb-3" th:text="#{hrm.editContract.title.basicInfo}">Thông tin cơ bản</h6>

                                <div class="mb-3">
                                    <label for="contractAddContractNo" class="form-label" th:text="#{hrm.editContract.title.contractNo}">Số hợp đồng <span
                                            class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="contractAddContractNo" name="contractNo"
                                        required>
                                </div>

                                <div class="mb-3">
                                    <label for="contractAddEmpId" class="form-label" th:text="#{hrm.editContract.title.empId}">Mã nhân viên <span
                                            class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <input type="text" class="form-control" id="contractAddEmpId" name="empId"
                                            required readonly>
                                        <button type="button" class="btn btn-outline-primary"
                                            onclick="contractOpenEmployeeSearchModal()">
                                            <i class="bx bx-search"></i> <span th:text="#{hrm.editContract.title.search}">Tìm</span>
                                        </button>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="contractAddContractName" class="form-label" th:text="#{hrm.editContract.title.contractName}">Tên hợp đồng <span
                                            class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="contractAddContractName"
                                        name="contractName" required>
                                </div>

                                <div class="mb-3">
                                    <label for="contractAddContractType" class="form-label" th:text="#{hrm.editContract.title.contractType}">Loại hợp đồng</label>
                                    <select class="form-select" id="contractAddContractType" name="contractType">
                                        <option value="FULL_TIME" th:text="#{hrm.editContract.title.fullTime}">Toàn thời gian</option>
                                        <option value="PART_TIME" th:text="#{hrm.editContract.title.partTime}">Bán thời gian</option>
                                        <option value="INTERN" th:text="#{hrm.editContract.title.intern}">Thực tập</option>
                                        <option value="CONSULTANT" th:text="#{hrm.editContract.title.consultant}">Tư vấn</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="contractAddContractTypeCode" class="form-label" th:text="#{hrm.editContract.title.contractTypeCode}">Mã loại hợp đồng</label>
                                    <input type="text" class="form-control" id="contractAddContractTypeCode"
                                        name="contractTypeCode">
                                </div>

                                <div class="mb-3">
                                    <label for="contractAddStartContractDate" class="form-label" th:text="#{hrm.editContract.title.startContractDate}">Ngày bắt đầu hợp
                                        đồng</label>
                                    <input type="date" class="form-control" id="contractAddStartContractDate"
                                        name="startContractDate">
                                </div>

                                <div class="mb-3">
                                    <label for="contractAddEndContractDate" class="form-label" th:text="#{hrm.editContract.title.endContractDate}">Ngày kết thúc hợp
                                        đồng</label>
                                    <input type="date" class="form-control" id="contractAddEndContractDate"
                                        name="endContractDate">
                                </div>

                                <div class="mb-3">
                                    <label for="contractAddChangeDate" class="form-label" th:text="#{hrm.editContract.title.changeDate}">Ngày thay đổi</label>
                                    <input type="date" class="form-control" id="contractAddChangeDate"
                                        name="changeDate">
                                </div>
                            </div>

                            <!-- Work Information -->
                            <div class="col-md-6">
                                <h6 class="text-primary mb-3" th:text="#{hrm.editContract.title.workInfo}">Thông tin công việc</h6>

                                <div class="mb-3">
                                    <label for="contractAddDeptno" class="form-label" th:text="#{hrm.editContract.title.dept}">Phòng ban</label>
                                    <input type="text" class="form-control" id="contractAddDeptno" name="deptno">
                                </div>

                                <div class="mb-3">
                                    <label for="contractAddWorkPosition" class="form-label" th:text="#{hrm.editContract.title.workPosition}">Vị trí làm việc</label>
                                    <input type="text" class="form-control" id="contractAddWorkPosition"
                                        name="workPosition">
                                </div>

                                <div class="mb-3">
                                    <label for="contractAddPositionNo" class="form-label" th:text="#{hrm.editContract.title.positionNo}">Mã chức vụ</label>
                                    <input type="text" class="form-control" id="contractAddPositionNo"
                                        name="positionNo">
                                </div>

                                <div class="mb-3">
                                    <label for="contractAddPostGradeNo" class="form-label" th:text="#{hrm.editContract.title.postGradeNo}">Mã cấp bậc</label>
                                    <input type="text" class="form-control" id="contractAddPostGradeNo"
                                        name="postGradeNo">
                                </div>

                                <div class="mb-3">
                                    <label for="contractAddSalary" class="form-label" th:text="#{hrm.editContract.title.salary}">Lương</label>
                                    <input type="number" class="form-control" id="contractAddSalary" name="salary"
                                        min="0">
                                </div>

                                <div class="mb-3">
                                    <label for="contractAddWorkTime" class="form-label" th:text="#{hrm.editContract.title.workTime}">Thời gian làm việc</label>
                                    <input type="text" class="form-control" id="contractAddWorkTime" name="workTime">
                                </div>

                                <div class="mb-3">
                                    <label for="contractAddWorkHourType" class="form-label" th:text="#{hrm.editContract.title.workHourType}">Loại giờ làm việc</label>
                                    <select class="form-select" id="contractAddWorkHourType" name="workHourType">
                                        <option value="" th:text="#{hrm.editContract.title.selectWorkHourType}">Chọn loại giờ làm việc</option>
                                        <option value="FULL_TIME" th:text="#{hrm.editContract.title.fullTime}">Toàn thời gian</option>
                                        <option value="PART_TIME" th:text="#{hrm.editContract.title.partTime}">Bán thời gian</option>
                                        <option value="OVERTIME" th:text="#{hrm.editContract.title.overtime}">Tăng ca</option>
                                        <option value="FLEXIBLE" th:text="#{hrm.editContract.title.flexible}">Linh hoạt</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="contractAddTotalPeriod" class="form-label" th:text="#{hrm.editContract.title.totalPeriod}">Tổng thời gian</label>
                                    <input type="text" class="form-control" id="contractAddTotalPeriod"
                                        name="totalPeriod">
                                </div>

                                <div class="mb-3">
                                    <label for="contractAddTotalPeriod08" class="form-label" th:text="#{hrm.editContract.title.totalPeriod08}">Tổng thời gian 08</label>
                                    <input type="text" class="form-control" id="contractAddTotalPeriod08"
                                        name="totalPeriod08">
                                </div>

                                <div class="mb-3">
                                    <label for="contractAddActivity" class="form-label" th:text="#{hrm.editContract.title.activity}">Trạng thái hoạt động</label>
                                    <select class="form-select" id="contractAddActivity" name="activity">
                                        <option value="ACTIVE" th:text="#{hrm.editContract.title.active}">Hoạt động</option>
                                        <option value="INACTIVE" th:text="#{hrm.editContract.title.inactive}">Không hoạt động</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- Work Content and Remarks -->
                        <div class="row mt-3">
                            <div class="col-12">
                                <h6 class="text-primary mb-3" th:text="#{hrm.editContract.title.contentAndRemark}">Nội dung và ghi chú</h6>

                                <div class="mb-3">
                                    <label for="contractAddWorkContent" class="form-label" th:text="#{hrm.editContract.title.workContent}">Nội dung công việc</label>
                                    <textarea class="form-control" id="contractAddWorkContent" name="workContent"
                                        rows="4" th:placeholder="#{hrm.editContract.title.workContentPlaceholder}">Mô tả chi tiết nội dung công việc...</textarea>
                                </div>

                                <div class="mb-3">
                                    <label for="contractAddRemark" class="form-label" th:text="#{hrm.editContract.title.remark}">Ghi chú</label>
                                    <textarea class="form-control" id="contractAddRemark" name="remark" rows="3"
                                        th:placeholder="#{hrm.editContract.title.remarkPlaceholder}">Ghi chú thêm về hợp đồng...</textarea>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        <i class="bx bx-x me-1"></i> <span th:text="#{hrm.editContract.title.cancel}">Hủy</span>
                    </button>
                    <button type="button" class="btn btn-success" onclick="contractSaveNew()">
                        <i class="bx bx-plus me-1"></i> <span th:text="#{hrm.editContract.title.addNew}">Thêm mới</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
