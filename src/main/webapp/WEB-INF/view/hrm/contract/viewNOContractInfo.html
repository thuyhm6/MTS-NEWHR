<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <!-- Data Table with DataTables -->
            <div class="card">
                <!-- Search Form -->
                <div class="card-body">
                    <div class="row">
                        <div class="col-12">
                            <div class="card">
                                <div class="card-body p-1">
                                    <form class="searchForm" id="contractSearchForm">
                                        <div class="row g-3">
                                            <div class="col-md-2">
                                                <label for="contractSearchNo" class="form-label" th:text="#{hrm.viewNOContract.title.contractNo}">Số hợp đồng</label>
                                                <input type="text" class="form-control" id="contractSearchNo"
                                                    name="contractNo" th:placeholder="#{hrm.viewContract.title.contractNoPlaceholder}" placeholder="Nhập số hợp đồng">
                                            </div>
                                            <div class="col-md-2">
                                                <label for="contractSearchEmpId" class="form-label" th:text="#{hrm.viewNOContract.title.empId}">Mã nhân viên</label>
                                                <input type="text" class="form-control" id="contractSearchEmpId"
                                                    name="empId" th:placeholder="#{hrm.viewContract.title.empIdPlaceholder}" placeholder="Nhập mã nhân viên">
                                            </div>
                                            <div class="col-md-2">
                                                <label for="contractSearchType" class="form-label" th:text="#{hrm.viewNOContract.title.contractType}">Loại hợp đồng</label>
                                                <select class="form-select" id="contractSearchType" name="contractType">
                                                    <option value="" th:text="#{hrm.viewContract.title.all}">Tất cả</option>
                                                    <option value="FULL_TIME" th:text="#{hrm.editContract.title.fullTime}">Toàn thời gian</option>
                                                    <option value="PART_TIME" th:text="#{hrm.editContract.title.partTime}">Bán thời gian</option>
                                                    <option value="INTERN" th:text="#{hrm.editContract.title.intern}">Thực tập</option>
                                                    <option value="CONSULTANT" th:text="#{hrm.editContract.title.consultant}">Tư vấn</option>
                                                </select>
                                            </div>
                                            <div class="col-md-2">
                                                <label for="contractSearchDept" class="form-label" th:text="#{hrm.viewNOContract.title.dept}">Phòng ban</label>
                                                <input type="text" class="form-control" id="contractSearchDept"
                                                    name="department" th:placeholder="#{hrm.viewContract.title.deptPlaceholder}" placeholder="Nhập phòng ban">
                                            </div>
                                            <div class="col-md-2">
                                                <label for="contractSearchStartDateFrom" class="form-label" th:text="#{hrm.viewContract.title.startDateFrom}">Ngày bắt đầu
                                                    từ</label>
                                                <input type="date" class="form-control" id="contractSearchStartDateFrom"
                                                    name="startDateFrom">
                                            </div>
                                            <div class="col-md-2">
                                                <label for="contractSearchStartDateTo" class="form-label" th:text="#{hrm.viewContract.title.startDateTo}">Ngày bắt đầu
                                                    đến</label>
                                                <input type="date" class="form-control" id="contractSearchStartDateTo"
                                                    name="startDateTo">
                                            </div>
                                            <div class="col-md-2">
                                                <label for="contractSearchEndDateFrom" class="form-label" th:text="#{hrm.viewContract.title.endDateFrom}">Ngày kết thúc
                                                    từ</label>
                                                <input type="date" class="form-control" id="contractSearchEndDateFrom"
                                                    name="endDateFrom">
                                            </div>
                                            <div class="col-md-2">
                                                <label for="contractSearchEndDateTo" class="form-label" th:text="#{hrm.viewContract.title.endDateTo}">Ngày kết thúc
                                                    đến</label>
                                                <input type="date" class="form-control" id="contractSearchEndDateTo"
                                                    name="endDateTo">
                                            </div>
                                            <div class="col-md-2">
                                                <label for="contractSearchActivity" class="form-label" th:text="#{hrm.viewNOContract.title.activity}">Hoạt động</label>
                                                <select class="form-select" id="contractSearchActivity" name="activity">
                                                    <option value="" th:text="#{hrm.viewContract.title.all}">Tất cả</option>
                                                    <option value="ACTIVE" th:text="#{hrm.editContract.title.active}">Hoạt động</option>
                                                    <option value="INACTIVE" th:text="#{hrm.editContract.title.inactive}">Không hoạt động</option>
                                                </select>
                                            </div>
                                            <div class="col-md-2">
                                                <label for="contractSearchWorkPos" class="form-label" th:text="#{hrm.viewNOContract.title.workPosition}">Vị trí làm
                                                    việc</label>
                                                <input type="text" class="form-control" id="contractSearchWorkPos"
                                                    name="workPosition" th:placeholder="#{hrm.viewContract.title.workPositionPlaceholder}" placeholder="Nhập vị trí làm việc">
                                            </div>
                                            <div class="col-md-2">
                                                <label for="contractSearchSalaryFrom" class="form-label" th:text="#{hrm.viewContract.title.salaryFrom}">Lương
                                                    từ</label>
                                                <input type="number" class="form-control" id="contractSearchSalaryFrom"
                                                    name="salaryFrom" th:placeholder="#{hrm.viewContract.title.salaryFromPlaceholder}" placeholder="Nhập lương tối thiểu">
                                            </div>
                                            <div class="col-md-2">
                                                <label for="contractSearchSalaryTo" class="form-label" th:text="#{hrm.viewContract.title.salaryTo}">Lương đến</label>
                                                <input type="number" class="form-control" id="contractSearchSalaryTo"
                                                    name="salaryTo" th:placeholder="#{hrm.viewContract.title.salaryToPlaceholder}" placeholder="Nhập lương tối đa">
                                            </div>
                                        </div>
                                        <div class="row mt-3">
                                            <div class="col-12">
                                                <button type="button" class="btn btn-success"
                                                    onclick="contractAddNew()">
                                                    <i class="bx bx-plus me-1"></i> <span th:text="#{hrm.editContract.title.addNew}">Thêm mới</span>
                                                </button>
                                                <button type="button" class="btn btn-primary ms-2"
                                                    onclick="contractPerformSearch()">
                                                    <i class="bx bx-search me-1"></i> <span th:text="#{hrm.viewContract.title.search}">Tìm kiếm</span>
                                                </button>
                                                <button type="button" class="btn btn-secondary ms-2"
                                                    onclick="contractClearSearch()">
                                                    <i class="bx bx-x me-1"></i> <span th:text="#{hrm.viewContract.title.clearFilter}">Xóa bộ lọc</span>
                                                </button>
                                                <button type="button" class="btn btn-outline-info ms-2"
                                                    onclick="contractExportSearchResults()">
                                                    <i class="bx bx-download me-1"></i> <span th:text="#{hrm.viewContract.title.exportResult}">Xuất kết quả</span>
                                                </button>
                                            </div>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Include Edit Contract Modal -->
                <div th:replace="~{hrm/contract/editContract :: content}"></div>
                <div class="card-body">
                    <!-- Error Message -->
                    <div id="error-message" class="alert alert-danger d-none" role="alert">
                        <i class="bx bx-error"></i>
                        <span id="error-text"></span>
                    </div>

                    <!-- DataTables Table -->
                    <div class="table-responsive">
                        <table id="contractsTable" class="table table-striped table-hover">
                            <thead class="table-dark">
                                <tr>
                                    <th th:text="#{hrm.viewContract.title.stt}">STT</th>
                                    <th th:text="#{hrm.viewContract.title.contractNo}">Số hợp đồng</th>
                                    <th th:text="#{hrm.viewContract.title.empId}">Mã nhân viên</th>
                                    <th th:text="#{hrm.viewContract.title.contractName}">Tên hợp đồng</th>
                                    <th th:text="#{hrm.viewContract.title.contractType}">Loại hợp đồng</th>
                                    <th th:text="#{hrm.viewContract.title.startDate}">Ngày bắt đầu</th>
                                    <th th:text="#{hrm.viewContract.title.endDate}">Ngày kết thúc</th>
                                    <th th:text="#{hrm.viewContract.title.dept}">Phòng ban</th>
                                    <th th:text="#{hrm.viewContract.title.position}">Vị trí</th>
                                    <th th:text="#{hrm.viewContract.title.salary}">Lương</th>
                                    <th th:text="#{hrm.viewContract.title.activity}">Hoạt động</th>
                                    <th th:text="#{hrm.viewContract.title.createDate}">Ngày tạo</th>
                                    <th th:text="#{hrm.viewContract.title.action}">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data will be loaded by DataTables -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- DataTables JavaScript -->
    <template id="fragmentScripts">
        <script th:inline="none">
            $(document).ready(function () {
                // Get CSRF token
                var csrfToken = $('meta[name="_csrf"]').attr('content');
                var csrfHeader = $('meta[name="_csrf_header"]').attr('content');

                // Initialize DataTable
                try {
                    // Check if DataTable already exists and destroy it
                    if ($.fn.DataTable.isDataTable('#contractsTable')) {
                        $('#contractsTable').DataTable().destroy();
                    }

                    var table = $('#contractsTable').DataTable({
                        processing: true,
                        serverSide: true,
                        ajax: {
                            url: '/hrm/contractInfo/contracts',
                            type: 'POST',
                            contentType: 'application/json',
                            beforeSend: function (xhr) {
                                console.log('Sending DataTables request to:', '/hrm/contractInfo/contracts');
                            },
                            headers: (function () {
                                var headers = {
                                    'X-Requested-With': 'XMLHttpRequest',
                                    'Content-Type': 'application/json'
                                };
                                if (csrfToken && csrfHeader) {
                                    headers[csrfHeader] = csrfToken;
                                }
                                return headers;
                            })(),
                            data: function (d) {
                                // Add search form parameters
                                d.contractNo = document.getElementById('contractSearchNo').value;
                                d.empId = document.getElementById('contractSearchEmpId').value;
                                d.contractType = document.getElementById('contractSearchType').value;
                                d.department = document.getElementById('contractSearchDept').value;
                                d.startDateFrom = document.getElementById('contractSearchStartDateFrom').value;
                                d.startDateTo = document.getElementById('contractSearchStartDateTo').value;
                                d.endDateFrom = document.getElementById('contractSearchEndDateFrom').value;
                                d.endDateTo = document.getElementById('contractSearchEndDateTo').value;
                                d.activity = document.getElementById('contractSearchActivity').value;
                                d.workPosition = document.getElementById('contractSearchWorkPos').value;
                                d.salaryFrom = document.getElementById('contractSearchSalaryFrom').value;
                                d.salaryTo = document.getElementById('contractSearchSalaryTo').value;

                                var data = JSON.stringify(d);
                                if (csrfToken && csrfHeader) {
                                    // Add CSRF token if available
                                    var jsonData = JSON.parse(data);
                                    jsonData._csrf = csrfToken;
                                    data = JSON.stringify(jsonData);
                                }
                                return data;
                            },
                            dataSrc: function (json) {
                                if (json.error) {
                                    showError(json.error);
                                    return [];
                                }
                                return json.data;
                            },
                            error: function (xhr, error, thrown) {
                                console.error('DataTables AJAX error:', error);
                                console.error('Response text:', xhr.responseText);
                                console.error('Status:', xhr.status);
                                console.error('Status text:', xhr.statusText);
                                showError('Lỗi khi tải dữ liệu: ' + (xhr.responseJSON?.error || thrown));
                            }
                        },
                        columns: [
                            {
                                data: null,
                                orderable: false,
                                searchable: false,
                                render: function (data, type, row, meta) {
                                    return meta.row + meta.settings._iDisplayStart + 1;
                                }
                            },
                            {
                                data: 'contractNo',
                                render: function (data, type, row) {
                                    return '<span class="badge bg-primary">' + (data || '') + '</span>';
                                }
                            },
                            {
                                data: 'empId',
                                render: function (data, type, row) {
                                    return '<span class="badge bg-info">' + (data || '') + '</span>';
                                }
                            },
                            { data: 'contractName' },
                            { data: 'contractTypeName' },
                            {
                                data: 'startContractDate',
                                render: function (data, type, row) {
                                    if (data) {
                                        var date = new Date(data);
                                        return '<small>' + date.toLocaleDateString('vi-VN') + '</small>';
                                    }
                                    return '<small class="text-muted">-</small>';
                                }
                            },
                            {
                                data: 'endContractDate',
                                render: function (data, type, row) {
                                    if (data) {
                                        var date = new Date(data);
                                        return '<small>' + date.toLocaleDateString('vi-VN') + '</small>';
                                    }
                                    return '<small class="text-muted">-</small>';
                                }
                            },
                            { data: 'deptNo' },
                            { data: 'workPosition' },
                            {
                                data: 'salary',
                                render: function (data, type, row) {
                                    if (data) {
                                        return '<span class="text-success fw-bold">' +
                                            new Intl.NumberFormat('vi-VN').format(data) + ' VNĐ</span>';
                                    }
                                    return '<small class="text-muted">-</small>';
                                }
                            },
                            {
                                data: 'activity',
                                render: function (data, type, row) {
                                    if (data === 'ACTIVE') {
                                        return '<span class="badge bg-success">Hoạt động</span>';
                                    } else {
                                        return '<span class="badge bg-secondary">Không hoạt động</span>';
                                    }
                                }
                            },
                            {
                                data: 'createDate',
                                render: function (data, type, row) {
                                    if (data) {
                                        var date = new Date(data);
                                        return '<small>' + date.toLocaleDateString('vi-VN') + ' ' +
                                            date.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' }) + '</small>';
                                    }
                                    return '<small class="text-muted">-</small>';
                                }
                            },
                            {
                                data: null,
                                orderable: false,
                                searchable: false,
                                render: function (data, type, row) {
                                    return '<div class="btn-group btn-group-sm">' +
                                        '<button type="button" class="btn btn-outline-primary" title="Xem chi tiết" onclick="contractView(\'' + row.contractNo + '\')">' +
                                        '<i class="bx bx-show"></i>' +
                                        '</button>' +
                                        '<button type="button" class="btn btn-outline-warning" title="Chỉnh sửa" onclick="contractEdit(\'' + row.contractNo + '\')">' +
                                        '<i class="bx bx-edit"></i>' +
                                        '</button>' +
                                        '<button type="button" class="btn btn-outline-danger" title="Xóa" onclick="contractDelete(\'' + row.contractNo + '\')">' +
                                        '<i class="bx bx-trash"></i>' +
                                        '</button>' +
                                        '</div>';
                                }
                            }
                        ],
                        pageLength: 10,
                        order: [[5, 'desc']], // Sort by start date descending
                        lengthMenu: [[10, 25, 50, 100, -1], [10, 25, 50, 100, "Tất cả"]],
                        responsive: true,
                        autoWidth: false,
                        scrollY: "calc(100vh - 280px)",
                        scrollCollapse: true,
                        paging: true,
                        fixedHeader: {
                            header: true,
                            headerOffset: 0
                        },
                        language: {
                            processing: "Đang xử lý...",
                            lengthMenu: "Hiển thị _MENU_ bản ghi",
                            zeroRecords: "Không tìm thấy dữ liệu",
                            info: "Hiển thị _START_ đến _END_ của _TOTAL_ bản ghi",
                            infoEmpty: "Hiển thị 0 đến 0 của 0 bản ghi",
                            infoFiltered: "(được lọc từ _MAX_ tổng số bản ghi)",
                            search: "Tìm kiếm:",
                            paginate: {
                                first: "Đầu",
                                last: "Cuối",
                                next: "Tiếp",
                                previous: "Trước"
                            }
                        },
                        dom: 'lBfrtip',
                        buttons: [
                            {
                                extend: 'copy',
                                text: 'Sao chép',
                                className: 'btn btn-sm btn-outline-secondary'
                            },
                            {
                                extend: 'csv',
                                text: 'Xuất CSV',
                                className: 'btn btn-sm btn-outline-success'
                            },
                            {
                                extend: 'excel',
                                text: 'Xuất Excel',
                                className: 'btn btn-sm btn-outline-success'
                            },
                            {
                                extend: 'pdf',
                                text: 'Xuất PDF',
                                className: 'btn btn-sm btn-outline-danger'
                            },
                            {
                                extend: 'print',
                                text: 'In',
                                className: 'btn btn-sm btn-outline-info'
                            }
                        ]
                    });

                    console.log('Contract DataTable initialized successfully');
                    console.log('Scroll height recalculated after render:', getOptimalDataTableHeight());

                } catch (error) {
                    console.error('Error initializing DataTable:', error);
                    showError('Lỗi khởi tạo DataTable: ' + error.message);
                }

                // Function to show error message
                function showError(message) {
                    console.error('Showing error:', message);
                    $('#error-text').text(message);
                    $('#error-message').removeClass('d-none');
                    setTimeout(function () {
                        $('#error-message').addClass('d-none');
                    }, 5000);
                }
            });
        </script>

        <!-- Contract Management Functions -->
        <script>
            // Wait for jQuery to be ready
            $(document).ready(function () {
                console.log('Contract management functions ready');

                // Search form functions
                window.contractPerformSearch = function () {
                    console.log('Performing contract search...');

                    // Reload DataTable with search parameters
                    if ($.fn.DataTable.isDataTable('#contractsTable')) {
                        $('#contractsTable').DataTable().ajax.reload();
                    }
                };

                window.contractClearSearch = function () {
                    console.log('Clearing contract search...');

                    // Clear all form fields
                    document.getElementById('contractSearchNo').value = '';
                    document.getElementById('contractSearchEmpId').value = '';
                    document.getElementById('contractSearchType').value = '';
                    document.getElementById('contractSearchDept').value = '';
                    document.getElementById('contractSearchStartDateFrom').value = '';
                    document.getElementById('contractSearchStartDateTo').value = '';
                    document.getElementById('contractSearchEndDateFrom').value = '';
                    document.getElementById('contractSearchEndDateTo').value = '';
                    document.getElementById('contractSearchActivity').value = '';
                    document.getElementById('contractSearchWorkPos').value = '';
                    document.getElementById('contractSearchSalaryFrom').value = '';
                    document.getElementById('contractSearchSalaryTo').value = '';

                    // Reload DataTable without search parameters
                    if ($.fn.DataTable.isDataTable('#contractsTable')) {
                        $('#contractsTable').DataTable().ajax.reload();
                    }
                };

                window.contractExportSearchResults = function () {
                    console.log('Exporting contract search results...');

                    // Get current search parameters
                    const searchParams = {
                        contractNo: document.getElementById('contractSearchNo').value,
                        empId: document.getElementById('contractSearchEmpId').value,
                        contractType: document.getElementById('contractSearchType').value,
                        department: document.getElementById('contractSearchDept').value,
                        startDateFrom: document.getElementById('contractSearchStartDateFrom').value,
                        startDateTo: document.getElementById('contractSearchStartDateTo').value,
                        endDateFrom: document.getElementById('contractSearchEndDateFrom').value,
                        endDateTo: document.getElementById('contractSearchEndDateTo').value,
                        activity: document.getElementById('contractSearchActivity').value,
                        workPosition: document.getElementById('contractSearchWorkPos').value,
                        salaryFrom: document.getElementById('contractSearchSalaryFrom').value,
                        salaryTo: document.getElementById('contractSearchSalaryTo').value
                    };

                    // Create export URL with parameters
                    let exportUrl = '/hrm/contractInfo/export?';
                    const params = new URLSearchParams();

                    Object.keys(searchParams).forEach(key => {
                        if (searchParams[key]) {
                            params.append(key, searchParams[key]);
                        }
                    });

                    exportUrl += params.toString();

                    // Open export URL
                    window.open(exportUrl, '_blank');
                };

                // CRUD Operations
                window.contractAddNew = function () {
                    console.log('Opening add new contract modal');

                    // Clear form
                    contractClearAddForm();

                    // Show modal
                    $('#contractAddModal').modal('show');
                };

                window.contractClearAddForm = function () {
                    $('#contractAddForm')[0].reset();
                    // Set default values
                    $('#contractAddActivity').val('ACTIVE');
                    $('#contractAddContractType').val('FULL_TIME');
                };

                window.contractSaveNew = function () {
                    // Validate form
                    if (!contractValidateAddForm()) {
                        return;
                    }

                    const formData = {
                        contractNo: $('#contractAddContractNo').val(),
                        empId: $('#contractAddEmpId').val(),
                        contractTypeCode: $('#contractAddContractTypeCode').val(),
                        startContractDate: $('#contractAddStartContractDate').val(),
                        endContractDate: $('#contractAddEndContractDate').val(),
                        remark: $('#contractAddRemark').val(),
                        workTime: $('#contractAddWorkTime').val(),
                        workPosition: $('#contractAddWorkPosition').val(),
                        workContent: $('#contractAddWorkContent').val(),
                        salary: $('#contractAddSalary').val(),
                        deptNo: $('#contractAddDeptno').val(),
                        positionNo: $('#contractAddPositionNo').val(),
                        postGradeNo: $('#contractAddPostGradeNo').val(),
                        workHourType: $('#contractAddWorkHourType').val(),
                        totalPeriod: $('#contractAddTotalPeriod').val(),
                        contractName: $('#contractAddContractName').val(),
                        changeDate: $('#contractAddChangeDate').val(),
                        contractType: $('#contractAddContractType').val(),
                        totalPeriod08: $('#contractAddTotalPeriod08').val(),
                        activity: $('#contractAddActivity').val()
                    };

                    console.log('Saving new contract:', formData);

                    $.ajax({
                        url: '/hrm/contractInfo/api/contract/add',
                        type: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify(formData),
                        success: function (response) {
                            console.log('Contract added successfully:', response);
                            $('#contractAddModal').modal('hide');

                            // Show success message
                            showSuccessMessage('Thêm mới hợp đồng thành công!');

                            // Reload DataTable
                            if ($.fn.DataTable.isDataTable('#contractsTable')) {
                                $('#contractsTable').DataTable().ajax.reload();
                            }
                        },
                        error: function (xhr, status, error) {
                            console.error('Error adding contract:', error);
                            let errorMessage = 'Lỗi khi thêm mới hợp đồng: ' + error;

                            if (xhr.responseJSON && xhr.responseJSON.message) {
                                errorMessage = xhr.responseJSON.message;
                            }

                            showErrorMessage(errorMessage);
                        }
                    });
                };

                window.contractValidateAddForm = function () {
                    const contractNo = $('#contractAddContractNo').val().trim();
                    const empId = $('#contractAddEmpId').val().trim();
                    const contractName = $('#contractAddContractName').val().trim();

                    if (!contractNo) {
                        showErrorMessage('Vui lòng nhập số hợp đồng');
                        $('#contractAddContractNo').focus();
                        return false;
                    }

                    if (!empId) {
                        showErrorMessage('Vui lòng nhập mã nhân viên');
                        $('#contractAddEmpId').focus();
                        return false;
                    }

                    if (!contractName) {
                        showErrorMessage('Vui lòng nhập tên hợp đồng');
                        $('#contractAddContractName').focus();
                        return false;
                    }

                    return true;
                };

                window.contractEdit = function (contractNo) {
                    console.log('Edit contract with contractNo:', contractNo);

                    // Show modal
                    $('#contractEditModal').modal('show');

                    // Load contract data
                    contractLoadData(contractNo);
                };

                window.contractLoadData = function (contractNo) {
                    $.ajax({
                        url: '/hrm/contractInfo/api/contract/' + contractNo,
                        type: 'GET',
                        success: function (response) {
                            console.log('Contract data loaded:', response);
                            contractPopulateEditForm(response);
                        },
                        error: function (xhr, status, error) {
                            console.error('Error loading contract data:', error);
                            $('#contractEditModal .modal-body').html(`
                            <div class="alert alert-danger">
                                <i class="bx bx-error"></i>
                                Lỗi khi tải thông tin hợp đồng: ${error}
                                <div class="mt-2">
                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                                        <i class="bx bx-x me-1"></i> Đóng
                                    </button>

                window.contractSaveChanges = function () {
                    const formData = {
                        contractNo: $('#contractEditContractNo').val(),
                        empId: $('#contractEditEmpId').val(),
                        contractTypeCode: $('#contractEditContractTypeCode').val(),
                        startContractDate: $('#contractEditStartContractDate').val(),
                        endContractDate: $('#contractEditEndContractDate').val(),
                        remark: $('#contractEditRemark').val(),
                        workTime: $('#contractEditWorkTime').val(),
                        workPosition: $('#contractEditWorkPosition').val(),
                        workContent: $('#contractEditWorkContent').val(),
                        salary: $('#contractEditSalary').val(),
                        deptNo: $('#contractEditDeptno').val(),
                        positionNo: $('#contractEditPositionNo').val(),
                        postGradeNo: $('#contractEditPostGradeNo').val(),
                        workHourType: $('#contractEditWorkHourType').val(),
                        totalPeriod: $('#contractEditTotalPeriod').val(),
                        contractName: $('#contractEditContractName').val(),
                        changeDate: $('#contractEditChangeDate').val(),
                        contractType: $('#contractEditContractType').val(),
                        totalPeriod08: $('#contractEditTotalPeriod08').val(),
                        activity: $('#contractEditActivity').val()
                    };

                    console.log('Saving contract changes:', formData);

                    $.ajax({
                        url: '/hrm/contractInfo/api/contract/update',
                        type: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify(formData),
                        success: function (response) {
                            console.log('Contract updated successfully:', response);
                            $('#contractEditModal').modal('hide');

                            // Show success message
                            showSuccessMessage('Cập nhật thông tin hợp đồng thành công!');

                            // Reload DataTable
                            if ($.fn.DataTable.isDataTable('#contractsTable')) {
                                $('#contractsTable').DataTable().ajax.reload();
                            }
                        },
                        error: function (xhr, status, error) {
                            console.error('Error updating contract:', error);
                            showErrorMessage('Lỗi khi cập nhật thông tin hợp đồng: ' + error);
                        }
                    });
                };

                window.contractDelete = function (contractNo) {
                    if (confirm('Bạn có chắc chắn muốn xóa hợp đồng này? Hành động này không thể hoàn tác!')) {
                        console.log('Deleting contract with contractNo:', contractNo);

                        $.ajax({
                            url: '/hrm/contractInfo/api/contract/delete/' + contractNo,
                            type: 'DELETE',
                            success: function (response) {
                                console.log('Contract deleted successfully:', response);

                                // Show success message
                                showSuccessMessage('Xóa hợp đồng thành công!');

                                // Reload DataTable
                                if ($.fn.DataTable.isDataTable('#contractsTable')) {
                                    $('#contractsTable').DataTable().ajax.reload();
                                }
                            },
                            error: function (xhr, status, error) {
                                console.error('Error deleting contract:', error);
                                let errorMessage = 'Lỗi khi xóa hợp đồng: ' + error;

                                if (xhr.responseJSON && xhr.responseJSON.message) {
                                    errorMessage = xhr.responseJSON.message;
                                }

                                showErrorMessage(errorMessage);
                            }
                        });
                    }
                };

                        ${message}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                `;

                    $('.card-body').prepend(alertHtml);

                    setTimeout(function () {
                        $('.alert-success').fadeOut();
