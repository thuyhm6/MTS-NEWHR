<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <!-- Search Form -->
                    <form id="searchForm" class="row g-3 mb-4">
                        <div class="col-md-3">
                            <label for="searchEmpId" class="form-label" th:text="#{hrm.addressSearch.title.empId}">Mã nhân viên</label>
                            <input type="text" class="form-control" id="searchEmpId" th:placeholder="#{hrm.addressSearch.title.empIdPlaceholder}" placeholder="Nhập mã nhân viên">
                        </div>
                        <div class="col-md-3">
                            <label for="searchLocalName" class="form-label" th:text="#{hrm.addressSearch.title.localName}">Tên nhân viên</label>
                            <input type="text" class="form-control" id="searchLocalName"
                                th:placeholder="#{hrm.addressSearch.title.localNamePlaceholder}" placeholder="Nhập tên nhân viên">
                        </div>
                        <div class="col-md-3">
                            <label for="searchAddressContent" class="form-label" th:text="#{hrm.addressSearch.title.addressContent}">Nội dung địa chỉ</label>
                            <input type="text" class="form-control" id="searchAddressContent"
                                th:placeholder="#{hrm.addressSearch.title.addressContentPlaceholder}" placeholder="Nhập nội dung địa chỉ">
                        </div>
                        <div class="col-md-3 d-flex align-items-end">
                            <button type="button" class="btn btn-primary me-2" onclick="searchData()">
                                <i class="bx bx-search"></i> <span th:text="#{hrm.addressSearch.title.search}">Tìm kiếm</span>
                            </button>
                            <button type="button" class="btn btn-secondary" onclick="clearSearch()">
                                <i class="bx bx-x"></i> <span th:text="#{hrm.addressSearch.title.clearFilter}">Xóa lọc</span>
                            </button>
                            <button type="button" class="btn btn-success ms-2" onclick="openModal()">
                                <i class="bx bx-plus"></i> <span th:text="#{hrm.addressSearch.title.addNew}">Thêm mới</span>
                            </button>
                        </div>
                    </form>

                    <!-- Data Table -->
                    <div class="table-responsive">
                        <table id="addressTable" class="table table-striped table-bordered table-hover"
                            style="width:100%">
                            <thead class="table-light">
                                <tr>
                                    <th th:text="#{hrm.addressSearch.title.stt}">STT</th>
                                    <th th:text="#{hrm.addressSearch.title.empCode}">Mã NV</th>
                                    <th th:text="#{hrm.addressSearch.title.fullName}">Họ tên</th>
                                    <th th:text="#{hrm.addressSearch.title.addressType}">Loại địa chỉ</th>
                                    <th th:text="#{hrm.addressSearch.title.effectiveDate}">Ngày hiệu lực</th>
                                    <th th:text="#{hrm.addressSearch.title.addressContent}">Nội dung địa chỉ</th>
                                    <th th:text="#{hrm.addressSearch.title.nationality}">Quốc gia</th>
                                    <th class="text-center" style="width: 100px;" th:text="#{hrm.addressSearch.title.action}">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data loaded via AJAX -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Thêm/Sửa -->
<div class="modal fade" id="addressModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle" th:text="#{hrm.addressSearch.title.modalTitle}">Thông tin địa chỉ</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="addressForm">
                    <input type="hidden" id="addressNo" name="addressNo">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="empNameDisplay" class="form-label" th:text="#{hrm.addressSearch.title.employee}">Nhân viên <span
                                    class="text-danger">*</span></label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="empNameDisplay"
                                    th:placeholder="#{hrm.addressSearch.title.selectEmployee}" placeholder="Chọn nhân viên..." readonly required>
                                <input type="hidden" id="personId" name="personId">
                                <button class="btn btn-outline-primary" type="button"
                                    onclick="openEmployeeSearchPopup()">
                                    <i class="bx bx-search"></i>
                                </button>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="addressType" class="form-label">Loại địa chỉ <span
                                    class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="addressType" name="addressType" required
                                placeholder="Thường trú/Tạm trú...">
                        </div>

                        <div class="col-md-6">
                            <label for="effectiveStartDate" class="form-label">Ngày hiệu lực</label>
                            <input type="date" class="form-control" id="effectiveStartDate" name="effectiveStartDate">
                        </div>

                        <div class="col-md-6">
                            <label for="nationality" class="form-label">Quốc gia</label>
                            <input type="text" class="form-control" id="nationality" name="nationality">
                        </div>

                        <div class="col-md-12">
                            <label for="addressContent" class="form-label">Nội dung địa chỉ</label>
                            <textarea class="form-control" id="addressContent" name="addressContent"
                                rows="3"></textarea>
                        </div>

                    </div>
            </div>
            </form>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
            <button type="button" class="btn btn-primary" onclick="saveData()">Lưu</button>
        </div>
    </div>
</div>
</div>

<template id="fragmentScripts">
    <script th:inline="javascript">
        $(document).ready(function () {
            var table = $('#addressTable').DataTable({
                destroy: true,
                scrollY: "calc(100vh - 280px)",
                scrollCollapse: true,
                paging: true,
                searching: true,
                lengthChange: true,
                pageLength: 20,
                columnDefs: [
                    { "width": "2%", "targets": 0 },
                ],
                processing: true,

                dom: 'Blfrtip',
                buttons: [
                    'copy', 'csv', 'excel', 'pdf', 'print'
                ],
                ajax: {
                    url: '/hrm/empinfo/api/address',
                    dataSrc: '',
                    data: function (d) {
                        d.empId = $('#searchEmpId').val();
                        d.localName = $('#searchLocalName').val();
                        d.addressContent = $('#searchAddressContent').val();
                    }
                },
                columns: [
                    {
                        data: null,
                        render: function (data, type, row, meta) {
                            return meta.row + 1;
                        }
                    },
                    { data: 'empId' },
                    { data: 'localName' },
                    { data: 'addressType' },
                    {
                        data: 'effectiveStartDate',
                        render: function (data) {
                            if (!data) return '';
                            // Assuming data is in YYYY-MM-DD format from Date/LocalDate serialization
                            var date = new Date(data);
                            return date.toLocaleDateString('vi-VN');
                        }
                    },
                    { data: 'addressContent' },
                    { data: 'nationality' },
                    {
                        data: null,
                        className: "text-center",
                        render: function (data, type, row) {
                            return `
                                <div class="btn-group btn-group-sm">
                                    <button class="btn btn-warning" onclick="editRaw(${row.addressNo})">
                                        <i class="bx bx-edit"></i>
                                    </button>
                                    <button class="btn btn-danger" onclick="deleteRaw(${row.addressNo})">
                                        <i class="bx bx-trash"></i>
                                    </button>
                                </div>
                            `;
                        }
                    }
                ]
            });

            window.searchData = function () {
                table.ajax.reload();
            };

            window.clearSearch = function () {
                $('#searchForm')[0].reset();
                table.ajax.reload();
            };

            // Mở modal thêm mới
            window.openModal = function () {
                $('#modalTitle').text('Thêm mới Địa chỉ');
                $('#addressForm')[0].reset();
                $('#addressNo').val('');
                $('#personId').val('');
                $('#personId').val('');
                var modal = new bootstrap.Modal(document.getElementById('addressModal'));
                modal.show();
            };

            // Mở popup tìm kiếm nhân viên
            window.openEmployeeSearchPopup = function () {
                if (typeof EmployeeSearchModal !== 'undefined') {
                    EmployeeSearchModal.open(function (employee) {
                        $('#personId').val(employee.personId);
                        $('#empNameDisplay').val(employee.empId + ' - ' + employee.localName);
                    });
                } else {
                    alert('Component tìm kiếm nhân viên chưa được tải!');
                }
            };

            // Sửa
            window.editRaw = function (id) {
                $.ajax({
                    url: '/hrm/empinfo/api/address/' + id,
                    type: 'GET',
                    success: function (data) {
                        $('#modalTitle').text('Cập nhật Địa chỉ');
                        // Populate form fields
                        $('#addressNo').val(data.addressNo);
                        $('#personId').val(data.personId);
                        $('#empNameDisplay').val((data.empId || '') + ' - ' + (data.localName || ''));

                        $('#addressType').val(data.addressType);

                        if (data.effectiveStartDate) {
                            // Convert standard Date format to YYYY-MM-DD specific for input type=date
                            var d = new Date(data.effectiveStartDate);
                            var day = ("0" + d.getDate()).slice(-2);
                            var month = ("0" + (d.getMonth() + 1)).slice(-2);
                            var today = d.getFullYear() + "-" + (month) + "-" + (day);
                            $('#effectiveStartDate').val(today);
                        } else {
                            $('#effectiveStartDate').val('');
                        }

                        $('#addressContent').val(data.addressContent);
                        $('#nationality').val(data.nationality);
                        $('#nationality').val(data.nationality);

                        var modal = new bootstrap.Modal(document.getElementById('addressModal'));
                        modal.show();
                    },
                    error: function (err) {
                        if (typeof toastr !== 'undefined') toastr.error('Lỗi khi lấy thông tin: ' + (err.responseJSON ? err.responseJSON.error : err.responseText));
                        else alert('Lỗi khi lấy thông tin: ' + (err.responseJSON ? err.responseJSON.error : err.responseText));
                    }
                });
            };

            // Lưu dữ liệu
            window.saveData = function () {
                // Validate cơ bản
                if (!$('#personId').val() || !$('#addressType').val()) {
                    if (typeof toastr !== 'undefined') toastr.warning('Vui lòng chọn Nhân viên và nhập Loại địa chỉ');
                    else alert('Vui lòng chọn Nhân viên và nhập Loại địa chỉ');
                    return;
                }

                var formData = {
                    addressNo: $('#addressNo').val() || null,
                    personId: $('#personId').val(),
                    addressType: $('#addressType').val(),
                    effectiveStartDate: $('#effectiveStartDate').val() ? new Date($('#effectiveStartDate').val()) : null,
                    addressContent: $('#addressContent').val(),
                    nationality: $('#nationality').val()
                };

                $.ajax({
                    url: '/hrm/empinfo/api/address/save',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(formData),
                    success: function (res) {
                        if (typeof toastr !== 'undefined') toastr.success(res.message || 'Lưu thành công');
                        else alert(res.message || 'Lưu thành công');

                        var modalEl = document.getElementById('addressModal');
                        var modal = bootstrap.Modal.getInstance(modalEl);
                        if (modal) {
                            modal.hide();
                        } else {
                            $(modalEl).modal('hide');
                        }

                        table.ajax.reload();
                    },
                    error: function (err) {
                        var errorMsg = (err.responseJSON && err.responseJSON.error) ? err.responseJSON.error : (err.responseText || "Lỗi không xác định");
                        if (typeof toastr !== 'undefined') toastr.error('Lỗi khi lưu: ' + errorMsg);
                        else alert('Lỗi khi lưu: ' + errorMsg);
                    }
                });
            };

            // Xóa
            window.deleteRaw = function (id) {
                if (confirm('Bạn có chắc chắn muốn xóa bản ghi này?')) {
                    $.ajax({
                        url: '/hrm/empinfo/api/address/delete/' + id,
                        type: 'DELETE',
                        success: function (res) {
                            if (typeof toastr !== 'undefined') toastr.success(res.message || 'Xóa thành công');
                            else alert(res.message || 'Xóa thành công');
                            table.ajax.reload();
                        },
                        error: function (err) {
                            var errorMsg = (err.responseJSON && err.responseJSON.error) ? err.responseJSON.error : (err.responseText || "Lỗi không xác định");
                            if (typeof toastr !== 'undefined') toastr.error('Lỗi khi xóa: ' + errorMsg);
                            else alert('Lỗi khi xóa: ' + errorMsg);
                        }
                    });
                }
            };
        });
    </script>
</template>
