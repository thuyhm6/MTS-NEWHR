<div th:fragment="content">
    <div class="row g-0" id="vrl_pageWrapper">

        <!-- ════════════ Panel trái: Danh sách nhân viên ════════════ -->
        <div class="col-md-4 col-lg-3 border-end d-flex flex-column" id="vrl_leftPanel" style="height:calc(100vh - 60px); min-width:280px;">

            <!-- Thanh tìm kiếm -->
            <div class="p-2 border-bottom bg-light">
                <div class="d-flex gap-1 mb-1">
                    <input type="text" class="form-control form-control-sm" id="vrl_searchName"
                        th:placeholder="#{recruit.list.placeholder.searchName}" placeholder="Họ tên...">
                    <input type="text" class="form-control form-control-sm" id="vrl_searchEmpId"
                        th:placeholder="#{recruit.list.placeholder.searchEmpId}" placeholder="Mã NV..." style="max-width:90px;">
                    <button class="btn btn-primary btn-sm" onclick="vrlSearchList()">
                        <i class="bi bi-search"></i>
                    </button>
                </div>
                <!-- Lọc trạng thái -->
                <div class="d-flex align-items-center gap-2 mt-1">
                    <div class="form-check mb-0">
                        <input class="form-check-input" type="checkbox" id="vrl_chkCompleted"
                               onchange="vrlSearchList()">
                        <label class="form-check-label small fw-semibold" for="vrl_chkCompleted"
                               th:text="#{recruit.list.tab.completed}">Hoàn thành</label>
                    </div>
                </div>
            </div>

            <!-- Toolbar -->
            <div class="d-flex align-items-center justify-content-between px-2 py-1 border-bottom bg-white">
                <div class="d-flex align-items-center gap-1">
                    <input type="checkbox" class="form-check-input" id="vrl_chkAll" onchange="vrlToggleAll()">
                    <span class="small text-muted" id="vrl_listCount">0 nhân viên</span>
                </div>
                <div class="d-flex gap-1">
                    <button class="btn btn-success btn-sm" onclick="vrlNewEmployee()">
                        <i class="bi bi-plus-lg"></i>
                        <span th:text="#{common.add}">Thêm</span>
                    </button>
                    <button class="btn btn-warning btn-sm d-none" id="vrl_btnConfirm" onclick="vrlExecute('CONFIRM')">
                        <i class="bi bi-check-circle"></i>
                        <span th:text="#{recruit.list.btn.confirm}">Xác nhận</span>
                    </button>
                    <button class="btn btn-secondary btn-sm d-none" id="vrl_btnCancel" onclick="vrlExecute('CANCEL')">
                        <i class="bi bi-x-circle"></i>
                        <span th:text="#{recruit.list.btn.cancelConfirm}">Hủy xác nhận</span>
                    </button>
                </div>
            </div>

            <!-- Danh sách nhân viên -->
            <div class="flex-grow-1 overflow-y-auto" id="vrl_employeeList" style="overflow-y:auto;">
                <div id="vrl_listBody"></div>
                <!-- Phân trang -->
                <div class="d-flex justify-content-center align-items-center gap-2 py-2 border-top" id="vrl_paging">
                    <button class="btn btn-outline-secondary btn-sm" id="vrl_btnPrev" onclick="vrlPageChange(-1)">
                        <i class="bi bi-chevron-left"></i>
                    </button>
                    <span class="small" id="vrl_pageInfo">1/1</span>
                    <button class="btn btn-outline-secondary btn-sm" id="vrl_btnNext" onclick="vrlPageChange(1)">
                        <i class="bi bi-chevron-right"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- ════════════ Panel phải: Thông tin chi tiết ════════════ -->
        <div class="col flex-grow-1 d-flex flex-column" id="vrl_rightPanel" style="height:calc(100vh - 60px); overflow:hidden;">

            <!-- Header thông tin nhân viên đang chọn -->
            <div class="px-3 py-2 border-bottom bg-white d-flex align-items-center justify-content-between" id="vrl_detailHeader">
                <div>
                    <span class="fw-semibold me-2" id="vrl_selectedName" th:text="#{recruit.list.label.selectEmployee}">-- Chọn nhân viên --</span>
                    <span class="badge bg-secondary" id="vrl_selectedEmpId"></span>
                </div>
                <div class="d-flex gap-1" id="vrl_detailActions" style="display:none!important">
                    <button class="btn btn-primary btn-sm" onclick="vrlSaveGeneral()">
                        <i class="bi bi-save"></i> <span th:text="#{common.save}">Lưu</span>
                    </button>
                </div>
            </div>

            <!-- Tabs chi tiết -->
            <ul class="nav nav-tabs px-2 pt-1 bg-white" id="vrl_detailTabs" role="tablist">
                <li class="nav-item">
                    <button class="nav-link active" id="vrl_tab_general" data-bs-toggle="tab"
                        data-bs-target="#vrl_pane_general" type="button"
                        th:text="#{recruit.list.tab.general}">Thông tin chung</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="vrl_tab_extra" data-bs-toggle="tab"
                        data-bs-target="#vrl_pane_extra" type="button"
                        th:text="#{recruit.list.tab.extra}">Thông tin bổ sung</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="vrl_tab_edu" data-bs-toggle="tab"
                        data-bs-target="#vrl_pane_edu" type="button"
                        onclick="vrlLoadEdu()"
                        th:text="#{recruit.list.tab.education}">Thông tin Giáo dục</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="vrl_tab_work" data-bs-toggle="tab"
                        data-bs-target="#vrl_pane_work" type="button"
                        onclick="vrlLoadWork()"
                        th:text="#{recruit.list.tab.workExp}">Quá trình làm việc</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="vrl_tab_family" data-bs-toggle="tab"
                        data-bs-target="#vrl_pane_family" type="button"
                        onclick="vrlLoadFamily()"
                        th:text="#{recruit.list.tab.family}">Thông tin gia đình</button>
                </li>
            </ul>

            <div class="tab-content flex-grow-1 overflow-y-auto" id="vrl_tabContent" style="overflow-y:auto;">

                <!-- ── Tab Thông tin chung ── -->
                <div class="tab-pane fade show active p-3" id="vrl_pane_general" role="tabpanel">
                    <input type="hidden" id="vrl_personId">
                    <div class="row g-2">
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.localName}">Họ tên</label>
                            <input type="text" class="form-control form-control-sm" id="vrl_localName" maxlength="50">
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.empId}">Mã nhân viên</label>
                            <input type="text" class="form-control form-control-sm" id="vrl_empId" maxlength="20">
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.englishName}">Tên tiếng Anh</label>
                            <input type="text" class="form-control form-control-sm" id="vrl_englishName" maxlength="50">
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.koreanName}">Tên Hàn</label>
                            <input type="text" class="form-control form-control-sm" id="vrl_koreanName" maxlength="50">
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.sexcode}">Giới tính</label>
                            <select class="form-select form-select-sm" id="vrl_sexcode" data-parent-code="1324"></select>
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.dob}">Ngày sinh</label>
                            <input type="text" class="form-control form-control-sm vrl-date" id="vrl_dob" maxlength="20">
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.nationalityCode}">Quốc tịch</label>
                            <select class="form-select form-select-sm" id="vrl_nationalityCode" data-parent-code="870"></select>
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.nationCode}">Dân tộc</label>
                            <select class="form-select form-select-sm" id="vrl_nationCode" data-parent-code="210942"></select>
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.maritalStatusCode}">Tình trạng hôn nhân</label>
                            <select class="form-select form-select-sm" id="vrl_maritalStatusCode" data-parent-code="1709"></select>
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.deptNo}">Phòng ban</label>
                            <input type="text" class="form-control form-control-sm" id="vrl_deptNo_display"
                                   th:placeholder="#{recruit.list.placeholder.selectDept}" placeholder="-- Chọn phòng ban --"
                                   readonly style="background-color:#fff;cursor:pointer;">
                            <input type="hidden" id="vrl_deptNo">
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.postFamily}">Nhóm nhân viên</label>
                            <select class="form-select form-select-sm" id="vrl_postFamily" data-parent-code="14015812" onchange="vrlOnPostFamilyChange()"></select>
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.postGradeNo}">Cấp bậc</label>
                            <select class="form-select form-select-sm" id="vrl_postGradeNo" data-parent-code="400001"></select>
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.positionNo}">Vị trí</label>
                            <select class="form-select form-select-sm" id="vrl_positionNo" data-parent-code="14014036"></select>
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.empTypeCode}">Loại nhân viên</label>
                            <select class="form-select form-select-sm" id="vrl_empTypeCode" data-parent-code="13864"></select>
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.joinType}">Loại tuyển dụng</label>
                            <select class="form-select form-select-sm" id="vrl_joinType" data-parent-code="1359" onchange="vrlOnJoinTypeChange()"></select>
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.joinDetailType}">Chi tiết loại vào</label>
                            <select class="form-select form-select-sm" id="vrl_joinDetailType"></select>
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.dateStarted}">Ngày vào công ty</label>
                            <input type="text" class="form-control form-control-sm vrl-date" id="vrl_dateStarted" maxlength="20">
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.fullTimeEmployee}">Hưởng lương chính thức</label>
                            <select class="form-select form-select-sm" id="vrl_isProbation">
                                <option value="">--</option>
                                <option value="1" th:text="#{common.yes}">Có</option>
                                <option value="0" th:text="#{common.no}">Không</option>
                            </select>
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.endProbationDate}">Ngày kết thúc thử việc</label>
                            <input type="text" class="form-control form-control-sm vrl-date" id="vrl_endProbationDate" maxlength="20">
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.contractStartDate}">Ngày bắt đầu HĐ</label>
                            <input type="text" class="form-control form-control-sm vrl-date" id="vrl_contractStartDate" maxlength="20">
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.costCenter}">Trung tâm chi phí</label>
                            <input type="text" class="form-control form-control-sm" id="vrl_costCenter_display"
                                   th:placeholder="#{recruit.list.placeholder.selectDept}" placeholder="-- Chọn phòng ban --"
                                   readonly style="background-color:#fff;cursor:pointer;">
                            <input type="hidden" id="vrl_costCenter">
                        </div>
                    </div>
                    <div class="d-flex justify-content-end mt-3">
                        <button class="btn btn-primary btn-sm" onclick="vrlSaveGeneral()">
                            <i class="bi bi-save"></i> <span th:text="#{common.save}">Lưu</span>
                        </button>
                    </div>
                </div>

                <!-- ── Tab Thông tin bổ sung ── -->
                <div class="tab-pane fade p-3" id="vrl_pane_extra" role="tabpanel">
                    <div class="row g-2">
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.homePhone}">ĐT nhà</label>
                            <input type="text" class="form-control form-control-sm" id="vrl_homePhone" maxlength="100">
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.companyPhone}">Số điện thoại</label>
                            <input type="text" class="form-control form-control-sm" id="vrl_companyPhone" maxlength="100">
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.officePhone}">ĐT văn phòng</label>
                            <input type="text" class="form-control form-control-sm" id="vrl_officePhone" maxlength="50">
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.email}">Email</label>
                            <input type="text" class="form-control form-control-sm" id="vrl_email" maxlength="100">
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.idcardNo}">Số CMND/CCCD</label>
                            <input type="text" class="form-control form-control-sm" id="vrl_idcardNo" maxlength="100">
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.documentType}">Loại giấy tờ</label>
                            <input type="text" class="form-control form-control-sm" id="vrl_documentType" maxlength="20">
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.idcardStartDate}">Ngày cấp</label>
                            <input type="text" class="form-control form-control-sm vrl-date" id="vrl_idcardStartDate" maxlength="50">
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.issuingAuthority}">Nơi cấp</label>
                            <input type="text" class="form-control form-control-sm" id="vrl_issuingAuthority" maxlength="50">
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.addressContent}">Địa chỉ hiện tại</label>
                            <input type="text" class="form-control form-control-sm" id="vrl_addressContent" maxlength="100">
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.hujiaddressContent}">Hộ khẩu thường trú</label>
                            <input type="text" class="form-control form-control-sm" id="vrl_hujiaddressContent" maxlength="100">
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.nationality}">Quốc gia</label>
                            <select class="form-select form-select-sm" id="vrl_nationality" data-parent-code="870"></select>
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.accountNo}">Số TK ngân hàng</label>
                            <input type="text" class="form-control form-control-sm" id="vrl_accountNo" maxlength="100">
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.oldPay}">Lương cũ</label>
                            <input type="text" class="form-control form-control-sm" id="vrl_oldPay" maxlength="40">
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.experience}">Thâm niên</label>
                            <input type="text" class="form-control form-control-sm" id="vrl_experience" maxlength="30">
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.recruitType}">Kênh tuyển dụng</label>
                            <input type="text" class="form-control form-control-sm" id="vrl_recruitType" maxlength="30">
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.recommend}">Người giới thiệu</label>
                            <input type="text" class="form-control form-control-sm" id="vrl_recommend" maxlength="50">
                        </div>
                        <div class="col-12">
                            <label class="form-label small mb-0" th:text="#{recruit.list.field.remark}">Ghi chú</label>
                            <textarea class="form-control form-control-sm" id="vrl_remark" rows="2" maxlength="500"></textarea>
                        </div>
                    </div>
                    <div class="d-flex justify-content-end mt-3">
                        <button class="btn btn-primary btn-sm" onclick="vrlSaveGeneral()">
                            <i class="bi bi-save"></i> <span th:text="#{common.save}">Lưu</span>
                        </button>
                    </div>
                </div>

                <!-- ── Tab Thông tin Giáo dục ── -->
                <div class="tab-pane fade p-2" id="vrl_pane_edu" role="tabpanel">
                    <div class="d-flex align-items-center justify-content-between mb-1">
                        <span class="small fw-semibold text-muted" id="vrl_eduCount">0</span>
                        <div class="d-flex gap-1">
                            <button class="btn btn-success btn-sm" onclick="vrlEduAdd()">
                                <i class="bi bi-plus-lg"></i> <span th:text="#{common.add}">Thêm</span>
                            </button>
                            <button class="btn btn-danger btn-sm" onclick="vrlEduDeleteSelected()">
                                <i class="bi bi-trash"></i> <span th:text="#{common.delete}">Xóa</span>
                            </button>
                            <button class="btn btn-primary btn-sm" onclick="vrlEduSave()">
                                <i class="bi bi-save"></i> <span th:text="#{common.save}">Lưu</span>
                            </button>
                        </div>
                    </div>
                    <div class="table-responsive" style="max-height:calc(100vh - 220px); overflow-y:auto;">
                        <table class="table table-bordered table-hover table-sm align-middle mb-0" id="vrl_table_edu" style="min-width:900px;">
                            <thead class="table-light text-center align-middle">
                                <tr>
                                    <th style="width:36px;"><input type="checkbox" class="form-check-input" id="vrl_chkAll_edu" onchange="vrlEduToggleAll()"></th>
                                    <th style="width:40px;">No.</th>
                                    <th style="width:120px;" th:text="#{recruit.list.edu.degreeCode}">Học vị</th>
                                    <th style="width:120px;" th:text="#{recruit.list.edu.degreesCode}">Văn bằng</th>
                                    <th th:text="#{recruit.list.edu.institutionName}">Tên trường</th>
                                    <th style="width:120px;" th:text="#{recruit.list.edu.subject}">Chuyên ngành</th>
                                    <th style="width:90px;" th:text="#{recruit.list.edu.startDate}">Từ ngày</th>
                                    <th style="width:90px;" th:text="#{recruit.list.edu.endDate}">Đến ngày</th>
                                    <th style="width:80px;" th:text="#{recruit.list.edu.finalDegree}">Cuối</th>
                                    <th style="width:80px;" th:text="#{recruit.list.edu.studyAbroad}">Du học</th>
                                    <th style="width:120px;" th:text="#{common.description}">Ghi chú</th>
                                </tr>
                            </thead>
                            <tbody id="vrl_tbody_edu"></tbody>
                        </table>
                    </div>
                </div>

                <!-- ── Tab Quá trình làm việc ── -->
                <div class="tab-pane fade p-2" id="vrl_pane_work" role="tabpanel">
                    <div class="d-flex align-items-center justify-content-between mb-1">
                        <span class="small fw-semibold text-muted" id="vrl_workCount">0</span>
                        <div class="d-flex gap-1">
                            <button class="btn btn-success btn-sm" onclick="vrlWorkAdd()">
                                <i class="bi bi-plus-lg"></i> <span th:text="#{common.add}">Thêm</span>
                            </button>
                            <button class="btn btn-danger btn-sm" onclick="vrlWorkDeleteSelected()">
                                <i class="bi bi-trash"></i> <span th:text="#{common.delete}">Xóa</span>
                            </button>
                            <button class="btn btn-primary btn-sm" onclick="vrlWorkSave()">
                                <i class="bi bi-save"></i> <span th:text="#{common.save}">Lưu</span>
                            </button>
                        </div>
                    </div>
                    <div class="table-responsive" style="max-height:calc(100vh - 220px); overflow-y:auto;">
                        <table class="table table-bordered table-hover table-sm align-middle mb-0" id="vrl_table_work" style="min-width:900px;">
                            <thead class="table-light text-center align-middle">
                                <tr>
                                    <th style="width:36px;"><input type="checkbox" class="form-check-input" id="vrl_chkAll_work" onchange="vrlWorkToggleAll()"></th>
                                    <th style="width:40px;">No.</th>
                                    <th th:text="#{recruit.list.work.cpnyName}">Công ty</th>
                                    <th style="width:100px;" th:text="#{recruit.list.work.deptName}">Phòng ban</th>
                                    <th style="width:100px;" th:text="#{recruit.list.work.position}">Chức vụ</th>
                                    <th style="width:90px;" th:text="#{recruit.list.work.startDate}">Từ ngày</th>
                                    <th style="width:90px;" th:text="#{recruit.list.work.endDate}">Đến ngày</th>
                                    <th style="width:90px;" th:text="#{recruit.list.work.payroll}">Lương</th>
                                    <th style="width:100px;" th:text="#{recruit.list.work.leftReason}">Lý do nghỉ</th>

<template id="fragmentScripts">
<style>
    #vrl_pageWrapper { overflow: hidden; }

        cursor: pointer;

</style>
<script th:inline="none">
(function () {
    var _vrl_tabId = window._currentTabId || 'default-content';
    window._vrl_inst = window._vrl_inst || {};
    if (!window._vrl_inst[_vrl_tabId]) {
        window._vrl_inst[_vrl_tabId] = {
            currentActivity: '0',
            currentPage: 1,
            pageSize: 20,
            totalRecords: 0,
            selectedPersonId: null,
            eduData: [], workData: [], familyData: [],
            eduDirty: [], workDirty: [], familyDirty: [],
            rowCounter: 0
        };
    }
    var inst = window._vrl_inst[_vrl_tabId];
    function vrl$(sel) { return $('#' + _vrl_tabId).find(sel); }
    function vrlEsc(s) {
        if (s == null) return '';
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function vrlNewId() { return 'NEW_' + (++inst.rowCounter); }
    function vrlChkView(v) {
        return (v === 'Y' || v === '1')
            ? '<input type="checkbox" class="form-check-input" disabled checked>'
            : '<input type="checkbox" class="form-check-input" disabled>';
    }
    function vrlInp(id, val, extra) {
        return '<input type="text" class="form-control form-control-sm" id="' + id + '" value="' + vrlEsc(val) + '"' + (extra||'') + '>';
    }
    function vrlSel(id, val, parentCode) {
        var safeVal = (val == null ? '' : String(val));
        return '<select class="form-select form-select-sm" id="' + id + '" data-parent-code="' + parentCode + '" data-default-value="' + vrlEsc(safeVal) + '"></select>';
    }

    // ── DeptTree cho vrl_deptNo và vrl_costCenter ────────────────────────────

    function vrlGetDeptName(code) {
        if (!code) return '';
        if (typeof DeptTree === 'undefined') return code;
        var list = DeptTree.getAuthDeptList();
        var item = list && list.find(function (d) { return d.id === code; });
        return item ? item.text : code;
    }

    function vrlInitDeptTree() {
        if (typeof DeptTree === 'undefined') return;
        var sc = '#' + _vrl_tabId + ' ';

        // Khởi tạo lần đầu: load data, tạo container, singleSelect mode
        DeptTree.init(sc + '#vrl_deptNo_display', function () {}, { singleSelect: true });

        // Ghi đè click handler của vrl_deptNo_display
        vrl$('#vrl_deptNo_display').off('click').on('click', function (e) {
            e.stopPropagation();
            DeptTree.openFor(sc + '#vrl_deptNo_display', function (codes) {
                if (codes && codes.length > 0) {
                    var code = codes[0];
                    var name = vrl$('#vrl_deptNo_display').val();
                    vrl$('#vrl_deptNo').val(code);
                    // Tự động set costCenter về cùng mã phòng ban
                    vrl$('#vrl_costCenter_display').val(name);
                    vrl$('#vrl_costCenter').val(code);
                } else {
                    vrl$('#vrl_deptNo').val('');
                }
            });
        });

        // vrl_costCenter_display: mở tree riêng, chỉ cập nhật costCenter
        vrl$('#vrl_costCenter_display').off('click').on('click', function (e) {
            e.stopPropagation();
            DeptTree.openFor(sc + '#vrl_costCenter_display', function (codes) {
                if (codes && codes.length > 0) {
                    vrl$('#vrl_costCenter').val(codes[0]);
                } else {
                    vrl$('#vrl_costCenter').val('');
                }
            });
        });
    }

    // ── Tải danh sách ────────────────────────────────────────────────────────

    window.vrlSearchList = function () {
        inst.currentPage = 1;
        vrlLoadList();
    };

    function vrlLoadList() {
        var activity = vrl$('#vrl_chkCompleted').prop('checked') ? '1' : '0';
        inst.currentActivity = activity;
        var payload = {
            draw: inst.currentPage,
            start: (inst.currentPage - 1) * inst.pageSize,
            length: inst.pageSize,
            activity: activity,
            searchName: vrl$('#vrl_searchName').val(),
            searchEmpId: vrl$('#vrl_searchEmpId').val()
        };
        $.ajax({
            url: '/hrm/recruitManage/api/employee/list',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(payload),
            success: function (res) {
                inst.totalRecords = res.recordsTotal || 0;
                vrlRenderList(res.data || []);
            },
            error: function () { console.error('Lỗi tải danh sách nhân viên'); }
        });
    }

    function vrlRenderList(rows) {
        var totalPages = Math.max(1, Math.ceil(inst.totalRecords / inst.pageSize));
        vrl$('#vrl_pageInfo').text(inst.currentPage + '/' + totalPages);
        vrl$('#vrl_btnPrev').prop('disabled', inst.currentPage <= 1);
        vrl$('#vrl_btnNext').prop('disabled', inst.currentPage >= totalPages);
        vrl$('#vrl_listCount').text(inst.totalRecords + /*[[' ' + #{recruit.list.label.employees}]]*/ ' nhân viên');

        var html = '';
        rows.forEach(function (r) {
            var sel = (r.personId === inst.selectedPersonId) ? ' selected' : '';
            html += '<div class="vrl-emp-item' + sel + '" data-personid="' + vrlEsc(r.personId) + '" onclick="vrlSelectEmployee(\'' + vrlEsc(r.personId) + '\')">';
            html += '<div class="d-flex align-items-start gap-2">';
            html += '<input type="checkbox" class="form-check-input vrl-list-chk mt-1" data-personid="' + vrlEsc(r.personId) + '" onclick="event.stopPropagation(); vrlUpdateActionButtons()">';
            html += '<div class="flex-grow-1 overflow-hidden">';
            html += '<div class="fw-semibold text-truncate small">' + vrlEsc(r.localName) + '</div>';
            html += '<div class="text-muted" style="font-size:.75rem;">' + vrlEsc(r.empId || '') + ' | ' + vrlEsc(r.deptName || '') + '</div>';
            html += '<div class="text-muted" style="font-size:.75rem;">' + vrlEsc(r.dateStarted || '') + '</div>';
            html += '</div></div></div>';
        });
        vrl$('#vrl_listBody').html(html || '<div class="text-center text-muted p-3 small" th:text="#{common.noData}">Không có dữ liệu</div>');
        vrlUpdateActionButtons();
    }

    window.vrlPageChange = function (dir) {
        var totalPages = Math.max(1, Math.ceil(inst.totalRecords / inst.pageSize));
        inst.currentPage = Math.min(totalPages, Math.max(1, inst.currentPage + dir));
        vrlLoadList();
    };

    window.vrlToggleAll = function () {
        var checked = vrl$('#vrl_chkAll').prop('checked');
        vrl$('.vrl-list-chk').prop('checked', checked);
        vrlUpdateActionButtons();
    };

    function vrlUpdateActionButtons() {
        var cnt = vrl$('.vrl-list-chk:checked').length;
        var activity = vrl$('#vrl_chkCompleted').prop('checked') ? '1' : '0';
        vrl$('#vrl_btnConfirm').toggleClass('d-none', activity !== '0' || cnt === 0);
        vrl$('#vrl_btnCancel').toggleClass('d-none', activity !== '1' || cnt === 0);
    }

    // ── Chọn nhân viên ───────────────────────────────────────────────────────

    window.vrlSelectEmployee = function (personId) {
        inst.selectedPersonId = personId;
        vrl$('.vrl-emp-item').removeClass('selected');
        vrl$('.vrl-emp-item[data-personid="' + personId + '"]').addClass('selected');
        vrlLoadEmployeeDetail(personId);
        inst.eduData = []; inst.workData = []; inst.familyData = [];
    };

    function vrlLoadEmployeeDetail(personId) {
        $.ajax({
            url: '/hrm/recruitManage/api/employee/detail',
            type: 'GET',
            data: { personId: personId },
            success: function (d) {
                if (!d) return;
                vrl$('#vrl_selectedName').text(d.localName || '');
                vrl$('#vrl_selectedEmpId').text(d.empId || '');
                vrl$('#vrl_personId').val(d.personId || '');
                // Tab chung
                vrl$('#vrl_localName').val(d.localName || '');
                vrl$('#vrl_empId').val(d.empId || '');
                vrl$('#vrl_englishName').val(d.englishName || '');
                vrl$('#vrl_koreanName').val(d.koreanName || '');
                vrl$('#vrl_dob').val(d.dob || '');
                vrl$('#vrl_deptNo').val(d.deptNo || '');
                vrl$('#vrl_deptNo_display').val(vrlGetDeptName(d.deptNo));
                vrl$('#vrl_costCenter').val(d.costCenter || '');
                vrl$('#vrl_costCenter_display').val(vrlGetDeptName(d.costCenter));
                vrl$('#vrl_standardPosition').val(d.standardPosition || '');
                vrl$('#vrl_workArea').val(d.workArea || '');
                vrl$('#vrl_dateStarted').val(d.dateStarted || '');
                vrl$('#vrl_confirmWorkDate').val(d.confirmWorkDate || '');
                vrl$('#vrl_isProbation').val(d.isProbation || '');
                vrl$('#vrl_endProbationDate').val(d.endProbationDate || '');
                vrl$('#vrl_contractStartDate').val(d.contractStartDate || '');
                vrl$('#vrl_contractEndDate').val(d.contractEndDate || '');
                vrl$('#vrl_timeStarted').val(d.timeStarted || '');
                vrl$('#vrl_coinCode').val(d.coinCode || '');
                // Tab bổ sung
                vrl$('#vrl_homePhone').val(d.homePhone || '');
                vrl$('#vrl_companyPhone').val(d.companyPhone || '');
                vrl$('#vrl_officePhone').val(d.officePhone || '');
                vrl$('#vrl_email').val(d.email || '');
                vrl$('#vrl_idcardNo').val(d.idcardNo || '');
                vrl$('#vrl_documentType').val(d.documentType || '');
                vrl$('#vrl_idcardStartDate').val(d.idcardStartDate || '');
                vrl$('#vrl_issuingAuthority').val(d.issuingAuthority || '');
                vrl$('#vrl_addressContent').val(d.addressContent || '');
                vrl$('#vrl_hujiaddressContent').val(d.hujiaddressContent || '');
                vrl$('#vrl_nationality').val(d.nationality || '');
                vrl$('#vrl_insuranceType').val(d.insuranceType || '');
                vrl$('#vrl_insuranceArea').val(d.insuranceArea || '');
                vrl$('#vrl_insuranceDistinguish').val(d.insuranceDistinguish || '');
                vrl$('#vrl_jingshebao').val(d.jingshebao || 'N');
                vrl$('#vrl_wageType').val(d.wageType || '');
                vrl$('#vrl_accountNo').val(d.accountNo || '');
                vrl$('#vrl_oldPay').val(d.oldPay || '');
                vrl$('#vrl_experience').val(d.experience || '');
                vrl$('#vrl_recruitType').val(d.recruitType || '');
                vrl$('#vrl_recommend').val(d.recommend || '');
                vrl$('#vrl_remark').val(d.remark || '');
                // Dropdowns với reloadCodeSelect
                if (typeof reloadCodeSelect === 'function') {
                    var sc = '#' + _vrl_tabId + ' ';
                    reloadCodeSelect(sc + '#vrl_sexcode', '1324', '', d.sexcode || '');
                    reloadCodeSelect(sc + '#vrl_nationalityCode', '870', '', d.nationalityCode || '');
                    reloadCodeSelect(sc + '#vrl_nationCode', '210942', '', d.nationCode || '');
                    reloadCodeSelect(sc + '#vrl_maritalStatusCode', '1709', '', d.maritalStatusCode || '');
                    reloadCodeSelect(sc + '#vrl_empTypeCode', '13864', '', d.empTypeCode || '');
                    reloadCodeSelect(sc + '#vrl_joinType', '1359', '', d.joinType || '');
                    reloadCodeSelect(sc + '#vrl_joinDetailType', d.joinType || '', '', d.joinDetailType || '');
                    reloadCodeSelect(sc + '#vrl_postFamily', '14015812', '', d.postFamily || '');
                    reloadCodeSelect(sc + '#vrl_postGradeNo', d.postFamily || '', '', d.postGradeNo || '');
                    reloadCodeSelect(sc + '#vrl_positionNo', '14014036', '', d.positionNo || '');
                }
            }
        });
    }

    // ── Reload cấp bậc khi đổi nhóm nhân viên ───────────────────────────────

    window.vrlOnJoinTypeChange = function () {
        var joinTypeVal = vrl$('#vrl_joinType').val();
        if (typeof reloadCodeSelect === 'function') {
            var sc = '#' + _vrl_tabId + ' ';
            reloadCodeSelect(sc + '#vrl_joinDetailType', joinTypeVal || '', '', '');
        }
    };

    window.vrlOnPostFamilyChange = function () {
        var postFamilyVal = vrl$('#vrl_postFamily').val();
        if (typeof reloadCodeSelect === 'function') {
            var sc = '#' + _vrl_tabId + ' ';
            reloadCodeSelect(sc + '#vrl_postGradeNo', postFamilyVal || '', '', '');
        }
    };

    // ── Thêm mới nhân viên ───────────────────────────────────────────────────

    window.vrlNewEmployee = function () {
        inst.selectedPersonId = null;
        vrl$('.vrl-emp-item').removeClass('selected');
        vrl$('#vrl_selectedName').text(/*[[#{recruit.list.label.newEmployee}]]*/ 'Nhân viên mới');
        vrl$('#vrl_selectedEmpId').text('');
        // Reset form
        vrl$('#vrl_personId,#vrl_localName,#vrl_empId,#vrl_englishName,#vrl_koreanName').val('');
        vrl$('#vrl_dob,#vrl_deptNo,#vrl_deptNo_display,#vrl_standardPosition,#vrl_postFamily,#vrl_workArea').val('');
        vrl$('#vrl_costCenter,#vrl_costCenter_display').val('');
        vrl$('#vrl_joinDetailType,#vrl_dateStarted,#vrl_confirmWorkDate,#vrl_endProbationDate').val('');
        vrl$('#vrl_contractStartDate,#vrl_contractEndDate,#vrl_timeStarted,#vrl_coinCode').val('');
        vrl$('#vrl_homePhone,#vrl_companyPhone,#vrl_officePhone,#vrl_email,#vrl_idcardNo').val('');
        vrl$('#vrl_documentType,#vrl_idcardStartDate,#vrl_issuingAuthority,#vrl_addressContent').val('');
        vrl$('#vrl_hujiaddressContent,#vrl_nationality,#vrl_insuranceType,#vrl_insuranceArea').val('');
        vrl$('#vrl_insuranceDistinguish,#vrl_wageType,#vrl_accountNo,#vrl_oldPay,#vrl_experience').val('');
        vrl$('#vrl_recruitType,#vrl_recommend,#vrl_remark').val('');
        vrl$('#vrl_isProbation').val('');
        vrl$('#vrl_jingshebao').val('N');
        // Chuyển sang tab chung
        vrl$('#vrl_tab_general').tab('show');
    };

    // ── Lưu thông tin chung + bổ sung ────────────────────────────────────────

    window.vrlSaveGeneral = function () {
        var payload = {
            personId: vrl$('#vrl_personId').val(),
            localName: vrl$('#vrl_localName').val(),
            empId: vrl$('#vrl_empId').val(),
            englishName: vrl$('#vrl_englishName').val(),
            koreanName: vrl$('#vrl_koreanName').val(),
            sexcode: vrl$('#vrl_sexcode').val(),
            dob: vrl$('#vrl_dob').val(),
            nationalityCode: vrl$('#vrl_nationalityCode').val(),
            nationCode: vrl$('#vrl_nationCode').val(),
            maritalStatusCode: vrl$('#vrl_maritalStatusCode').val(),
            deptNo: vrl$('#vrl_deptNo').val(),
            standardPosition: vrl$('#vrl_standardPosition').val(),
            postFamily: vrl$('#vrl_postFamily').val(),
            postGradeNo: vrl$('#vrl_postGradeNo').val(),
            positionNo: vrl$('#vrl_positionNo').val(),
            workArea: vrl$('#vrl_workArea').val(),
            empTypeCode: vrl$('#vrl_empTypeCode').val(),
            joinType: vrl$('#vrl_joinType').val(),
            joinDetailType: vrl$('#vrl_joinDetailType').val(),
            dateStarted: vrl$('#vrl_dateStarted').val(),
            confirmWorkDate: vrl$('#vrl_confirmWorkDate').val(),
            isProbation: vrl$('#vrl_isProbation').val(),
            endProbationDate: vrl$('#vrl_endProbationDate').val(),
            contractStartDate: vrl$('#vrl_contractStartDate').val(),
            contractEndDate: vrl$('#vrl_contractEndDate').val(),
            timeStarted: vrl$('#vrl_timeStarted').val(),
            costCenter: vrl$('#vrl_costCenter').val(),
            coinCode: vrl$('#vrl_coinCode').val(),
            homePhone: vrl$('#vrl_homePhone').val(),
            companyPhone: vrl$('#vrl_companyPhone').val(),
            officePhone: vrl$('#vrl_officePhone').val(),
            email: vrl$('#vrl_email').val(),
            idcardNo: vrl$('#vrl_idcardNo').val(),
            documentType: vrl$('#vrl_documentType').val(),
            idcardStartDate: vrl$('#vrl_idcardStartDate').val(),
            issuingAuthority: vrl$('#vrl_issuingAuthority').val(),
            addressContent: vrl$('#vrl_addressContent').val(),
            hujiaddressContent: vrl$('#vrl_hujiaddressContent').val(),
            nationality: vrl$('#vrl_nationality').val(),
            insuranceType: vrl$('#vrl_insuranceType').val(),
            insuranceArea: vrl$('#vrl_insuranceArea').val(),
            insuranceDistinguish: vrl$('#vrl_insuranceDistinguish').val(),
            jingshebao: vrl$('#vrl_jingshebao').val(),
            wageType: vrl$('#vrl_wageType').val(),
            accountNo: vrl$('#vrl_accountNo').val(),
            oldPay: vrl$('#vrl_oldPay').val(),
            experience: vrl$('#vrl_experience').val(),
            recruitType: vrl$('#vrl_recruitType').val(),
            recommend: vrl$('#vrl_recommend').val(),
            remark: vrl$('#vrl_remark').val()
        };
        $.ajax({
            url: '/hrm/recruitManage/api/employee/save',
            type: 'POST', contentType: 'application/json',
            data: JSON.stringify(payload),
            success: function (res) {
                if (res.success) {
                    if (!payload.personId) {
                        vrl$('#vrl_personId').val(res.personId);
                        inst.selectedPersonId = res.personId;
                    }
                    vrlLoadList();
                    alert(res.message || /*[[#{common.success}]]*/ 'Thành công');
                } else {
                    alert(res.message || /*[[#{common.error}]]*/ 'Lỗi');
                }
            },
            error: function () { alert(/*[[#{common.error}]]*/ 'Lỗi'); }
        });
    };

    // ── Giáo dục ──────────────────────────────────────────────────────────────

    window.vrlLoadEdu = function () {
        if (!inst.selectedPersonId) return;
        $.ajax({
            url: '/hrm/recruitManage/api/education/list',
            type: 'GET', data: { personId: inst.selectedPersonId },
            success: function (rows) {
                inst.eduData = (rows || []).map(function (r) { r._rowId = String(r.seq); r._isNew = false; r._editing = false; return r; });
                vrlRenderEdu();
            }
        });
    };

    function vrlRenderEdu() {
        var html = '';
        vrl$('#vrl_eduCount').text(inst.eduData.length);
        inst.eduData.forEach(function (r, idx) {
            var chk = '<input type="checkbox" class="form-check-input vrl-edu-chk" data-rowid="' + r._rowId + '" onclick="event.stopPropagation()">';
            if (r._editing) {
                html += '<tr class="vrl-row-edit">';
                html += '<td class="text-center">' + chk + '</td><td class="text-center">' + (idx+1) + '</td>';
                html += '<td>' + vrlSel('vrl_edu_deg_' + r._rowId, r.degreeCode, '13769') + '</td>';
                html += '<td>' + vrlInp('vrl_edu_degs_' + r._rowId, r.degreesCode) + '</td>';
                html += '<td>' + vrlInp('vrl_edu_inst_' + r._rowId, r.institutionName) + '</td>';
                html += '<td>' + vrlInp('vrl_edu_subj_' + r._rowId, r.subject) + '</td>';
                html += '<td>' + vrlInp('vrl_edu_sd_' + r._rowId, r.startDate, ' maxlength="20"') + '</td>';
                html += '<td>' + vrlInp('vrl_edu_ed_' + r._rowId, r.endDate, ' maxlength="20"') + '</td>';
                html += '<td class="text-center"><input type="checkbox" class="form-check-input" id="vrl_edu_final_' + r._rowId + '"' + (r.finalDegreeWhether==='Y'?' checked':'') + '></td>';
                html += '<td class="text-center"><input type="checkbox" class="form-check-input" id="vrl_edu_abroad_' + r._rowId + '"' + (r.experienceStudyAbroad==='Y'?' checked':'') + '></td>';

    window.vrlExecute = function (type) {

        var msg = type === 'CONFIRM'
            ? (/*[[#{recruit.list.js.confirmExecute}]]*/ 'Xác nhận nhận việc cho các nhân viên đã chọn?')
            : (/*[[#{recruit.list.js.confirmCancel}]]*/ 'Hủy xác nhận nhận việc cho các nhân viên đã chọn?');
        if (!confirm(msg)) return;
        $.ajax({
            url: '/hrm/recruitManage/api/execute',
            type: 'POST',
            data: { personIds: personIds.join(','), type: type },
            success: function (res) {
                alert(res.message || (res.success ? /*[[#{common.success}]]*/ 'Thành công' : /*[[#{common.error}]]*/ 'Lỗi'));
