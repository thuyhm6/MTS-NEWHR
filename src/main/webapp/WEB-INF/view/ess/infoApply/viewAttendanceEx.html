<th:block th:fragment="attendanceExModal">
    <div class="modal fade" id="atex_applyDetailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="atex_applyDetailTitle" th:text="#{ck.modal.title}">Thông tin phê duyệt</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">

                    <div class="table-responsive mb-3">
                        <table class="table table-bordered table-sm align-middle mb-0">
                            <tbody>
                                <tr>
                                    <th class="table-light text-center" style="width: 160px;" th:text="#{applyAtt.subject}">Tiêu đề</th>
                                    <td id="atex_modalApplyTitle"></td>
                                </tr>
                                <tr>
                                    <th class="table-light text-center" th:text="#{applyAtt.applicant}">Người xin phép</th>
                                    <td id="atex_modalApplicant"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="table-responsive mb-4">
                        <table class="table table-bordered table-sm align-middle mb-0">
                            <thead class="table-light text-center">
                                <tr>
                                    <th style="width: 50px;" th:text="#{common.no.serial}">STT</th>
                                    <th style="width: 90px;" th:text="#{applyAtt.approvalSeq}">Trình tự duyệt</th>
                                    <th style="width: 110px;" th:text="#{applyAtt.approvalStatus}">Trạng thái duyệt</th>
                                    <th th:text="#{common.empName}">Họ tên</th>
                                    <th th:text="#{applyAtt.opinion}">Ý kiến</th>
                                    <th style="width: 170px;" th:text="#{applyAtt.actionTime}">Thời gian thực hiện</th>
                                    <th style="width: 120px;" th:text="#{common.deptName}">Phòng ban</th>
                                </tr>
                            </thead>
                            <tbody id="atex_modalApprovalBody"></tbody>
                        </table>
                    </div>

                    <h6 class="fw-bold mb-2" th:text="#{applyAtt.empInfo}">Thông tin nhân viên</h6>
                    <div class="table-responsive mb-4">
                        <table class="table table-bordered table-sm align-middle mb-0">
                            <tbody>
                                <tr>
                                    <th class="table-light text-center" style="width: 100px;" th:text="#{common.empName}">Họ tên</th>
                                    <td id="atex_modalEmpName"></td>
                                    <th class="table-light text-center" style="width: 100px;" th:text="#{common.empId}">Mã nhân viên</th>
                                    <td id="atex_modalEmpId"></td>
                                </tr>
                                <tr>
                                    <th class="table-light text-center" th:text="#{common.deptName}">Phòng ban</th>
                                    <td id="atex_modalEmpDept"></td>
                                    <th class="table-light text-center" th:text="#{common.position}">Chức vụ</th>
                                    <td id="atex_modalEmpPost"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <h6 class="fw-bold mb-2" th:text="#{applyAtt.leaveInfo}">Thông tin xin phép</h6>
                    <div class="table-responsive">
                        <table class="table table-bordered table-sm align-middle mb-0">
                            <thead class="table-light text-center">
                                <tr>
                                    <th th:text="#{applyAtt.leaveTypeFull}">Loại nghỉ phép</th>
                                    <th style="width: 170px;" th:text="#{common.startTime}">Thời gian bắt đầu</th>
                                    <th style="width: 170px;" th:text="#{common.endTime}">Thời gian kết thúc</th>
                                    <th style="width: 140px;" th:text="#{applyAtt.leaveDuration}">Thời lượng</th>
                                    <th th:text="#{common.reason}">Lý do</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td id="atex_modalLeaveType" class="text-center"></td>
                                    <td id="atex_modalLeaveFrom" class="text-center"></td>
                                    <td id="atex_modalLeaveTo" class="text-center"></td>
                                    <td id="atex_modalLeaveLength" class="text-center"></td>
                                    <td id="atex_modalLeaveReason" class="text-center"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                </div>
                <div class="modal-footer">
                    <div id="atex_approveSection" class="d-flex align-items-center gap-2 me-auto" style="display:none!important">
                        <button type="button" class="btn btn-success btn-sm" onclick="atexDoAffirm(1)">
                            <i class="bi bi-check-circle"></i>
                            <span th:text="#{vae.btn.approve}">Duyệt</span>
                        </button>
                        <button type="button" class="btn btn-danger btn-sm" onclick="atexDoAffirm(2)">
                            <i class="bi bi-x-circle"></i>
                            <span th:text="#{vae.btn.reject}">Từ chối</span>
                        </button>
                    </div>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" th:text="#{common.close}">Đóng</button>
                </div>
            </div>
        </div>
    </div>
</th:block>

<script th:fragment="attendanceExScript" th:inline="javascript">
    (function () {
        var _atex_detailModal = null;
        var _atex_affirmCtx = null;

        var _atex_i18n = {
            noApplyNo:          /*[[#{applyAtt.msg.noApplyNo}]]*/ 'Không tìm thấy số đơn để xem chi tiết',
            loadingData:        /*[[#{applyAtt.loadingData}]]*/ 'Đang tải dữ liệu...',
            noApprovalData:     /*[[#{applyAtt.noApprovalData}]]*/ 'Không có dữ liệu phê duyệt',
            loadFailed:         /*[[#{applyAtt.loadFailed}]]*/ 'Tải dữ liệu thất bại',
            applyTitleFallback: /*[[#{ck.modal.title}]]*/ 'Thông tin phê duyệt',
            executeFail:        /*[[#{vae.msg.executeFail}]]*/ 'Có lỗi xảy ra trong quá trình xử lý.'
        };

        function atexEscHtml(value) {
            if (value === null || value === undefined) return '';
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function atexSetText(selector, value) {
            $(selector).text(value || '');
        }

        function atexBuildApplyTitle(info) {
            var leaveTypeName = info.leaveTypeName || '';
            var localName     = info.localName     || '';
            var fromTime      = info.leaveFromTime || '';
            var toTime        = info.leaveToTime   || '';
            if (!leaveTypeName && !localName && !fromTime && !toTime) return '';
            return leaveTypeName + '/Apply(' + localName + ')[Date: ' + fromTime + ' ~ ' + toTime + ']';
        }

        function atexResetModal() {
            atexSetText('#atex_modalApplyTitle', '');
            atexSetText('#atex_modalApplicant', '');
            atexSetText('#atex_modalEmpName', '');
            atexSetText('#atex_modalEmpId', '');
            atexSetText('#atex_modalEmpDept', '');
            atexSetText('#atex_modalEmpPost', '');
            atexSetText('#atex_modalLeaveType', '');
            atexSetText('#atex_modalLeaveFrom', '');
            atexSetText('#atex_modalLeaveTo', '');
            atexSetText('#atex_modalLeaveLength', '');
            atexSetText('#atex_modalLeaveReason', '');
            $('#atex_modalApprovalBody').html('<tr><td colspan="7" class="text-center text-muted">'
                + atexEscHtml(_atex_i18n.loadingData) + '</td></tr>');
        }

        function atexRenderApprovalRows(approvalList) {
            if (!approvalList || !approvalList.length) {
                $('#atex_modalApprovalBody').html('<tr><td colspan="7" class="text-center text-muted">'
                    + atexEscHtml(_atex_i18n.noApprovalData) + '</td></tr>');
                return;
            }
            var canAffirm = _atex_affirmCtx && _atex_affirmCtx.fromApprovalEmail
                && _atex_affirmCtx.affirmPersonId && String(_atex_affirmCtx.affirmFlag) === '0';
            var html = '';
            approvalList.forEach(function (item, index) {
                var stt = item.affirmLevel || (index + 1);
                if (String(stt) === '100') stt = 'HR';
                var isPending = canAffirm && item.affirmPersonId === _atex_affirmCtx.affirmPersonId
                    && String(item.affirmFlag) === '0';
                var opinionCell = isPending
                    ? '<input type="text" id="atex_pendingOpinionInput" class="form-control form-control-sm" style="min-width:140px;">'
                    : atexEscHtml(item.affirmContent || '');
                html += '<tr>'
                    + '<td class="text-center">' + atexEscHtml(stt) + '</td>'
                    + '<td class="text-center">' + atexEscHtml(item.affirmTypeName || '') + '</td>'
                    + '<td class="text-center">' + atexEscHtml(item.affirmFlagName || '') + '</td>'
                    + '<td>' + atexEscHtml(item.affirmName || '') + '</td>'
                    + '<td>' + opinionCell + '</td>'
                    + '<td class="text-center">' + atexEscHtml(item.updateDate || '') + '</td>'
                    + '<td class="text-center">' + atexEscHtml(item.deptName || '') + '</td>'
                    + '</tr>';
            });
            $('#atex_modalApprovalBody').html(html);

            if (canAffirm) {
                $('#atex_approveSection').show();
            }
        }

        function atexRenderData(data) {
            var leaveInfo    = data && data.leaveInfo    ? data.leaveInfo    : {};
            var employeeInfo = data && data.employeeInfo ? data.employeeInfo : leaveInfo;
            var approvalList = data && data.approvalList ? data.approvalList : [];

            $('#atex_applyDetailTitle').text('[' + (leaveInfo.leaveTypeName || _atex_i18n.applyTitleFallback) + ']');
            atexSetText('#atex_modalApplyTitle', atexBuildApplyTitle(leaveInfo));
            atexSetText('#atex_modalApplicant',
                (employeeInfo.localName || '') + '/' + (employeeInfo.postGradeName || '') + '/' + (employeeInfo.deptName || ''));

            atexSetText('#atex_modalEmpName',  employeeInfo.localName     || '');
            atexSetText('#atex_modalEmpId',    employeeInfo.empId         || '');
            atexSetText('#atex_modalEmpDept',  employeeInfo.deptName      || '');
            atexSetText('#atex_modalEmpPost',  employeeInfo.postGradeName || '');

            atexSetText('#atex_modalLeaveType',   leaveInfo.leaveTypeName || '');
            atexSetText('#atex_modalLeaveFrom',   leaveInfo.leaveFromTime || '');
            atexSetText('#atex_modalLeaveTo',     leaveInfo.leaveToTime   || '');
            atexSetText('#atex_modalLeaveLength', leaveInfo.applyLength   || '');
            atexSetText('#atex_modalLeaveReason', leaveInfo.leaveReason   || '');

            atexRenderApprovalRows(approvalList);
        }

        window.atexOpenApplyDetail = function (applyNo, applyType, ctx) {
            if (!applyNo) {
                typeof toastr !== 'undefined' && toastr.warning(_atex_i18n.noApplyNo);
                return;
            }
            _atex_affirmCtx = ctx || null;

            // Dọn sạch state Bootstrap Modal còn sót từ tab trước
            $('.modal-backdrop').remove();
            $('body').removeClass('modal-open').css({ paddingRight: '', overflow: '' });

            // Tìm modal element (có thể đang nằm trong tab pane bị ẩn)
            var modalEl = document.getElementById('atex_applyDetailModal');
            if (!modalEl) return;

            // Di chuyển modal ra thẳng <body> để tránh bị ẩn theo tab pane display:none
            if (modalEl.parentElement !== document.body) {
                document.body.appendChild(modalEl);
            }

            // Re-init nếu element đã thay đổi hoặc chưa khởi tạo
            if (!_atex_detailModal || _atex_detailModal._element !== modalEl) {
                try { if (_atex_detailModal) _atex_detailModal.dispose(); } catch (e) {}
                _atex_detailModal = window.bootstrap ? new bootstrap.Modal(modalEl) : null;
            }

            atexResetModal();
            $('#atex_approveSection').hide();
            if (_atex_detailModal) _atex_detailModal.show();

            $.ajax({
                url: '/ess/infoApplyAttendance/api/checkAttendanceEx/detail',
                type: 'GET',
                data: { applyNo: applyNo, applyType: applyType || '' },
                success: function (res) { atexRenderData(res || {}); },
                error: function () {
                    $('#atex_modalApprovalBody').html('<tr><td colspan="7" class="text-center text-danger">'
                        + atexEscHtml(_atex_i18n.loadFailed) + '</td></tr>');
                    typeof toastr !== 'undefined' && toastr.error(_atex_i18n.loadFailed);
                }
            });
        };

        window.atexDoAffirm = function (flag) {
            if (!_atex_affirmCtx) return;
            var affirmContent = ($('#atex_pendingOpinionInput').val() || '').trim() || (flag === 1 ? 'Ok' : 'Reject');
            var items = [{
                applyNo:      _atex_affirmCtx.applyNo,
                applyType:    _atex_affirmCtx.applyType,
                applyFlag:    _atex_affirmCtx.applyFlag,
                affirmLevel:  _atex_affirmCtx.affirmLevel,
                flag:         flag,
                affirmContent: affirmContent
            }];
            $.ajax({
                url: '/ess/infoApply/api/approvalEmail/execute',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ items: items }),
                success: function (res) {
                    if (_atex_detailModal) _atex_detailModal.hide();
                    if (res.success) {
                        typeof vaeLoadList === 'function' && vaeLoadList();
                    } else {
                        alert(res.message || _atex_i18n.executeFail);
                    }
                },
                error: function () {
                    alert(_atex_i18n.executeFail);
                }
            });
        };

        $(document).ready(function () {
            if (window.bootstrap && document.getElementById('atex_applyDetailModal')) {
                _atex_detailModal = new bootstrap.Modal(document.getElementById('atex_applyDetailModal'));
            }
        });
    })();
</script>
