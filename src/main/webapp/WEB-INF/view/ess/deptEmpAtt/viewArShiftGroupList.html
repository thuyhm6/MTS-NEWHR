<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <!-- Search Form -->
                    <form id="shg_searchForm" class="row g-3 mb-4">
                        <div class="col-md-3">
                            <label for="shg_searchEmpId" class="form-label" th:text="#{common.empId}">Mã nhân viên</label>
                            <input type="text" class="form-control" id="shg_searchEmpId"
                                th:placeholder="#{common.placeholder.empId}" placeholder="Nhập mã nhân viên">
                        </div>
                        <div class="col-md-3">
                            <label for="shg_searchEmpName" class="form-label" th:text="#{common.empName}">Tên nhân viên</label>
                            <input type="text" class="form-control" id="shg_searchEmpName"
                                th:placeholder="#{common.placeholder.empName}" placeholder="Nhập tên nhân viên">
                        </div>
                        <div class="col-md-4 d-flex align-items-end flex-wrap gap-1">
                            <button type="button" class="btn btn-primary" onclick="shgSearchData()">
                                <i class="bx bx-search"></i> <span th:text="#{common.search}">Tìm kiếm</span>
                            </button>
                            <button type="button" class="btn btn-secondary" onclick="shgClearSearch()">
                                <i class="bx bx-x"></i> <span th:text="#{common.clearFilter}">Xóa lọc</span>
                            </button>
                        </div>
                    </form>

                    <!-- Data Table -->
                    <div class="table-responsive">
                        <table id="shg_dataTable" class="table table-striped table-bordered table-hover"
                            style="width:100%">
                            <thead class="table-light">
                                <tr>
                                    <th style="width: 3%;" th:text="#{common.stt}">STT</th>
                                    <th style="width: 10%;" th:text="#{common.empId}">Mã NV</th>
                                    <th style="width: 15%;" th:text="#{common.empName}">Tên nhân viên</th>
                                    <th style="width: 15%;" th:text="#{ess.shiftGroup.col.beforeShift}">Ca trước thay đổi</th>
                                    <th style="width: 18%;" th:text="#{ess.shiftGroup.col.afterShift}">Ca sau thay đổi</th>
                                    <th style="width: 12%;" th:text="#{common.startDate}">Ngày bắt đầu</th>
                                    <th style="width: 17%;" th:text="#{common.note}">Ghi chú</th>
                                    <th class="text-center" style="width: 10%;" th:text="#{common.action}">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<template id="fragmentScripts">
    <script th:inline="javascript">
        var _shg_shiftList = [];
        var _shg_table;

        $(document).ready(function () {
            // Tải danh sách ca làm việc thông qua parent-code 400223
            $.ajax({
                url: '/sys/api/code/list?parentCodeNo=400223',
                success: function (data) {
                    _shg_shiftList = data || [];
                    shgInitTable();
                },
                error: function () {
                    toastr && toastr.error('Không tải được danh sách Ca làm việc!');
                    shgInitTable();
                }
            });
        });

        function shgInitTable() {
            _shg_table = $('#shg_dataTable').DataTable({
                destroy: true,
                scrollY: "calc(100vh - 280px)",
                scrollCollapse: true,
                paging: true,
                searching: false, // Bỏ search mặc định để dùng form search tự custom
                lengthChange: true,
                pageLength: 25,
                processing: true,

                ajax: {
                    url: '/ess/deptEmpAtt/api/shiftGroup/list',
                    dataSrc: '',
                    data: function (d) {
                        d.empId = $('#shg_searchEmpId').val();
                        d.empName = $('#shg_searchEmpName').val();
                    }
                },
                columns: [
                    {
                        data: null,
                        render: function (data, type, row, meta) {
                            return meta.row + 1;
                        }
                    },
                    { data: 'empId' },
                    { data: 'localName' },
                    { data: 'beforShiftName' },
                    {
                        data: 'shiftNo',
                        render: function (data, type, row) {
                            var opts = '';
                            _shg_shiftList.forEach(function (s) {
                                var selected = (s.codeNo === data) ? 'selected' : '';
                                var displayName = s.codeName || s.description || s.codeNo;
                                opts += '<option value="' + s.codeNo + '" ' + selected + '>' + displayName + '</option>';
                            });
                            return '<select class="form-select form-select-sm shg-in-shift">' + opts + '</select>';
                        }
                    },
                    {
                        data: 'startDate',
                        render: function (data, type, row) {
                            var val = data ? data.replace(/\//g, '-') : '';
                            return '<input type="date" class="form-control form-control-sm shg-in-start" value="' + val + '">';
                        }
                    },
                    {
                        data: 'remark',
                        render: function (data, type, row) {
                            var val = data ? data.replace(/"/g, '&quot;') : '';
                            return '<input type="text" class="form-control form-control-sm shg-in-remark" value="' + val + '">';
                        }
                    },
                    {
                        data: null,
                        className: "text-center",
                        render: function (data, type, row) {
                            return '<button class="btn btn-sm btn-primary" onclick="shgSaveLine(this, \'' + row.personId + '\', \'' + (row.beforShiftNo || '') + '\')">'
                                + '<i class="bx bx-save"></i> Lưu'
                                + '</button>';
                        }
                    }
                ]
            });
        }

        window.shgSearchData = function () {
            if (_shg_table) {
                _shg_table.ajax.reload();
            }
        };

        window.shgClearSearch = function () {
            $('#shg_searchForm')[0].reset();
            if (_shg_table) {
                _shg_table.ajax.reload();
            }
        };

        window.shgSaveLine = function (btn, personId, beforShiftNo) {
            var $tr = $(btn).closest('tr');
            var shiftNo = $tr.find('.shg-in-shift').val();
            var startDate = $tr.find('.shg-in-start').val();
            var remark = $tr.find('.shg-in-remark').val();

            if (!personId) {
                toastr && toastr.warning('Không lấy được thông tin nhân viên (PERSON_ID).');
                return;
            }
            if (!shiftNo) {
                toastr && toastr.warning('Vui lòng chọn Ca mới.');
                return;
            }
            if (!startDate) {
                toastr && toastr.warning('Vui lòng nhập Ngày bắt đầu.');
                return;
            }

            var payload = {
                PERSON_ID: personId,
                BEFOR_SHIFT_NO: beforShiftNo,
                SHIFT_NO: shiftNo,
                START_DATE: startDate,
                REMARK: remark || ''
            };

            var $btn = $(btn);
            var originalHtml = $btn.html();
            $btn.html('<i class="bx bx-loader bx-spin"></i>').prop('disabled', true);

            $.ajax({
                url: '/ess/deptEmpAtt/api/shiftGroup/save',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(payload),
                success: function (res) {
                    $btn.html(originalHtml).prop('disabled', false);
                    if (res && res.success) {
                        toastr && toastr.success(res.message || 'Lưu thành công!');
                        // Không gọi table.ajax.reload() nếu không cần thiết vì người dùng có thể đang chỉnh dòng khác
                        // Cập nhật lại beforShiftNo nếu procedure cập nhật và ta muốn sửa tiếp
                        // Tuy nhiên reload sẽ an toàn hơn để thấy dữ liệu mới
                        // shgSearchData();
                    } else {
                        toastr && toastr.error((res && res.error) || 'Lỗi server.');
                    }
                },
                error: function (err) {
                    $btn.html(originalHtml).prop('disabled', false);
                    var msg = (err.responseJSON && err.responseJSON.error) ? err.responseJSON.error : 'Lỗi không xác định';
                    toastr && toastr.error('Lỗi: ' + msg);
                }
            });
        };
    </script>
</template>
