<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <!-- Form tìm kiếm -->
            <div class="card mb-3">
                <div class="card-body">
                    <form id="mci_searchForm" class="row g-3">
                        <div class="col-md-3">
                            <label for="mci_keyword" class="form-label" th:text="#{essDept.keyword}">Mã nhân viên / Họ tên</label>
                            <input type="text" class="form-control" id="mci_keyword"
                                th:placeholder="#{vdp.search.empKeyword.placeholder}" placeholder="Nhập mã hoặc họ tên">
                        </div>
                        <div class="col-md-3">
                            <label for="mci_deptNo" class="form-label" th:text="#{common.deptName}">Phòng ban</label>
                            <input type="text" class="form-control" id="mci_deptNo"
                                th:placeholder="#{vdp.search.dept.placeholder}" placeholder="Chọn phòng ban" readonly>
                        </div>
                        <div class="col-md-2">
                            <label for="mci_postFamily" class="form-label" th:text="#{common.empGroup}">Nhóm nhân viên</label>
                            <select class="form-select" id="mci_postFamily" data-parent-code="14015812"
                                th:attr="data-default-text=#{common.selectAll}" data-default-text="-- Tất cả --"></select>
                        </div>
                        <div class="col-md-2">
                            <label for="mci_empTypeCode" class="form-label" th:text="#{common.empType}">Loại nhân viên</label>
                            <select class="form-select" id="mci_empTypeCode" data-parent-code="13864"
                                th:attr="data-default-text=#{common.selectAll}" data-default-text="-- Tất cả --"></select>
                        </div>
                        <div class="col-md-2">
                            <label for="mci_empOffice" class="form-label" th:text="#{common.status}">Trạng thái</label>
                            <select class="form-select" id="mci_empOffice" data-parent-code="15118"
                                th:attr="data-default-text=#{common.selectAll}" data-default-text="-- Tất cả --"
                                data-default-value="15119"></select>
                        </div>
                        <div class="col-12 d-flex gap-2 flex-wrap">
                            <button type="button" class="btn btn-primary" onclick="mciSearchData()">
                                <i class="bx bx-search"></i> <span th:text="#{essDept.search}">Tra cứu</span>
                            </button>
                            <button type="button" class="btn btn-secondary" onclick="mciClearSearch()">
                                <i class="bx bx-x"></i> <span th:text="#{essDept.clearFilter}">Xóa lọc</span>
                            </button>
                            <button type="button" class="btn btn-success" onclick="mciExportExcel()">
                                <i class="bx bx-export"></i> <span th:text="#{essDept.exportExcel}">Xuất excel</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Khu vực thống kê -->
            <div id="mci_statsSection">
                <!-- Hàng 1: Tổng số + Giới tính + Loại nhân viên -->
                <div class="row g-3 mb-3">
                    <div class="col-md-4">
                        <div class="card h-100 border-primary">
                            <div class="card-body d-flex flex-column align-items-center justify-content-center text-center">
                                <div class="text-muted mb-1 fw-semibold" th:text="#{mci.stats.total}">Tổng số nhân viên</div>
                                <div id="mci_totalCount" class="display-4 fw-bold text-primary">0</div>
                                <div class="text-muted mt-1 small" th:text="#{common.empName}">Nhân viên</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card h-100">
                            <div class="card-body">
                                <h6 class="card-title text-center mb-2" th:text="#{mci.stats.byGender}">Theo giới tính</h6>
                                <div id="mci_chartByGender"></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card h-100">
                            <div class="card-body">
                                <h6 class="card-title text-center mb-2" th:text="#{mci.stats.byEmpType}">Theo loại nhân viên</h6>
                                <div id="mci_chartByEmpType"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Hàng 2: Phòng ban + Nhóm nhân viên -->
                <div class="row g-3 mb-3">
                    <div class="col-md-8">
                        <div class="card h-100">
                            <div class="card-body">
                                <h6 class="card-title text-center mb-2" th:text="#{mci.stats.byDept}">Theo phòng ban</h6>
                                <div id="mci_chartByDept"></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card h-100">
                            <div class="card-body">
                                <h6 class="card-title text-center mb-2" th:text="#{mci.stats.byPostFamily}">Theo nhóm nhân viên</h6>
                                <div id="mci_chartByPostFamily"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Hàng 3: Chức danh + Độ tuổi -->
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <div class="card h-100">
                            <div class="card-body">
                                <h6 class="card-title text-center mb-2" th:text="#{mci.stats.byPostGrade}">Theo chức danh</h6>
                                <div id="mci_chartByPostGrade"></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card h-100">
                            <div class="card-body">
                                <h6 class="card-title text-center mb-2" th:text="#{mci.stats.byAge}">Theo độ tuổi</h6>
                                <div id="mci_chartByAge"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Danh sách nhân viên chi tiết -->
            <div class="card">
                <div class="card-body">
                    <h6 class="fw-bold mb-3" th:text="#{mci.detail.title}">Danh sách nhân viên chi tiết</h6>
                    <div class="dt-table-wrapper" style="overflow: auto;">
                        <table id="mci_dataTable" class="table table-striped table-bordered table-hover">
                            <thead class="table-light text-center align-middle">
                                <tr>
                                    <th th:text="#{common.stt}">STT</th>
                                    <th th:text="#{common.empId}">Mã NV</th>
                                    <th th:text="#{common.empName}">Họ tên</th>
                                    <th th:text="#{common.deptName}">Phòng ban</th>
                                    <th th:text="#{common.empGroup}">Nhóm NV</th>
                                    <th th:text="#{mci.col.postGrade}">Chức danh</th>
                                    <th th:text="#{common.empType}">Loại NV</th>
                                    <th th:text="#{mci.col.dob}">Ngày sinh</th>
                                    <th th:text="#{mci.col.gender}">Giới tính</th>
                                    <th th:text="#{common.dateJoined}">Ngày vào làm</th>
                                    <th th:text="#{common.status}">Trạng thái</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<template id="fragmentScripts">
    <script th:inline="javascript">
        var _mci_table = null;
        var _mci_pageBooted = false;
        var _mci_selectedDeptCodes = [];
        var _mci_charts = {};
        var _mci_msg = {
            noData:      /*[[#{mci.msg.noData}]]*/ 'Không có dữ liệu',
            loading:     /*[[#{mci.msg.loading}]]*/ 'Đang tải...',
            loadFailed:  /*[[#{mci.msg.loadFailed}]]*/ 'Tải dữ liệu thất bại',
            chartNoData: /*[[#{mci.msg.chartNoData}]]*/ 'Không có dữ liệu thống kê'
        };

        /* ── Khởi tạo bộ chọn phòng ban ── */
        function mciInitDeptSelector() {
            if (typeof DeptTree === 'undefined') return;
            DeptTree.init('#mci_deptNo', function (selectedCodes) {
                _mci_selectedDeptCodes = selectedCodes || [];
            });
        }

        /* ── Thu thập tham số tìm kiếm ── */
        function mciGetSearchParams() {
            return {
                keyword:     $('#mci_keyword').val(),
                deptNos:     (_mci_selectedDeptCodes || []).join(','),
                postFamily:  $('#mci_postFamily').val(),
                empTypeCode: $('#mci_empTypeCode').val(),
                empOffice:   $('#mci_empOffice').val()
            };
        }

        /* ── Huỷ và xoá tất cả biểu đồ hiện tại ── */
        function mciDestroyCharts() {
            Object.keys(_mci_charts).forEach(function (key) {
                if (_mci_charts[key] && typeof _mci_charts[key].destroy === 'function') {
                    _mci_charts[key].destroy();
                }
            });
            _mci_charts = {};
        }

        /* ── Tạo biểu đồ donut ── */
        function mciCreateDonutChart(elementId, items, height) {
            var el = document.getElementById(elementId);
            if (!el) return;
            el.innerHTML = '';
            if (!items || !items.length) {
                el.innerHTML = '<p class="text-center text-muted small py-3">' + _mci_msg.chartNoData + '</p>';
                return;
            }
            var labels = items.map(function (i) { return i.label || i.code || '?'; });
            var values = items.map(function (i) { return i.count || 0; });
            var options = {
                chart:   { type: 'donut', height: height || 200, toolbar: { show: false } },
                series:  values,
                labels:  labels,
                legend:  { position: 'bottom', fontSize: '11px' },
                dataLabels: { enabled: true, formatter: function (val, opts) { return opts.w.globals.series[opts.seriesIndex]; } },
                tooltip: { y: { formatter: function (val) { return val + ' NV'; } } },
                plotOptions: { pie: { donut: { size: '55%' } } }
            };
            var chart = new ApexCharts(el, options);
            chart.render();
            _mci_charts[elementId] = chart;
        }

        /* ── Tạo biểu đồ cột ngang (bar) ── */
        function mciCreateBarChart(elementId, items, height) {
            var el = document.getElementById(elementId);
            if (!el) return;
            el.innerHTML = '';
            if (!items || !items.length) {
                el.innerHTML = '<p class="text-center text-muted small py-3">' + _mci_msg.chartNoData + '</p>';
                return;
            }
            var labels = items.map(function (i) { return i.label || i.code || '?'; });
            var values = items.map(function (i) { return i.count || 0; });
            var autoHeight = Math.max(height || 200, labels.length * 28 + 60);
            var options = {
                chart: {
                    type: 'bar', height: autoHeight,
                    toolbar: { show: false }
                },
                series: [{ name: 'Số NV', data: values }],
                xaxis: {
                    categories: labels,
                    labels: { style: { fontSize: '11px' } }
                },
                yaxis: {
                    labels: { style: { fontSize: '11px' } }
                },
                plotOptions: {
                    bar: { horizontal: true, borderRadius: 3, dataLabels: { position: 'top' } }
                },
                dataLabels: {
                    enabled: true,
                    offsetX: 20,
                    style: { fontSize: '11px', colors: ['#333'] }
                },
                tooltip: { y: { formatter: function (val) { return val + ' NV'; } } },
                colors: ['#4e73df']
            };
            var chart = new ApexCharts(el, options);
            chart.render();
            _mci_charts[elementId] = chart;
        }

        /* ── Vẽ tất cả biểu đồ từ dữ liệu summary ── */
        function mciRenderCharts(data) {
            $('#mci_totalCount').text(data.totalCount || 0);
            mciCreateDonutChart('mci_chartByGender',     data.byGender,     200);
            mciCreateDonutChart('mci_chartByEmpType',    data.byEmpType,     200);
            mciCreateBarChart(  'mci_chartByDept',       data.byDept,        250);
            mciCreateDonutChart('mci_chartByPostFamily', data.byPostFamily,  200);
            mciCreateBarChart(  'mci_chartByPostGrade',  data.byPostGrade,   200);
            mciCreateBarChart(  'mci_chartByAge',        data.byAge,         220);
        }

        /* ── Gọi API lấy dữ liệu thống kê ── */
        function mciLoadSummary() {
            var params = mciGetSearchParams();
            $.ajax({
                url: '/ess/viewDept/api/manageCountInfo/summary',
                type: 'GET',
                data: params,
                success: function (res) {
                    mciDestroyCharts();
                    mciRenderCharts(res);
                },
                error: function () {
                    if (typeof toastr !== 'undefined') toastr.error(_mci_msg.loadFailed);
                }
            });
        }

        /* ── Khởi tạo DataTable server-side ── */
        function mciInitTable() {
            _mci_table = $('#mci_dataTable').DataTable({
                destroy:      true,
                serverSide:   true,
                paging:       true,
                searching:    false,
                lengthChange: true,
                pageLength:   25,
                processing:   true,
                autoWidth:    false,
                dom:          'Blfrtip',
                buttons: [{ extend: 'excel', title: 'manage_count_info_list' }],
                ajax: {
                    url:  '/ess/viewDept/api/manageCountInfo/list',
                    type: 'GET',
                    data: function (d) {
                        var p = mciGetSearchParams();
                        d.keyword     = p.keyword;
                        d.deptNos     = p.deptNos;
                        d.postFamily  = p.postFamily;
                        d.empTypeCode = p.empTypeCode;
                        d.empOffice   = p.empOffice;
                    }
                },
                initComplete: function () {
                    $('#mci_dataTable_wrapper').find('.dt-buttons').hide();
                },
                columns: [
                    {
                        data: null, className: 'text-center',
                        render: function (data, type, row, meta) {
                            return meta.settings._iDisplayStart + meta.row + 1;
                        }
                    },
                    { data: 'empId',          className: 'text-center' },
                    { data: 'localName' },
                    { data: 'deptName' },
                    { data: 'postFamilyName', className: 'text-center' },
                    { data: 'postGradeNo',    className: 'text-center' },
                    { data: 'empTypeName',    className: 'text-center' },
                    { data: 'dob',            className: 'text-center' },
                    { data: 'sexName',        className: 'text-center' },
                    { data: 'dateStarted',    className: 'text-center' },
                    { data: 'empOfficeName',  className: 'text-center' }
                ]
            });
        }

        /* ── Khởi động trang ── */
        function mciBootPage() {
            if (_mci_pageBooted) return;
            if (!document.getElementById('mci_dataTable')) {
                setTimeout(mciBootPage, 30);
                return;
            }
            _mci_pageBooted = true;
            mciInitDeptSelector();
            $.when(typeof initCodeSelects === 'function' ? initCodeSelects('#mci_searchForm') : null).always(function () {
                mciInitTable();
                mciLoadSummary();
            });
        }

        window.mciSearchData = function () {
            mciLoadSummary();
            if (_mci_table) _mci_table.ajax.reload();
        };

        window.mciClearSearch = function () {
            $('#mci_keyword').val('');
            $('#mci_deptNo').val('');
            _mci_selectedDeptCodes = [];
            $('.auth-dept-chk-global').prop('checked', false).trigger('change');
            if (typeof resetCodeSelectDefaults === 'function') {
                resetCodeSelectDefaults('#mci_searchForm');
            } else {
                $('#mci_postFamily').val('');
                $('#mci_empTypeCode').val('');
                $('#mci_empOffice').val('');
            }
            mciLoadSummary();
            if (_mci_table) _mci_table.ajax.reload();
        };

        window.mciExportExcel = function () {
            if (!_mci_table) return;
            var info = _mci_table.page.info();
            var total = info.recordsTotal;
            if (!total) {
                if (typeof toastr !== 'undefined') toastr.warning(_mci_msg.noData);
                return;
            }
            var origLen = _mci_table.page.len();
            // Tải toàn bộ dữ liệu trước khi xuất Excel
            _mci_table.page.len(total);
            _mci_table.ajax.reload(function () {
                _mci_table.button('.buttons-excel').trigger();
                // Khôi phục phân trang sau khi xuất
                setTimeout(function () {
                    _mci_table.page.len(origLen).ajax.reload();
                }, 800);
            }, false);
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', mciBootPage);
        }
        if (typeof $ !== 'undefined') {
            $(document).ready(mciBootPage);
        } else {
            mciBootPage();
        }
    </script>
</template>
