<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <!-- Search Form -->
                    <form id="ab_searchForm" class="row g-3 mb-4">
                        <div class="col-md-2">
                            <label for="ab_searchEmpId" class="form-label" th:text="#{common.empId}">Mã nhân viên</label>
                            <input type="text" class="form-control" id="ab_searchEmpId" th:placeholder="#{common.placeholder.enterEmpId}" placeholder="Nhập mã nhân viên">
                        </div>
                        <div class="col-md-2">
                            <label for="ab_searchEmpName" class="form-label" th:text="#{common.empName}">Tên nhân viên</label>
                            <input type="text" class="form-control" id="ab_searchEmpName"
                                th:placeholder="#{common.placeholder.enterEmpName}" placeholder="Nhập tên nhân viên">
                        </div>
                        <div class="col-md-2">
                            <label for="ab_searchFromDate" class="form-label" th:text="#{common.fromDate}">Từ ngày</label>
                            <input type="date" class="form-control" id="ab_searchFromDate">
                        </div>
                        <div class="col-md-2">
                            <label for="ab_searchToDate" class="form-label" th:text="#{common.toDate}">Đến ngày</label>
                            <input type="date" class="form-control" id="ab_searchToDate">
                        </div>
                        <div class="col-md-2">
                            <label for="ab_searchAffirmFlag" class="form-label" th:text="#{applyAtt.search.affirmFlag}">Trạng thái đơn nghỉ phép</label>
                            <select class="form-select" id="ab_searchAffirmFlag">
                                <option value="" th:text="#{common.selectAll}">-- Tất cả --</option>
                                <option value="14014309" th:text="#{applyAtt.affirmFlag.waiting}">Chờ duyệt</option>
                                <option value="14014308" th:text="#{applyAtt.affirmFlag.approved}">Đã duyệt</option>
                                <option value="14014307" th:text="#{applyAtt.affirmFlag.approving}">Đang duyệt</option>
                                <option value="14014306" th:text="#{applyAtt.affirmFlag.sent}">Gửi</option>
                                <option value="14014310" th:text="#{applyAtt.affirmFlag.cancelled}">Đã hủy</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label for="ab_searchConfirmFlag" class="form-label" th:text="#{applyAtt.search.confirmFlag}">Trạng thái xác nhận</label>
                            <select class="form-select" id="ab_searchConfirmFlag">
                                <option value="" th:text="#{common.selectAll}">-- Tất cả --</option>
                                <option value="0" th:text="#{applyAtt.confirmFlag.notConfirmed}">Chưa xác nhận</option>
                                <option value="1" th:text="#{applyAtt.confirmFlag.confirmed}">Đã xác nhận</option>
                                <option value="2" th:text="#{applyAtt.confirmFlag.rejected}">Từ chối</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label for="ab_searchLeaveTypeCode" class="form-label" th:text="#{applyAtt.leaveTypeFull}">Loại nghỉ phép</label>
                            <select class="form-select" id="ab_searchLeaveTypeCode">
                                <option value="" th:text="#{common.selectAll}">-- Tất cả --</option>
                            </select>
                        </div>
                        <div class="col-md-9 d-flex align-items-end flex-wrap gap-1">
                            <button type="button" class="btn btn-primary" onclick="abSearchData()">
                                <i class="bx bx-search"></i> <span th:text="#{common.search}">Tìm kiếm</span>
                            </button>
                            <button type="button" class="btn btn-secondary" onclick="abClearSearch()">
                                <i class="bx bx-x"></i> <span th:text="#{common.clearFilter}">Xóa lọc</span>
                            </button>
                            <button type="button" class="btn btn-success" onclick="abAddEmptyRow()">
                                <i class="bx bx-plus"></i> <span th:text="#{common.addNew}">Thêm mới</span>
                            </button>
                            <button type="button" class="btn btn-primary" id="ab_btnSaveAll" onclick="abSaveAllNewRows()">
                                <i class="bx bx-save"></i> <span th:text="#{common.save}">Lưu</span>
                            </button>
                            <button type="button" class="btn btn-danger" id="ab_btnCancelLeave" onclick="abCancelSelected()">
                                <i class="bx bx-x-circle"></i> <span th:text="#{applyAtt.cancelLeave}">Hủy đơn</span>
                            </button>
                            <button type="button" class="btn btn-info text-white" onclick="abDownloadTemplate()">
                                <i class="bx bx-download"></i> <span th:text="#{common.downloadTemplate}">Tải File Mẫu</span>
                            </button>
                            <button type="button" class="btn btn-warning" onclick="abOpenImportModal()">
                                <i class="bx bx-upload"></i> <span th:text="#{common.importExcel}">Import Excel</span>
                            </button>
                        </div>
                    </form>

                    <!-- Data Table -->
                    <div class="table-responsive">
                        <table id="ab_dataTable" class="table table-striped table-bordered table-hover"
                            style="min-width:2000px">
                            <thead class="table-light text-center align-middle">
                                <tr>
                                    <th><input type="checkbox" id="ab_chkAll" title="Chọn tất cả"></th>
                                    <th>No</th>
                                    <th th:text="#{common.empName}">Nhân viên</th>
                                    <th th:text="#{common.deptName}">Phòng ban</th>
                                    <th th:text="#{applyAtt.remainLeave}">Phép còn</th>
                                    <th th:text="#{common.shift}">Ca làm việc</th>
                                    <th th:text="#{applyAtt.leaveType}">Loại nghỉ</th>
                                    <th th:text="#{common.startTime}">Thời gian bắt đầu</th>
                                    <th th:text="#{common.endTime}">Thời gian kết thúc</th>
                                    <th th:text="#{ess.viewApply.title.length}">Thời lượng</th>
                                    <th th:text="#{common.reason}">Lý do</th>
                                    <th th:text="#{common.status}">Trạng thái</th>
                                    <th th:text="#{common.creator}">Người tạo</th>
                                    <th th:text="#{common.updater}">Người sửa</th>
                                    <th th:text="#{common.approver}">Người duyệt</th>
                                    <th th:text="#{common.action}">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{ess/infoApply/viewApprovaledLeave :: approvalLeaveModal}"></th:block>

<template id="fragmentScripts">
    <th:block th:replace="~{ess/infoApply/viewApprovaledLeave :: approvalLeaveScript}"></th:block>
    <script th:inline="javascript">
        var _ab_typeList = [];
        var _ab_table;
        var _ab_addedRows = [];
        var _ab_pageBooted = false;

        function abNormalizeDateTimeValue(rawValue) {
            if (!rawValue) return '';
            var normalized = String(rawValue).trim().replace('T', ' ');
            var parts = normalized.split(' ');
            if (parts.length < 2) return '';

            var datePart = parts[0];
            var timeParts = parts[1].split(':');
            if (timeParts.length < 2) return '';

            var hour = (timeParts[0] || '00').padStart(2, '0');
            var minute = (timeParts[1] || '00').padStart(2, '0');
            return datePart + ' ' + hour + ':' + minute;
        }

        window.abValidateMinutes = function (input) {
            if (!input || !input.value) return;

            var normalized = abNormalizeDateTimeValue(input.value);
            if (!normalized) return;

            var parts = normalized.split(' ');
            var datePart = parts[0];
            var timeParts = parts[1].split(':');
            if (timeParts.length < 2) return;

            var h = timeParts[0];
            var m = parseInt(timeParts[1], 10);
            var allowed = [0, 2, 15, 17, 30, 32, 45, 47];

            if (allowed.indexOf(m) === -1) {
                var closestMinute = 0;
                for (var i = allowed.length - 1; i >= 0; i--) {
                    if (m >= allowed[i]) {
                        closestMinute = allowed[i];
                        break;
                    }
                }
                var formattedMinute = closestMinute < 10 ? '0' + closestMinute : closestMinute;
                input.value = datePart + ' ' + h + ':' + formattedMinute;
                toastr && toastr.warning('Minute không hợp lệ, hệ thống đã tự động điều chỉnh về ' + formattedMinute);
            } else {
                input.value = datePart + ' ' + h + ':' + (m < 10 ? '0' + m : m);
            }
        };

        window.abNormalizeDateTimePickerValue = function (input, currentValue) {
            return abNormalizeDateTimeValue(currentValue);
        };

        window.abHandleDateTimePickerApply = function (input) {
            abValidateMinutes(input);
            var $tr = $(input).closest('tr');
            if ($tr.length) abCalcLeaveLength($tr);
        };

        function abCalcLeaveLength($tr) {
            var personId = $tr.find('.ab-in-personid').val();
            var fromTime = $tr.find('.ab-in-from').val();
            var toTime = $tr.find('.ab-in-to').val();
            var leaveTypeCode = $tr.find('.ab-in-type').val();
            if (!personId || !fromTime || !toTime || !leaveTypeCode) return;

            $.ajax({
                url: '/ar/attendanceMintenance/api/leaveApply/calcLeaveLength',
                type: 'GET',
                data: { personId: personId, fromTime: fromTime, toTime: toTime, leaveTypeCode: leaveTypeCode },
                success: function (res) {
                    var length = (res && (res.LEAVE_LENGTH !== undefined ? res.LEAVE_LENGTH : res.leaveLength)) || '0';
                    var dayHours = (res && (res.DAY_HOURS !== undefined ? res.DAY_HOURS : res.dayHours)) || 0;
                    var rowData = _ab_table && _ab_table.row($tr).data();
                    if (rowData) { rowData.applyLength = length; rowData.dayHours = dayHours; }
                    $tr.find('td').eq(9).text(abFormatDuration(length, dayHours));
                },
                error: function (err) {
                    console.error('[abCalcLeaveLength] failed', err);
                }
            });
        }

        function abInitInputPlugins(container) {
            if (typeof initDateRangePickers === 'function') {
                initDateRangePickers(container);
            }
        }

        function abInitDate() {
            var now = new Date();
            var day = now.getDay() || 7;
            var monday = new Date(now);
            monday.setDate(now.getDate() - day + 1);
            var sunday = new Date(now);
            sunday.setDate(now.getDate() - day + 7);

            var formatDate = function (d) {
                var mm = d.getMonth() + 1;
                var dd = d.getDate();
                return [d.getFullYear(), (mm > 9 ? '' : '0') + mm, (dd > 9 ? '' : '0') + dd].join('-');
            };

            $('#ab_searchFromDate').val(formatDate(monday));
            $('#ab_searchToDate').val(formatDate(sunday));
        }

        function abBootPage() {
            if (_ab_pageBooted) {
                return;
            }

            if (!document.getElementById('ab_dataTable')) {
                setTimeout(abBootPage, 30);
                return;
            }

            _ab_pageBooted = true;

            abInitDate();

            $.ajax({
                url: '/sys/api/getCode/list?parentCodeNo=21',
                success: function (data) {
                    _ab_typeList = data || [];
                    abPopulateLeaveTypeFilter();
                    abInitTable();
                },
                error: function (xhr, status, err) {
                    if (typeof toastr !== 'undefined') {
                        toastr.error('Không tải được danh sách loại nghỉ!');
                    }
                    console.error('[abBootPage] load leave type failed:', status, err);
                    abInitTable();
                }
            });
        }

        $(document).on('change', '#ab_dataTable .ab-in-type', function () {
            var $tr = $(this).closest('tr');
            abCalcLeaveLength($tr);
            var rowData = _ab_table && _ab_table.row($tr).data();
            if (rowData && rowData.isNew) {
                var personId = $tr.find('.ab-in-personid').val() || '';
                if (personId) {
                    abFetchAndShowAffirmors($tr, rowData, personId, $(this).val());
                }
            }
        });

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', abBootPage);
        }
        if (typeof $ !== 'undefined') {
            $(document).ready(abBootPage);
        } else {
            abBootPage();
        }

        function abPopulateLeaveTypeFilter() {
            var $sel = $('#ab_searchLeaveTypeCode');
            if (!$sel.length) return;
            _ab_typeList.forEach(function (s) {
                var dName = s.codeName || s.description || s.codeNo;
                $sel.append('<option value="' + s.codeNo + '">' + dName + '</option>');
            });
        }

        function abInitTable() {
            var hasFixedColumns = !!($.fn.dataTable && $.fn.dataTable.FixedColumns);

            _ab_table = $('#ab_dataTable').DataTable({
                destroy: true,
                scrollX: true,
                autoWidth: false,
                scrollY: "calc(100vh - 280px)",
                scrollCollapse: true,
                paging: true,
                searching: false,
                lengthChange: true,
                pageLength: 25,
                processing: true,
                columnDefs: [
                    { targets: 0, width: '30px', orderable: false },
                    { targets: 1, width: '15px' },
                    { targets: 2, width: '180px' },
                    { targets: 3, width: '140px' },
                    { targets: 4, width: '40px' },
                    { targets: 5, width: '120px' },
                    { targets: 6, width: '200px' },
                    { targets: 7, width: '120px' },
                    { targets: 8, width: '120px' },
                    { targets: 9, width: '40px' },
                    { targets: 10, width: '220px' },
                    { targets: 11, width: '120px' },
                    { targets: 12, width: '100px' },
                    { targets: 13, width: '100px' },
                    { targets: 14, width: '160px' },
                    { targets: 15, width: '40px' }
                ],
                fixedColumns: hasFixedColumns ? { leftColumns: 2 } : false,
                initComplete: function () {
                    this.api().columns.adjust();
                    abInitInputPlugins('#ab_dataTable_wrapper');
                },
                drawCallback: function () {
                    abInitInputPlugins('#ab_dataTable_wrapper');
                },

                ajax: {
                    url: '/ar/attendanceMintenance/api/leaveApply/list',
                    dataSrc: function (json) {
                        var dbRows = (json || []).map(function (item) {
                            if (!item) return item;
                            if (!item.personId && item.personid) {
                                item.personId = item.personid;
                            }
                            return item;
                        });
                        return _ab_addedRows.concat(dbRows);
                    },
                    data: function (d) {
                        d.empId = $('#ab_searchEmpId').val();
                        d.localName = $('#ab_searchEmpName').val();
                        d.fromDate = $('#ab_searchFromDate').val();
                        d.toDate = $('#ab_searchToDate').val();
                        d.affirmFlag = $('#ab_searchAffirmFlag').val();
                        d.confirmFlag = $('#ab_searchConfirmFlag').val();
                        d.leaveTypeCode = $('#ab_searchLeaveTypeCode').val();
                    }
                },
                columns: [
                    {
                        data: null,
                        className: 'text-center align-middle',
                        render: function (data, type, row) {
                            if (row.isNew || row.affirmFlag !== '14014308') return '';
                            return '<input type="checkbox" class="ab-chk-cancel">';
                        }
                    },
                    {
                        data: null,
                        render: function (data, type, row, meta) { return meta.row + 1; }
                    },
                    {
                        data: 'empId',
                        render: function (data, type, row) {
                            if (row.isNew) {
                                return '<div class="input-group input-group-sm">'
                                    + '<input type="text" class="form-control ab-in-empname" placeholder="Chọn NV..." onkeydown="abEmpInputKeydown(event,this)">'
                                    + '<input type="hidden" class="ab-in-personid">'
                                    + '<button class="btn btn-outline-secondary" type="button" onclick="abPickEmp(this)"><i class="bx bx-search"></i></button>'
                                    + '</div>';
                            }
                            var personIdVal = String(row.personId || row.personid || '').replace(/"/g, '&quot;');
                            var applyNo = row.applyNo || '';
                            var applyType = String(row.leaveTypeCode || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
                            var rowLabel = (data || '') + ' - ' + (row.localName || '');
                            var clickText = applyNo
                                ? '<a href="javascript:void(0)" onclick="valOpenApplyDetail(\'' + applyNo + '\', \'' + applyType + '\')">' + rowLabel + '</a>'
                                : rowLabel;
                            return clickText
                                + '<input type="hidden" class="ab-in-personid" value="' + personIdVal + '">'
                                + '<input type="hidden" class="ab-in-empname" value="' + (row.empId || '') + ' - ' + (row.localName || '') + '">';
                        }
                    },
                    {
                        data: 'deptName',
                        render: function (data) { return data || ''; }
                    },
                    {
                        data: 'annualLeaveCount',
                        className: 'text-end align-middle',
                        render: function (data) { return data || '0'; }
                    },
                    {
                        data: 'shiftName',
                        className: 'align-middle',
                        render: function (data) { return data || ''; }
                    },
                    {
                        data: 'leaveTypeCode',
                        render: function (data, type, row) {
                            var opts = '<option value="">-- Loại nghỉ --</option>';
                            _ab_typeList.forEach(function (s) {
                                var selected = (s.codeNo === data) ? 'selected' : '';
                                var dName = s.codeName || s.description || s.codeNo;
                                opts += '<option value="' + s.codeNo + '" ' + selected + '>' + dName + '</option>';
                            });
                            return '<select class="form-select form-select-sm ab-in-type">' + opts + '</select>';
                        }
                    },
                    {
                        data: 'leaveFromTime',
                        render: function (data, type, row) {
                            var val = abNormalizeDateTimeValue(data || '');
                            return '<input type="text" class="form-control form-control-sm ab-in-from js-daterangepicker" '
                                + 'data-drp-format="YYYY-MM-DD HH:mm" data-drp-time="true" data-drp-24h="true" '
                                + 'data-drp-time-increment="1" data-drp-normalize="abNormalizeDateTimePickerValue" '
                                + 'data-drp-on-apply="abHandleDateTimePickerApply" '
                                + 'value="' + val + '" placeholder="YYYY-MM-DD HH:mm">';
                        }
                    },
                    {
                        data: 'leaveToTime',
                        render: function (data, type, row) {
                            var val = abNormalizeDateTimeValue(data || '');
                            return '<input type="text" class="form-control form-control-sm ab-in-to js-daterangepicker" '
                                + 'data-drp-format="YYYY-MM-DD HH:mm" data-drp-time="true" data-drp-24h="true" '
                                + 'data-drp-time-increment="1" data-drp-normalize="abNormalizeDateTimePickerValue" '
                                + 'data-drp-on-apply="abHandleDateTimePickerApply" '
                                + 'value="' + val + '" placeholder="YYYY-MM-DD HH:mm">';
                        }
                    },
                    {
                        data: 'applyLength',
                        className: 'text-end align-middle',
                        render: function (data, type, row) { return abFormatDuration(data, row.dayHours); }
                    },
                    {
                        data: 'leaveReason',
                        render: function (data, type, row) {
                            var val = data ? data.replace(/"/g, '&quot;') : '';
                            return '<input type="text" class="form-control form-control-sm ab-in-reason" value="' + val + '">';
                        }
                    },
                    {
                        data: 'affirmFlag',
                        render: function (data) {
                            if (!data || data === '0') return 'Chưa lưu';
                            if (data === '14014306') return '<span class="badge bg-warning text-dark">Gửi</span>';
                            if (data === '14014307') return '<span class="badge bg-info">Đang duyệt</span>';
                            if (data === '14014308') return '<span class="badge bg-success">Đã duyệt</span>';
                            if (data === '14014309') return '<span class="badge bg-danger">Từ chối</span>';
                            if (data === '14014310') return '<span class="badge bg-secondary">Đã hủy</span>';
                            return data;
                        }
                    },
                    {
                        data: 'createdBy',
                        render: function (data, type, row) {
                            if (row.isNew) return '';
                            var name = data || '';
                            var date = row.createDate || '';
                            return name + '<br><small class="text-muted">' + date + '</small>';
                        }
                    },
                    {
                        data: 'updatedBy',
                        render: function (data, type, row) {
                            if (row.isNew) return '';
                            var name = data || '';
                            var date = row.updateDate || '';
                            return name + '<br><small class="text-muted">' + date + '</small>';
                        }
                    },
                    {
                        data: 'affirmStr',
                        render: function (data) { return data || ''; }
                    },
                    {
                        data: null,
                        className: "text-center",
                        render: function (data, type, row) {
                            if (row.isNew) {
                                return '<button class="btn btn-sm btn-danger" onclick="abRemoveNewRow(this)" title="Loại bỏ dòng này">'
                                    + '<i class="bx bx-minus"></i>'
                                    + '</button>';
                            }
                            if (row.affirmFlag === '14014308') {
                                var applyNo = String(row.applyNo || '').replace(/'/g, "\\'");
                                var personId = String(row.personId || row.personid || '').replace(/'/g, "\\'");
                                return '<button class="btn btn-sm btn-primary" onclick="abResubmitLine(this,\'' + applyNo + '\',\'' + personId + '\')" title="Lưu lại đơn">'
                                    + '<i class="bx bx-save"></i>'
                                    + '</button>';
                            }
                            return '';
                        }
                    }
                ]
            });
        }

        window.abSearchData = function () {
            _ab_addedRows = [];
            if (_ab_table) _ab_table.ajax.reload();
        };

        window.abClearSearch = function () {
            $('#ab_searchForm')[0].reset();
            abInitDate();
            _ab_addedRows = [];
            if (_ab_table) _ab_table.ajax.reload();
        };

        window.abAddEmptyRow = function () {
            var newRow = {
                isNew: true,
                applyNo: '',
                empId: '',
                personId: '',
                deptName: '',
                annualLeaveCount: '0',
                shiftName: '',
                leaveTypeCode: '',
                leaveFromTime: '',
                leaveToTime: '',
                applyLength: '0',
                leaveReason: '',
                affirmFlag: '',
                affirmStr: '',
                createdBy: '',
                updatedBy: ''
            };
            _ab_addedRows.unshift(newRow);
            if (_ab_table) {
                var currentData = _ab_table.data().toArray();
                _ab_table.clear().rows.add([newRow].concat(currentData)).draw();
            }
        };

        window.abDownloadTemplate = function () {
            window.location.href = '/sy/excel/api/downloadTemplate?templateName=AttendanceApply_add_Template';
        };

        window.abOpenImportModal = function () {
            ExcelImport.open('/sy/excel/api/importTemplate?templateName=AttendanceApply_add_Template', function (res) {
                if (_ab_table) {
                    _ab_table.ajax.reload(null, false);
                }
                if (typeof tabSystem !== 'undefined' && tabSystem && typeof tabSystem.openTab === 'function') {
                    tabSystem.openTab('/ar/attendanceMintenance/viewImportAttendanceTempList', 'Kết quả nhập');
                } else {
                    window.open('/ar/attendanceMintenance/viewImportAttendanceTempList', '_blank');
                }
            });
        };

        window.abPickEmp = function (btn, keyword) {
            if (typeof EmployeeSearchModal !== 'undefined') {
                EmployeeSearchModal.open(function (emp) {
                    var $tr = $(btn).closest('tr');
                    $tr.find('.ab-in-personid').val(emp.personId);
                    $tr.find('.ab-in-empname').val(emp.empId + ' - ' + emp.localName);
                    var rowData = _ab_table.row($tr).data();
                    rowData.personId = emp.personId;

                    $.ajax({
                        url: '/ar/attendanceMintenance/api/leaveApply/empDefaultInfo',
                        type: 'GET',
                        data: { personId: emp.personId },
                        success: function (res) {
                            if (!res) return;
                            rowData.deptName = res.DEPT_NAME || res.deptName || '';
                            $tr.find('td').eq(3).text(rowData.deptName);
                            rowData.annualLeaveCount = res.VAC_COUNT || res.vacCount || '0';
                            $tr.find('td').eq(4).text(rowData.annualLeaveCount);
                            rowData.shiftName = res.SHIFT_NAME || res.shiftName || '';

        function abFormatDuration(applyLength, dayHours) {
            var len = parseFloat(applyLength);
            var dh  = parseFloat(dayHours);
            if (isNaN(len) || isNaN(dh) || dh === 0) return String(applyLength || '');
            var days  = Math.floor(len / dh);
            var hours = len - days * dh;
            var text  = '';
            if (days > 0)  text += days  + ' Ngày';
            if (hours > 0) text += (text ? ' ' : '') + hours + ' Giờ';
            return text || String(len);
        }
