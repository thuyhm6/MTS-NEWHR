<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <form id="ck_searchForm" class="row g-3 mb-4">
                        <div class="col-md-3">
                            <label for="ck_keyword" class="form-label" th:text="#{ck.label.keyword}">Mã nhân viên / Họ tên</label>
                            <input type="text" class="form-control" id="ck_keyword"
                                th:placeholder="#{ck.placeholder.keyword}" placeholder="Nhập mã hoặc họ tên">
                        </div>
                        <div class="col-md-3">
                            <label for="ck_deptNo" class="form-label" th:text="#{ck.label.deptNo}">Phòng ban</label>
                            <input type="text" class="form-control" id="ck_deptNo"
                                th:placeholder="#{ck.placeholder.deptNo}" placeholder="Chọn phòng ban"
                                readonly>
                        </div>
                        <div class="col-md-2">
                            <label for="ck_fromDate" class="form-label" th:text="#{ck.label.fromDate}">Ngày bắt đầu</label>
                            <input type="text" class="form-control js-daterangepicker" id="ck_fromDate"
                                data-drp-format="DD/MM/YYYY" autocomplete="off">
                        </div>
                        <div class="col-md-2">
                            <label for="ck_toDate" class="form-label" th:text="#{ck.label.toDate}">Ngày kết thúc</label>
                            <input type="text" class="form-control js-daterangepicker" id="ck_toDate"
                                data-drp-format="DD/MM/YYYY" autocomplete="off">
                        </div>
                        <div class="col-md-2">
                            <label for="ck_postFamily" class="form-label" th:text="#{ck.label.postFamily}">Nhóm nhân viên</label>
                            <select class="form-select" id="ck_postFamily" data-parent-code="14015812"
                                th:attr="data-default-text=#{ck.select.allOption}"
                                data-default-text="-- Tất cả --"></select>
                        </div>
                        <div class="col-md-3">
                            <label for="ck_shiftNo" class="form-label" th:text="#{ck.label.shiftNo}">Ca làm việc</label>
                            <select class="form-select" id="ck_shiftNo">
                                <option value="" th:text="#{ck.select.allOption}">-- Tất cả --</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label for="ck_itemNo" class="form-label" th:text="#{ck.label.itemNo}">Loại nghỉ phép</label>
                            <select class="form-select" id="ck_itemNo">
                                <option value="" th:text="#{ck.select.choose}">Lựa chọn</option>
                                <option value="141443" th:text="#{ck.itemNo.unauthorized}">Nghỉ không phép</option>
                                <option value="141442" th:text="#{ck.itemNo.leaveEarly}">Về sớm</option>
                                <option value="141441" th:text="#{ck.itemNo.lateComing}">Đến muộn</option>
                                <option value="14015448" th:text="#{ck.itemNo.forgotSwipe}">Quên quẹt thẻ</option>
                            </select>
                        </div>
                        <div class="col-md-6 d-flex align-items-end gap-2 flex-wrap">
                            <button type="button" class="btn btn-primary" onclick="ckSearchData()">
                                <i class="bx bx-search"></i>
                                <span th:text="#{ck.btn.search}">Tra cứu</span>
                            </button>
                            <button type="button" class="btn btn-secondary" onclick="ckClearSearch()">
                                <i class="bx bx-x"></i>
                                <span th:text="#{ck.btn.clearFilter}">Xóa lọc</span>
                            </button>
                            <button type="button" class="btn btn-success" onclick="ckExportExcel()">
                                <i class="bx bx-export"></i>
                                <span th:text="#{ck.btn.exportExcel}">Xuất excel</span>
                            </button>
                        </div>
                    </form>

                    <div class="table-responsive">
                        <table id="ck_dataTable" class="table table-striped table-bordered table-hover"
                            style="width: 100%;">
                            <thead class="table-light text-center align-middle">
                                <tr>
                                    <th th:text="#{ck.col.no}">No.</th>
                                    <th th:text="#{ck.col.empId}">Mã nhân viên</th>
                                    <th th:text="#{ck.col.localName}">Họ tên</th>
                                    <th th:text="#{ck.col.deptName}">Phòng ban</th>
                                    <th th:text="#{ck.col.postGradeName}">Chức vụ</th>
                                    <th th:text="#{ck.col.postFamilyName}">Nhóm nhân viên</th>
                                    <th th:text="#{ck.col.shiftName}">Ca làm việc</th>
                                    <th th:text="#{ck.col.itemNoName}">Loại nghỉ phép</th>
                                    <th th:text="#{ck.col.arDate}">Ngày công</th>
                                    <th th:text="#{ck.col.fromDateTime}">Từ thời gian</th>
                                    <th th:text="#{ck.col.toDateTime}">Đến thời gian</th>
                                    <th th:text="#{ck.col.remark}">Lý do</th>
                                    <th th:text="#{ck.col.createdName}">Người tạo</th>
                                    <th th:text="#{ck.col.createDate}">Ngày tạo</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{ess/infoApply/viewAttendanceEx :: attendanceExModal}"></th:block>

<template id="fragmentScripts">
    <th:block th:replace="~{ess/infoApply/viewAttendanceEx :: attendanceExScript}"></th:block>
    <script th:inline="javascript">
        var _ck_table = null;
        var _ck_pageBooted = false;
        var _ck_selectedDeptCodes = [];

        /* i18n */
        var _ck_i18n = {
            allOption : /*[[#{ck.js.allOption}]]*/ '-- Tất cả --'
        };

        function ckFormatDate(dateObj) {
            var d = String(dateObj.getDate()).padStart(2, '0');
            var m = String(dateObj.getMonth() + 1).padStart(2, '0');
            var y = dateObj.getFullYear();
            return d + '/' + m + '/' + y;
        }

        function ckInitDefaultDateRange() {
            var today = new Date();
            var firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
            var lastDay = new Date(today.getFullYear(), today.getMonth() + 1, 0);
            var fromValue = ckFormatDate(firstDay);
            var toValue = ckFormatDate(lastDay);
            $('#ck_fromDate').val(fromValue);
            $('#ck_toDate').val(toValue);

            if ($('#ck_fromDate').data('daterangepicker')) {
                $('#ck_fromDate').data('daterangepicker').setStartDate(fromValue);
            }
            if ($('#ck_toDate').data('daterangepicker')) {
                $('#ck_toDate').data('daterangepicker').setStartDate(toValue);
            }
        }

        function ckInitDeptSelector() {
            if (typeof DeptTree === 'undefined') {
                return;
            }
            DeptTree.init('#ck_deptNo', function (selectedCodes) {
                _ck_selectedDeptCodes = selectedCodes || [];
            });
        }

        function ckLoadShiftOptions() {
            return $.ajax({
                url: '/ar/attendanceSettings/api/shift',
                type: 'GET',
                success: function (data) {
                    var html = '<option value="">' + _ck_i18n.allOption + '</option>';
                    (data || []).forEach(function (item) {
                        var code = item.shiftNo || '';
                        var name = item.nameVi || item.shiftName || code;
                        html += '<option value="' + code + '">' + name + '</option>';
                    });
                    $('#ck_shiftNo').html(html);
                }
            });
        }

        function ckInitTable() {
            _ck_table = $('#ck_dataTable').DataTable({
                destroy: true,
                scrollX: true,
                scrollY: "calc(100vh - 330px)",
                scrollCollapse: true,
                paging: true,
                searching: false,
                lengthChange: true,
                pageLength: 25,
                processing: true,
                autoWidth: false,
                dom: 'Blfrtip',
                buttons: [
                    {
                        extend: 'excel',
                        title: 'check_attendance_ex_for_batch_export'
                    }
                ],
                ajax: {
                    url: '/ess/infoApplyAttendance/api/checkAttendanceEx/list',
                    dataSrc: '',
                    data: function (d) {
                        d.keyword = $('#ck_keyword').val();
                        d.deptNos = (_ck_selectedDeptCodes || []).join(',');
                        d.fromDate = $('#ck_fromDate').val();
                        d.toDate = $('#ck_toDate').val();
                        d.postFamily = $('#ck_postFamily').val();
                        d.shiftNo = $('#ck_shiftNo').val();
                        d.itemNo = $('#ck_itemNo').val();
                    }
                },
                initComplete: function () {
                    $('#ck_dataTable_wrapper').find('.dt-buttons').hide();
                },
                columns: [
                    {
                        data: null,
                        width: '25px',
                        className: 'text-center',
                        render: function (data, type, row, meta) {
                            return meta.settings._iDisplayStart + meta.row + 1;
                        }
                    },
                    { data: 'empId', className: 'text-center' },
                    {
                        data: 'localName',
                        render: function (data, type, row) {
                            var name = data || '';
                            var applyNo = row.applyNo || '';
                            var applyType = String(row.itemNo || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
                            if (!applyNo) {
                                return name;
                            }
                            return '<a href="javascript:void(0)" onclick="atexOpenApplyDetail(\'' + applyNo + '\', \'' + applyType + '\')">' + ckEscHtml(name) + '</a>';
                        }
                    },
                    { data: 'deptName' },
                    { data: 'postGradeName' },
                    { data: 'postFamilyName' },
                    { data: 'shiftName', className: 'text-center' },
                    { data: 'itemNoName' },
                    { data: 'arDateStr', className: 'text-center' },
                    { data: 'fromDateTime', className: 'text-center' },
                    { data: 'toDateTime', className: 'text-center' },
                    { data: 'remark', render: function (data) { return data || ''; } },
                    { data: 'createdName', render: function (data) { return data || ''; } },
                    { data: 'createDate', className: 'text-center' }
                ]
            });
        }

        function ckBootPage() {
            if (_ck_pageBooted) {
                return;
            }
            if (!document.getElementById('ck_dataTable')) {
                setTimeout(ckBootPage, 30);
                return;
            }
            _ck_pageBooted = true;
            ckInitDefaultDateRange();
            ckInitDeptSelector();
            $.when(ckLoadShiftOptions()).always(function () {
                ckInitTable();
                if (_ck_table) {
                    _ck_table.ajax.reload();
                }
            });
        }

        window.ckSearchData = function () {
            if (_ck_table) {
                _ck_table.ajax.reload();
            }
        };

        window.ckClearSearch = function () {
            $('#ck_keyword').val('');
            $('#ck_postFamily').val('');
            $('#ck_shiftNo').val('');
            $('#ck_itemNo').val('');
            $('#ck_deptNo').val('');
            _ck_selectedDeptCodes = [];
            $('.auth-dept-chk-global').prop('checked', false).trigger('change');
            ckInitDefaultDateRange();
            if (_ck_table) {
                _ck_table.ajax.reload();
            }
        };

        window.ckExportExcel = function () {
            if (_ck_table) {
                _ck_table.button('.buttons-excel').trigger();
            }
        };

        function ckEscHtml(value) {
            if (value === null || value === undefined) return '';
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', ckBootPage);
        }
        if (typeof $ !== 'undefined') {
            $(document).ready(ckBootPage);
        } else {
            ckBootPage();
        }
    </script>
</template>
