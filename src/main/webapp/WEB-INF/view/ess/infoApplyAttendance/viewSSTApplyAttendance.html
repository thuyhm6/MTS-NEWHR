<div th:fragment="content">
    <div class="row">
        <div class="col-12" id="sa_pageWrapper">

            <!-- Thông tin nhân viên -->
            <div th:replace="~{fragments/essEmpInfoCard :: card}"></div>

            <!-- Form xin nghỉ phép -->
            <div class="card mb-3">
                <div class="card-body p-0">
                    <table class="table table-bordered table-sm align-middle mb-0" style="table-layout:fixed;">
                        <colgroup>
                            <col style="width:15%;">
                            <col style="width:85%;">
                        </colgroup>
                        <tbody>
                            <tr>
                                <th class="table-light text-center" th:text="#{sa.label.leaveType}">Loại nghỉ phép</th>
                                <td>
                                    <div class="d-flex align-items-center flex-wrap gap-2">
                                        <select class="form-select form-select-sm" id="sa_leaveType"
                                            style="max-width:220px;"
                                            data-parent-code="21"
                                            th:attr="data-default-text=#{sa.placeholder.leaveType}">
                                        </select>
                                        <span id="sa_vacInfo" class="text-muted small"></span>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <th class="table-light text-center" th:text="#{sa.label.startTime}">Thời gian bắt đầu</th>
                                <td>
                                    <input type="datetime-local" class="form-control form-control-sm"
                                        id="sa_fromTime" style="width:200px;" onchange="saCalcDuration()">
                                </td>
                            </tr>
                            <tr>
                                <th class="table-light text-center" th:text="#{sa.label.endTime}">Thời gian kết thúc</th>
                                <td>
                                    <input type="datetime-local" class="form-control form-control-sm"
                                        id="sa_toTime" style="width:200px;" onchange="saCalcDuration()">
                                </td>
                            </tr>
                            <tr>
                                <th class="table-light text-center" th:text="#{sa.label.duration}">Thời lượng</th>
                                <td><span id="sa_duration">-</span></td>
                            </tr>
                            <tr>
                                <th class="table-light text-center" th:text="#{sa.label.reason}">Lý do</th>
                                <td>
                                    <textarea class="form-control form-control-sm" id="sa_reason"
                                        rows="4" style="resize:vertical;"></textarea>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Đính kèm file
            <div class="mb-3">
                <div class="mb-2">
                    <button type="button" class="btn btn-sm btn-secondary me-1" onclick="saInsertFile()"
                        th:text="#{sa.btn.insertFile}">Chèn file</button>
                    <button type="button" class="btn btn-sm btn-secondary" onclick="saDeleteSelectedFiles()"
                        th:text="#{sa.btn.delete}">Xóa</button>
                    <input type="file" id="sa_fileInput" style="display:none;" multiple onchange="saOnFileSelected(this)">
                </div>
                <div class="table-responsive">
                    <table class="table table-bordered table-sm mb-0">
                        <thead class="table-light text-center">
                            <tr>
                                <th style="width:40px;">V</th>
                                <th th:text="#{sa.col.file}">File</th>
                            </tr>
                        </thead>
                        <tbody id="sa_fileListBody">
                            <tr id="sa_fileListEmpty">
                                <td colspan="2" class="text-center text-muted" th:text="#{sa.msg.noFile}">Chưa có file đính kèm</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div> -->

            <!-- Danh sách người phê duyệt -->
            <div class="table-responsive mb-3">
                <table class="table table-bordered table-sm align-middle mb-0">
                    <thead class="table-light text-center">
                        <tr>
                            <th style="width:50px;" th:text="#{sa.col.stt}">STT</th>
                            <th th:text="#{sa.col.approver}">Người duyệt</th>
                            <th style="width:130px;" th:text="#{sa.col.empId}">Mã nhân viên</th>
                            <th th:text="#{sa.col.dept}">Phòng ban</th>
                            <th th:text="#{sa.col.position}">Chức danh</th>
                        </tr>
                    </thead>
                    <tbody id="sa_approvalBody">
                        <tr>
                            <td colspan="5" class="text-center text-muted" th:text="#{sa.msg.selectLeaveTypeFirst}">Chọn loại nghỉ phép để xem người phê duyệt</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Nút xin phép -->
            <div class="text-end mb-3">
                <button type="button" class="btn btn-primary" id="sa_submitBtn" onclick="saSubmit()"
                    th:text="#{sa.btn.submit}">Xin phép</button>
            </div>

        </div>
    </div>
</div>

<template id="fragmentScripts">
    <th:block th:replace="~{fragments/essEmpInfoCard :: script}"></th:block>
    <script th:inline="javascript">
        var _sa_personId = '';
        var _sa_localName = '';
        var _sa_fileList = [];
        var _sa_pageBooted = false;

        var _sa_i18n = {
            calculating          : /*[[#{sa.msg.calculating}]]*/ 'Đang tính...',
            loading              : /*[[#{sa.msg.loading}]]*/ 'Đang tải...',
            noApprovalData       : /*[[#{sa.msg.noApprovalData}]]*/ 'Không có dữ liệu phê duyệt',
            noApprover           : /*[[#{sa.msg.noApprover}]]*/ 'Không có người phê duyệt',
            loadApproverFailed   : /*[[#{sa.msg.loadApproverFailed}]]*/ 'Lỗi tải người phê duyệt',
            noFile               : /*[[#{sa.msg.noFile}]]*/ 'Chưa có file đính kèm',
            selectFileToDelete   : /*[[#{sa.msg.selectFileToDelete}]]*/ 'Vui lòng chọn file cần xóa',
            selectLeaveType      : /*[[#{sa.msg.selectLeaveType}]]*/ 'Vui lòng chọn loại nghỉ phép!',
            enterStartTime       : /*[[#{sa.msg.enterStartTime}]]*/ 'Vui lòng nhập thời gian bắt đầu!',
            enterEndTime         : /*[[#{sa.msg.enterEndTime}]]*/ 'Vui lòng nhập thời gian kết thúc!',
            sending              : /*[[#{sa.msg.sending}]]*/ 'Đang gửi...',
            submitSuccess        : /*[[#{sa.msg.submitSuccess}]]*/ 'Xin phép thành công!',
            submitError          : /*[[#{sa.msg.submitError}]]*/ 'Lỗi khi gửi đơn!',
            submitConnError      : /*[[#{sa.msg.submitConnError}]]*/ 'Lỗi kết nối khi gửi đơn!',
            enterReason          : /*[[#{sa.msg.enterReason}]]*/ 'Vui lòng nhập lý do!',
            confirmSubmit        : /*[[#{sa.msg.confirmSubmit}]]*/ 'Bạn có chắc chắn muốn gửi đơn xin phép này không?',
            selectLeaveTypeFirst : /*[[#{sa.msg.selectLeaveTypeFirst}]]*/ 'Chọn loại nghỉ phép để xem người phê duyệt',
            vacTotalYear         : /*[[#{sa.vac.totalYear}]]*/ 'Tổng phép năm:',
            vacYearVac           : /*[[#{sa.vac.yearVac}]]*/ 'Tạo phép năm:',
            vacLastYear          : /*[[#{sa.vac.lastYear}]]*/ 'Còn lại năm ngoái:',
            vacSpecial           : /*[[#{sa.vac.special}]]*/ 'Đặc biệt:',
            vacUsed              : /*[[#{sa.vac.used}]]*/ 'Số ngày đã sử dụng:',
            vacRemain            : /*[[#{sa.vac.remain}]]*/ 'Số ngày còn lại:',
            unitDays             : /*[[#{sa.unit.days}]]*/ 'Ngày',
            unitHours            : /*[[#{sa.unit.hours}]]*/ 'Giờ',
            btnSubmit            : /*[[#{sa.btn.submit}]]*/ 'Xin phép'
        };

        function saEscHtml(v) {
            if (v == null || v === undefined) return '';
            return String(v)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function saFormatVacInfo(d) {
            if (!d) return '';
            var f = function(v) { return (v != null && v !== '') ? v : '0'; };
            return _sa_i18n.vacTotalYear + ' ' + f(d.TOT_VAC_CNT) + '/  ' +
                   _sa_i18n.vacYearVac  + ' ' + f(d.YEAR_VAC_CNT) + '/  ' +
                   _sa_i18n.vacLastYear + ' ' + f(d.LAST_YEAR_VAC) + '/  ' +
                   _sa_i18n.vacSpecial  + ' ' + f(d.ADD_VAC)       + '/  ' +
                   _sa_i18n.vacUsed     + ' ' + f(d.USE_VAC)       + '/  ' +
                   _sa_i18n.vacRemain   + ' ' + f(d.REMAIN_VAC);
        }

        function saSetDateTimeVal($input, value) {
            $input.val(value);
            var picker = $input.data('daterangepicker');
            if (picker && window.moment) {
                var m = window.moment(value, 'YYYY-MM-DD HH:mm', true);
                if (m.isValid()) {
                    picker.setStartDate(m);
                    picker.setEndDate(m);
                }
            }
        }

        var _sa_calcTimer = null;

        window.saCalcDuration = function() {
            clearTimeout(_sa_calcTimer);
            _sa_calcTimer = setTimeout(function() {
                var leaveTypeCode = $('#sa_leaveType').val();
                var fromDt = ($('#sa_fromTime').val() || '');
                var toDt   = ($('#sa_toTime').val()   || '');

                if (!fromDt || !toDt || !leaveTypeCode) {
                    $('#sa_duration').text('-');
                    return;
                }

                $('#sa_duration').text(_sa_i18n.calculating);
                $.ajax({
                    url: '/ess/infoApplyAttendance/api/leaveLength',
                    type: 'GET',
                    data: { fromDateTime: fromDt, toDateTime: toDt, leaveTypeCode: leaveTypeCode },
                    success: function(res) {
                        var leaveLen = parseFloat(res && res.LEAVE_LENGTH);
                        var dayHour  = parseFloat(res && res.DAY_HOUR);
                        if (isNaN(leaveLen) || isNaN(dayHour) || dayHour === 0) {
                            $('#sa_duration').text('-');
                            return;
                        }
                        var days  = Math.floor(leaveLen / dayHour);
                        var hours = leaveLen - days * dayHour;
                        var text  = '';
                        if (days > 0)  text += days  + ' ' + _sa_i18n.unitDays;
                        if (hours > 0) text += (text ? ' ' : '') + hours + ' ' + _sa_i18n.unitHours;
                        $('#sa_duration').text(text || '0');
                    },
                    error: function() { $('#sa_duration').text('-'); }
                });
            }, 300);
        };

        function saLoadVacationInfo() {
            $.ajax({
                url: '/ess/infoApplyAttendance/api/vacationInfo',
                type: 'GET',
                success: function(data) {
                    var info = saFormatVacInfo(data);
                    $('#sa_vacInfo').text(info || '');
                }
            });
        }

        function saLoadApprovers() {
            if (!_sa_personId) return;
            var leaveTypeCode = $('#sa_leaveType').val() || '';
            var $tbody = $('#sa_approvalBody');
            $tbody.html('<tr><td colspan="5" class="text-center text-muted">' + saEscHtml(_sa_i18n.loading) + '</td></tr>');

            $.post('/ar/attendanceMintenance/api/leaveApply/approvers', {
                applyTypeNo: '21',
                personId: _sa_personId,
                applyTypeCode: leaveTypeCode,
                applyLength: '0'
            }, function(data) {
                if (!data || !data.length) {
                    $tbody.html('<tr><td colspan="5" class="text-center text-muted">' + saEscHtml(_sa_i18n.noApprovalData) + '</td></tr>');
                    return;
                }
                var html = '';
                var counter = 0;
                data.forEach(function(item) {
                    var level = item.affirmLevel;
                    if (String(level) === '0') return;
                    counter++;
                    html += '<tr>'
                        + '<td class="text-center">' + saEscHtml(level || counter) + '</td>'
                        + '<td>' + saEscHtml(item.localName || '') + '</td>'
                        + '<td class="text-center">' + saEscHtml(item.empId || '') + '</td>'
                        + '<td>' + saEscHtml(item.deptName || '') + '</td>'
                        + '<td>' + saEscHtml(item.postionName || item.positionName || '') + '</td>'
                        + '</tr>';
                });
                $tbody.html(html || '<tr><td colspan="5" class="text-center text-muted">' + saEscHtml(_sa_i18n.noApprover) + '</td></tr>');
            }).fail(function() {
                $tbody.html('<tr><td colspan="5" class="text-center text-danger">' + saEscHtml(_sa_i18n.loadApproverFailed) + '</td></tr>');
            });
        }

        window.saOnLeaveTypeChange = function() {
            saLoadVacationInfo();
            saLoadApprovers();
            saCalcDuration();
        };

        window.saInsertFile = function() {
            document.getElementById('sa_fileInput').click();
        };

        window.saOnFileSelected = function(input) {
            Array.from(input.files || []).forEach(function(f) {
                _sa_fileList.push(f);
            });
            saRenderFileList();
            input.value = '';
        };

        function saRenderFileList() {
            var $body = $('#sa_fileListBody');
            if (!_sa_fileList.length) {
                $body.html('<tr id="sa_fileListEmpty"><td colspan="2" class="text-center text-muted">' + saEscHtml(_sa_i18n.noFile) + '</td></tr>');
                return;
            }
            var html = '';
            _sa_fileList.forEach(function(f, i) {
                html += '<tr>'
                    + '<td class="text-center"><input type="checkbox" class="form-check-input sa-file-check" data-idx="' + i + '"></td>'
                    + '<td>' + saEscHtml(f.name) + '</td>'
                    + '</tr>';
            });
            $body.html(html);
        }

        window.saDeleteSelectedFiles = function() {
            var toRemove = [];
            $('.sa-file-check:checked').each(function() {
                toRemove.push(parseInt($(this).attr('data-idx'), 10));
            });
            if (!toRemove.length) {
                toastr && toastr.warning(_sa_i18n.selectFileToDelete);
                return;
            }
            _sa_fileList = _sa_fileList.filter(function(_, i) { return toRemove.indexOf(i) === -1; });
            saRenderFileList();
        };

        window.saSubmit = function() {
            var leaveTypeCode = $('#sa_leaveType').val();
            if (!leaveTypeCode) { toastr && toastr.warning(_sa_i18n.selectLeaveType); return; }

            var fromTime = ($('#sa_fromTime').val() || '');
            var toTime   = ($('#sa_toTime').val()   || '');
            if (!fromTime) { toastr && toastr.warning(_sa_i18n.enterStartTime); return; }
            if (!toTime)   { toastr && toastr.warning(_sa_i18n.enterEndTime);   return; }

            var reason = $.trim($('#sa_reason').val());
            if (!reason) { toastr && toastr.warning(_sa_i18n.enterReason); $('#sa_reason').focus(); return; }

            if (!confirm(_sa_i18n.confirmSubmit)) return;

            var payload = {
                applyNo:       '',
                personId:      _sa_personId,
                localName:     _sa_localName,
                leaveTypeCode: leaveTypeCode,
                leaveFromTime: fromTime,
                leaveToTime:   toTime,
                applyLength:   null,
                leaveReason:   $('#sa_reason').val()
            };

            var $btn = $('#sa_submitBtn');
            var oHtml = $btn.html();
            $btn.html('<i class="bx bx-loader bx-spin"></i> ' + saEscHtml(_sa_i18n.sending)).prop('disabled', true);

            $.ajax({
                url: '/ar/attendanceMintenance/api/leaveApply/save',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(payload),
                success: function(res) {
                    $btn.html(oHtml).prop('disabled', false);
                    if (res && res.success) {
                        toastr && toastr.success(res.message || _sa_i18n.submitSuccess);
                        saResetForm();
                    } else {
                        toastr && toastr.error(res.error || _sa_i18n.submitError);
                    }
                },
                error: function() {
                    $btn.html(oHtml).prop('disabled', false);
                    toastr && toastr.error(_sa_i18n.submitConnError);
                }
            });
        };

        function saResetForm() {
            $('#sa_leaveType').val('');
            $('#sa_vacInfo').text('');
            var now = new Date();
            var ryyyy = now.getFullYear();
            var rmm = String(now.getMonth() + 1).padStart(2, '0');
            var rdd = String(now.getDate()).padStart(2, '0');
            saSetDateTimeVal($('#sa_fromTime'), ryyyy + '-' + rmm + '-' + rdd + ' 08:00');
            saSetDateTimeVal($('#sa_toTime'),   ryyyy + '-' + rmm + '-' + rdd + ' 17:00');
            $('#sa_reason').val('');
            _sa_fileList = [];
            saRenderFileList();
            saCalcDuration();
            $('#sa_approvalBody').html('<tr><td colspan="5" class="text-center text-muted">' + saEscHtml(_sa_i18n.selectLeaveTypeFirst) + '</td></tr>');
        }

        function saBootPage() {
            if (_sa_pageBooted) return;
            if (!document.getElementById('sa_leaveType')) {
                setTimeout(saBootPage, 30);
                return;
            }
            _sa_pageBooted = true;

            loadEssEmpInfoCard();

            var now = new Date();
            var byyyy = now.getFullYear();
            var bmm = String(now.getMonth() + 1).padStart(2, '0');
            var bdd = String(now.getDate()).padStart(2, '0');
            saSetDateTimeVal($('#sa_fromTime'), byyyy + '-' + bmm + '-' + bdd + ' 08:00');
            saSetDateTimeVal($('#sa_toTime'),   byyyy + '-' + bmm + '-' + bdd + ' 17:00');
            saCalcDuration();

            $.ajax({
                url: '/ess/empinfo/api/personalInfo/myInfo',
                type: 'GET',
                success: function(data) {
                    if (!data) return;
                    _sa_personId = data.personId || '';
                    _sa_localName = data.localName || '';

                    var onReady = function() {
                        $('#sa_leaveType').on('change', window.saOnLeaveTypeChange);
                        saLoadVacationInfo();
                        saLoadApprovers();
                    };

                    if (typeof initCodeSelects === 'function') {
                        $.when(initCodeSelects('#sa_pageWrapper')).always(onReady);
                    } else {
                        onReady();
                    }
                }
            });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', saBootPage);
        }
        if (typeof $ !== 'undefined') {
            $(document).ready(saBootPage);
        } else {
            saBootPage();
        }
    </script>
</template>
