<div th:fragment="content">

    <!-- ── Thanh điều kiện tìm kiếm ────────────────────────────────────────── -->
    <div class="card mb-2 no-print">
        <div class="card-body py-2 px-3">
            <div class="row g-2 align-items-end">

                <div class="col-md-3">
                    <label class="form-label mb-1 small fw-semibold" th:text="#{pa.payStub.paySchedule}">Kế hoạch trả lương</label>
                    <select id="vps_payScheduleNo" class="form-select form-select-sm select2"></select>
                </div>

                <div class="col-md-2">
                    <label class="form-label mb-1 small fw-semibold" th:text="#{pa.payStub.dept}">Phòng ban</label>
                    <div class="position-relative">
                        <input type="text" id="vps_deptSearch" class="form-control form-control-sm" readonly
                               th:placeholder="#{pa.payStub.deptPlaceholder}">
                    </div>
                </div>

                <div class="col-md-2">
                    <label class="form-label mb-1 small fw-semibold" th:text="#{pa.payStub.empSearch}">Họ tên / Mã NV</label>
                    <div class="input-group input-group-sm">
                        <input type="text" id="vps_empSearch" class="form-control form-control-sm"
                               th:placeholder="#{pa.payStub.empSearchPlaceholder}">
                    </div>
                </div>

                <div class="col-md-2">
                    <label class="form-label mb-1 small fw-semibold" th:text="#{pa.payStub.empOffice}">Trạng thái làm việc</label>
                    <select id="vps_empOffice" class="form-select form-select-sm"
                            data-parent-code="15118" data-default-text="All">
                    </select>
                </div>

                <div class="col-md-3 d-flex gap-1 align-items-end">
                    <button type="button" class="btn btn-primary btn-sm" onclick="vpsSearch()">
                        <i class="bi bi-search"></i>
                        <span th:text="#{pa.payStub.search}">Tra cứu</span>
                    </button>
                    <button type="button" class="btn btn-warning btn-sm" id="vps_btnRecalculate"
                            onclick="vpsRecalculate()" style="display:none;">
                        <i class="bi bi-calculator"></i>
                        <span th:text="#{pa.payStub.recalculate}">Tính lại lương</span>
                    </button>
                    <button type="button" class="btn btn-secondary btn-sm" id="vps_btnPrint"
                            onclick="vpsPrint()" style="display:none;">
                        <i class="bi bi-printer"></i>
                        <span th:text="#{pa.payStub.print}">In</span>
                    </button>

                </div>

            </div>
        </div>
    </div>

    <!-- ── Khu vực hiển thị phiếu lương ────────────────────────────────────── -->
    <div id="vps_loadingArea" class="text-center py-5" style="display:none;">
        <div class="spinner-border text-primary" role="status" style="width:3rem;height:3rem;"></div>
        <div class="mt-2 text-muted" th:text="#{pa.payStub.loading}">Đang tải phiếu lương...</div>
    </div>

    <div id="vps_noData" class="text-center py-5 text-muted" style="display:none;">
        <i class="bi bi-inbox fs-1"></i>
        <div class="mt-2" th:text="#{pa.payStub.noData}">Không có dữ liệu</div>
    </div>

    <div id="vps_printArea">
        <!-- Phiếu lương được render bằng JavaScript -->
    </div>

</div>

<!-- ── Scripts ──────────────────────────────────────────────────────────────── -->
<template id="fragmentScripts">
    <script th:inline="javascript">
        var vps_msgSelectSchedule = /*[[#{pa.payStub.msgSelectSchedule}]]*/  'Vui lòng chọn kế hoạch trả lương!';
        var vps_msgNoData         = /*[[#{pa.payStub.noData}]]*/             'Không có dữ liệu';
        var vps_msgLoading        = /*[[#{pa.payStub.loading}]]*/            'Đang tải phiếu lương...';
        var vps_labelEmpName      = /*[[#{pa.payStub.empName}]]*/            'Họ tên';
        var vps_labelEmpId        = /*[[#{pa.payStub.empId}]]*/              'Mã nhân viên';
        var vps_labelDept         = /*[[#{pa.payStub.dept}]]*/               'Phòng ban';
        var vps_labelEmpType      = /*[[#{pa.payStub.empType}]]*/            'Loại nhân viên';
        var vps_labelEmpGroup     = /*[[#{pa.payStub.empGroup}]]*/           'Nhóm nhân viên';
        var vps_labelPosition     = /*[[#{pa.payStub.position}]]*/           'Chức vụ';
        var vps_labelGrade        = /*[[#{pa.payStub.grade}]]*/              'Chức danh';
        var vps_labelWorkStatus   = /*[[#{pa.payStub.workStatus}]]*/         'Loại hợp đồng';
        var vps_labelDependent    = /*[[#{pa.payStub.dependent}]]*/          'Số người phụ thuộc';
        var vps_labelBankName     = /*[[#{pa.payStub.bankName}]]*/           'Ngân hàng';
        var vps_labelAccountNo    = /*[[#{pa.payStub.accountNo}]]*/          'Tài khoản';
        var vps_labelSocialInsuranceNo = /*[[#{pa.payStub.socialInsuranceNo}]]*/ 'Số thẻ bảo hiểm xã hội';
        var vps_labelStdItems     = /*[[#{pa.payStub.standardItems}]]*/      'Hạng mục tiêu chuẩn';
        var vps_labelItemName     = /*[[#{pa.payStub.itemName}]]*/           'Hạng mục';
        var vps_labelAmount       = /*[[#{pa.payStub.amount}]]*/             'Số tiền';
        var vps_labelAttendance   = /*[[#{pa.payStub.attendanceItems}]]*/    'Chi tiết chấm công';
        var vps_labelSalary       = /*[[#{pa.payStub.salaryItems}]]*/        'Chi tiết lương';
        var vps_labelDeduction    = /*[[#{pa.payStub.deductionItems}]]*/     'Chi tiết khoản trừ';
        var vps_labelAttItem      = /*[[#{pa.payStub.attendanceItem}]]*/     'Hạng mục chấm công';
        var vps_labelValue        = /*[[#{pa.payStub.value}]]*/              'Giá trị';
        var vps_labelSalaryItem   = /*[[#{pa.payStub.salaryItem}]]*/         'Hạng mục';
        var vps_labelDeductItem   = /*[[#{pa.payStub.deductionItem}]]*/      'Hạng mục';
        var vps_labelTotal        = /*[[#{pa.payStub.total}]]*/              'Tổng';
        var vps_labelNetSalary    = /*[[#{pa.payStub.netSalary}]]*/          'Lương thực lĩnh';
        var vps_labelOtherItems   = /*[[#{pa.payStub.otherItems}]]*/         'Hạng mục khác';
        var vps_labelNote         = /*[[#{pa.payStub.note}]]*/               '※ Mọi thắc mắc về nội dung trên phiếu lương, vui lòng liên hệ phòng Nhân sự!';
        var vps_labelSlipTitle    = /*[[#{pa.payStub.slipTitle}]]*/          'PHIẾU LƯƠNG THÁNG';
        var vps_labelSection      = /*[[#{pa.payStub.basicInfo}]]*/          'Thông tin Cơ bản';
        var vps_labelAccount      = /*[[#{pa.payStub.account}]]*/            'Tài khoản';

        var vps_selectedDeptCodes = [];
        var vps_currentEmpOpinion = '';
        var vps_currentPersonIds  = [];

        /* ── Định dạng số ──────────────────────────────────────────────────── */
        function vpsFormatNumber(val) {
            if (val === null || val === undefined || val === '') return '';
            var num = parseFloat(String(val).replace(/,/g, ''));
            if (isNaN(num)) return '';
            return num.toLocaleString('vi-VN');
        }

        /* ── Lấy tháng/năm từ HR_END_DATE (YYYY-MM-DD hoặc YYYY/MM/DD) ──── */
        function vpsGetMonthYear(hrEndDate) {
            if (!hrEndDate) return '';
            var parts = String(hrEndDate).split(/[-\/]/);
            if (parts.length >= 2) {
                return parts[1] + '-' + parts[0];
            }
            return hrEndDate;
        }

        /* ── Tính tổng danh sách items ─────────────────────────────────────── */
        function vpsSum(items) {
            if (!items || items.length === 0) return 0;
            return items.reduce(function (acc, item) {
                return acc + (parseFloat(item.itemValue) || 0);
            }, 0);
        }

        /* ── Escape HTML ───────────────────────────────────────────────────── */
        function vpsEsc(str) {
            return $('<span>').text(str || '').html();
        }

        /* ── Render một phiếu lương ────────────────────────────────────────── */
        function vpsRenderStub(emp) {
            var monthYear  = vpsGetMonthYear(emp.hrEndDate);
            var totalSal   = vpsSum(emp.salaryItems);
            var totalDeduct = vpsSum(emp.deductionItems);
            var netSalary  = totalSal - totalDeduct;

            var maxRows = Math.max(
                (emp.attendanceItems  || []).length,
                (emp.salaryItems      || []).length,
                (emp.deductionItems   || []).length
            );

            /* ── Bảng 3 cột: Chấm công / Lương / Khoản trừ ── */
            var tripleRows = '';
            for (var r = 0; r < maxRows; r++) {
                var att    = (emp.attendanceItems  || [])[r] || null;
                var sal    = (emp.salaryItems      || [])[r] || null;
                var deduct = (emp.deductionItems   || [])[r] || null;

                tripleRows +=
                    '<tr>' +
                    '<td>' + (att    ? vpsEsc(att.itemName)     : '') + '</td>' +
                    '<td class="text-end">' + (att    ? vpsFormatNumber(att.itemValue)    : '') + '</td>' +
                    '<td>' + (sal    ? vpsEsc(sal.itemName)     : '') + '</td>' +
                    '<td class="text-end">' + (sal    ? vpsFormatNumber(sal.itemValue)    : '') + '</td>' +
                    '<td>' + (deduct ? vpsEsc(deduct.itemName)  : '') + '</td>' +
                    '<td class="text-end">' + (deduct ? vpsFormatNumber(deduct.itemValue) : '') + '</td>' +
                    '</tr>';
            }

            /* ── Hạng mục tiêu chuẩn ── */
            var stdRows = '';
            $.each(emp.standardItems || [], function (i, item) {
                stdRows +=
                    '<tr>' +
                    '<td>' + vpsEsc(item.itemName) + '</td>' +
                    '<td class="text-end">' + vpsFormatNumber(item.itemValue) + '</td>' +
                    '</tr>';
            });

            /* ── Hạng mục khác ── */
            var otherRows = '';
            $.each(emp.otherItems || [], function (i, item) {
                if (item.returnValue || item.remark) {
                    otherRows +=
                        '<tr>' +
                        '<td>' + vpsEsc(item.remark) + '</td>' +
                        '<td class="text-end">' + vpsFormatNumber(item.returnValue) + '</td>' +
                        '</tr>';
                }
            });

            var html =
                '<div class="vps-pay-stub">' +

                /* Header */
                '<div class="vps-stub-header">' +
                '<div class="vps-logo"><img src="/assets/images/logo.png" alt="Logo"><span class="vps-title">' + vps_labelSlipTitle + ' ' + vpsEsc(monthYear) + '</span></div>' +
                '</div>' +

                /* Thông tin cơ bản */
                '<div class="vps-section-title">' + vps_labelSection + '</div>' +
                '<table class="vps-info-table">' +
                '<tr>' +
                '<th>' + vps_labelEmpName   + '</th><td>' + vpsEsc(emp.localName)     + '</td>' +
                '<th>' + vps_labelEmpId     + '</th><td>' + vpsEsc(emp.empId)         + '</td>' +
                '<th>' + vps_labelDept      + '</th><td>' + vpsEsc(emp.deptName)      + '</td>' +
                '<th>' + vps_labelEmpType   + '</th><td>' + vpsEsc(emp.empTypeName)   + '</td>' +
                '</tr>' +
                '<tr>' +
                '<th>' + vps_labelEmpGroup  + '</th><td>' + vpsEsc(emp.postFamily)    + '</td>' +
                '<th>' + vps_labelPosition  + '</th><td>' + vpsEsc(emp.positionName)  + '</td>' +
                '<th>' + vps_labelGrade     + '</th><td>' + vpsEsc(emp.postGrade)     + '</td>' +
                '<th>' + vps_labelWorkStatus + '</th><td>' + vpsEsc(emp.empOfficeName) + '</td>' +
                '</tr>' +
                '<tr>' +
                '<th colspan="2">' + vps_labelDependent + '</th><td colspan="6">' + (emp.dependentCount || 0) + '</td>' +
                '</tr>' +
                '<tr>' +
                '<th colspan="2">' + vps_labelSocialInsuranceNo + '</th><td colspan="6">' + vpsEsc(emp.socialInsuranceNo || '') + '</td>' +
                '</tr>' +
                '</table>' +

                /* Tài khoản */
                '<div class="vps-section-title">' + vps_labelAccount + '</div>' +
                '<table class="vps-detail-table">' +
                '<thead><tr>' +
                '<th class="text-center">' + vps_labelBankName + '</th>' +
                '<th class="text-center">' + vps_labelAccountNo + '</th>' +
                '</tr></thead>' +
                '<tbody><tr>' +
                '<td class="text-center">' + vpsEsc(emp.bankName || '') + '</td>' +
                '<td class="text-center">' + vpsEsc(emp.bankAccountNo || emp.accountNo || '') + '</td>' +
                '</tr></tbody>' +
                '</table>';

            /* Hạng mục tiêu chuẩn - chỉ render nếu có dữ liệu */
            if ((emp.standardItems || []).length > 0) {
                html +=
                    '<div class="vps-section-title">' + vps_labelStdItems + '</div>' +
                    '<table class="vps-detail-table">' +
                    '<thead><tr>' +
                    '<th>' + vps_labelItemName + '</th>' +
                    '<th class="text-end">' + vps_labelAmount + '</th>' +
                    '</tr></thead>' +
                    '<tbody>' + stdRows + '</tbody>' +
                    '</table>';
            }

            /* Bảng 3 cột chi tiết */
            html +=
                '<table class="vps-triple-table">' +
                '<thead><tr>' +
                '<th colspan="2" class="text-center vps-att-header">■ ' + vps_labelAttendance + '</th>' +
                '<th colspan="2" class="text-center vps-sal-header">■ ' + vps_labelSalary + '</th>' +
                '<th colspan="2" class="text-center vps-ded-header">■ ' + vps_labelDeduction + '</th>' +
                '</tr>' +
                '<tr>' +
                '<th>' + vps_labelAttItem   + '</th><th class="text-end">' + vps_labelValue  + '</th>' +
                '<th>' + vps_labelSalaryItem + '</th><th class="text-end">' + vps_labelAmount + '</th>' +
                '<th>' + vps_labelDeductItem + '</th><th class="text-end">' + vps_labelAmount + '</th>' +
                '</tr></thead>' +
                '<tbody>' + (tripleRows || '<tr><td colspan="6" class="text-center text-muted">-</td></tr>') + '</tbody>' +
                '<tfoot><tr>' +
                '<td colspan="2"></td>' +
                '<td class="fw-bold">' + vps_labelTotal + '</td>' +
                '<td class="text-end fw-bold">' + vpsFormatNumber(totalSal) + '</td>' +
                '<td class="fw-bold">' + vps_labelTotal + '</td>' +
                '<td class="text-end fw-bold">' + vpsFormatNumber(totalDeduct) + '</td>' +
                '</tr></tfoot>' +
                '</table>' +

                /* Lương thực lĩnh */
                '<table class="vps-net-table">' +
                '<tr>' +
                '<td class="fw-bold">' + vps_labelNetSalary + '</td>' +
                '<td class="text-end fw-bold">' + vpsFormatNumber(netSalary) + '</td>' +
                '</tr>' +
                '</table>';

            /* Hạng mục khác */
            if (otherRows) {
                html +=
                    '<div class="vps-section-title">' + vps_labelOtherItems + '</div>' +
                    '<table class="vps-detail-table">' +
                    '<tbody>' + otherRows + '</tbody>' +
                    '</table>';
            }

            /* Ghi chú */
            html +=
                '<div class="vps-note">' + vpsEsc(vps_currentEmpOpinion || vps_labelNote) + '</div>' +
                '</div>';

            return html;
        }

        /* ── Tải kế hoạch trả lương ────────────────────────────────────────── */
        function vpsLoadScheduleList() {
            $.ajax({
                url: '/pa/workManagement/api/paySchedule',
                type: 'GET',
                success: function (list) {
                    var $sel = $('#vps_payScheduleNo');
                    $sel.find('option:not(:first)').remove();
                    if (list && list.length > 0) {
                        $.each(list, function (i, item) {
                            $sel.append($('<option>', {
                                value: item.payScheduleNo,
                                text: item.payDate + (item.salaryDistinName ? ' ' + item.salaryDistinName : ''),
                                'data-emp-opinion': item.empOpinion || ''
                            }));
                        });
                        $sel.val(list[0].payScheduleNo);
                        if ($.fn.select2) $sel.trigger('change.select2');
                    }
                },
                error: function () {
                    toastr ? toastr.warning('Không thể tải danh sách kế hoạch trả lương!') : null;
                }
            });
        }

        /* ── Tìm kiếm ──────────────────────────────────────────────────────── */
        window.vpsSearch = function () {
            var payScheduleNo = $('#vps_payScheduleNo').val();
            if (!payScheduleNo) {
                toastr ? toastr.warning(vps_msgSelectSchedule) : alert(vps_msgSelectSchedule);
                return;
            }

            var lang = $('html').attr('lang') || 'vi';

            $('#vps_loadingArea').show();
            $('#vps_noData').hide();
            $('#vps_printArea').empty();
            $('#vps_btnPrint').hide();

            $.ajax({
                url: '/pa/workManagement/api/payStub/load',
                type: 'GET',
                data: {
                    payScheduleNo: payScheduleNo,
                    deptNos:       vps_selectedDeptCodes.join(','),
                    empSearch:     $('#vps_empSearch').val(),
                    empOffice:     $('#vps_empOffice').val(),
                    lang:          lang
                },
                success: function (list) {
                    $('#vps_loadingArea').hide();
                    if (!list || list.length === 0) {
                        $('#vps_noData').show();
                        vps_currentPersonIds = [];
                        $('#vps_btnRecalculate').hide();
                        return;
                    }
                    vps_currentEmpOpinion = $('#vps_payScheduleNo option:selected').data('emp-opinion') || '';
                    vps_currentPersonIds  = list.map(function (emp) { return emp.personId; });
                    var html = '';
                    $.each(list, function (i, emp) {
                        html += vpsRenderStub(emp);
                    });
                    $('#vps_printArea').html(html);
                    $('#vps_btnPrint').show();
                    $('#vps_btnRecalculate').show();
                },
                error: function (err) {
                    $('#vps_loadingArea').hide();
                    var msg = (err.responseJSON && err.responseJSON.error) ? err.responseJSON.error : err.responseText;
                    toastr ? toastr.error(msg) : alert(msg);
                }
            });
        };

        /* ── Tính lại lương ───────────────────────────────────────────────────── */
        window.vpsRecalculate = function () {
            var payScheduleNo = $('#vps_payScheduleNo').val();
            if (!payScheduleNo) {
                toastr ? toastr.warning(vps_msgSelectSchedule) : alert(vps_msgSelectSchedule);
                return;
            }
            if (!vps_currentPersonIds || vps_currentPersonIds.length === 0) {
                toastr ? toastr.warning('Không có nhân viên để tính lại lương!') : alert('Không có nhân viên để tính lại lương!');
                return;
            }
            var $btn = $('#vps_btnRecalculate');
            $btn.prop('disabled', true);
            $btn.find('i').removeClass('bi-calculator').addClass('bi-hourglass-split');
            $.ajax({
                url: '/pa/workManagement/api/payStub/recalculate',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ payScheduleNo: payScheduleNo, personIds: vps_currentPersonIds }),
                success: function (res) {
                    toastr ? toastr.success(res.message || 'Tính lại lương thành công!') : alert(res.message);
                    vpsSearch();
                },
                error: function (err) {
                    var msg = (err.responseJSON && err.responseJSON.error) ? err.responseJSON.error : err.responseText;
                    toastr ? toastr.error(msg) : alert(msg);
                },
                complete: function () {
                    $btn.prop('disabled', false);
                    $btn.find('i').removeClass('bi-hourglass-split').addClass('bi-calculator');
                }
            });
        };

        /* ── In phiếu lương ────────────────────────────────────────────────── */
