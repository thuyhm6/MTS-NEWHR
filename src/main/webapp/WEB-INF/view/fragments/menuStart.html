<div th:fragment="menuStart">
     <div class="main-nav">
          <!-- Sidebar Logo -->
          <div class="logo-box">
               <a href="/dashboard" class="logo-dark">
                    <img src="/assets/images/logo-sm.png" class="logo-sm" alt="logo sm" style="width: 100%; height: 100%; object-fit: cover;">
                    <img src="/assets/images/logo-dark.png" class="logo-lg" alt="logo dark" style="width: 100%; height: 100%; object-fit: cover;">
               </a>

               <a href="/dashboard" class="logo-light">
                    <img src="/assets/images/logo-sm.png" class="logo-sm" alt="logo sm" style="width: 100%; height: 100%; object-fit: cover;">
                    <img src="/assets/images/logo-light.png" class="logo-lg" alt="logo light" style="width: 100%; height: 100%; object-fit: cover;">
               </a>
          </div>

          <!-- Menu Toggle Button (sm-hover) -->
          <button type="button" class="button-sm-hover" aria-label="Show Full Sidebar">
               <iconify-icon icon="solar:double-alt-arrow-right-bold-duotone"
                    class="button-sm-hover-icon"></iconify-icon>
          </button>

          <div class="scrollbar" data-simplebar>
               <!-- Dynamic menu based on user permissions -->
               <ul class="navbar-nav" id="navbar-nav" th:if="${userMenus != null and !userMenus.empty}">
                    <th:block th:each="menu : ${userMenus}">
                         <li class="nav-item" th:if="${menu.isActive()}">
                              <th:block th:if="${menu.hasChildren()}">
                                   <a class="nav-link menu-arrow" th:href="'#sidebar' + ${menu.menuNo}"
                                        data-bs-toggle="collapse" role="button" aria-expanded="false"
                                        th:aria-controls="'sidebar' + ${menu.menuNo}"
                                        th:attr="data-menu-no=${menu.menuNo}">
                                        <span class="nav-icon">
                                             <img th:if="${menu.menuImg != null and #strings.contains(menu.menuImg, '.')}"
                                                  th:src="@{${#strings.replace(menu.menuImg, '\', '/')}}"
                                                  style="width: 22px; height: 22px; object-fit: contain;">
                                        </span>
                                        <span class="nav-text" th:text="${menu.menuName}">Menu Name</span>
                                   </a>
                                   <div class="collapse" th:id="'sidebar' + ${menu.menuNo}">
                                        <ul class="nav sub-navbar-nav">
                                             <li class="sub-nav-item" th:each="child : ${menu.children}"
                                                  th:if="${child.isActive()}">
                                                  <th:block th:if="${child.hasChildren()}">
                                                       <a class="sub-nav-link menu-arrow"
                                                            th:href="'#sidebar' + ${child.menuNo}"
                                                            data-bs-toggle="collapse" role="button"
                                                            aria-expanded="false"
                                                            th:aria-controls="'sidebar' + ${child.menuNo}"
                                                            th:attr="data-menu-no=${child.menuNo}">
                                                            <span th:text="${child.menuName}">Child Menu Name</span>
                                                       </a>
                                                       <div class="collapse" th:id="'sidebar' + ${child.menuNo}">
                                                            <ul class="nav sub-navbar-nav">
                                                                 <li class="sub-nav-item"
                                                                      th:each="grandChild : ${child.children}"
                                                                      th:if="${grandChild.isActive()}">
                                                                      <a class="sub-nav-link"
                                                                           th:attr="data-tab=${grandChild.menuUrl != null and !grandChild.menuUrl.empty} ? ${grandChild.menuUrl} : 'javascript:void(0);', data-menu-no=${grandChild.menuNo}"
                                                                           th:text="${grandChild.menuName}">Grand Child
                                                                           Menu Name</a>
                                                                 </li>
                                                            </ul>
                                                       </div>
                                                  </th:block>
                                                  <th:block th:unless="${child.hasChildren()}">
                                                       <a class="sub-nav-link"
                                                            th:attr="data-tab=${child.menuUrl != null and !child.menuUrl.empty} ? ${child.menuUrl} : 'javascript:void(0);', data-menu-no=${child.menuNo}"
                                                            th:text="${child.menuName}">Child Menu Name</a>
                                                  </th:block>
                                             </li>
                                        </ul>
                                   </div>
                              </th:block>
                              <th:block th:unless="${menu.hasChildren()}">
                                   <a class="nav-link"
                                        th:attr="data-tab=${menu.menuUrl != null and !menu.menuUrl.empty} ? ${menu.menuUrl} : 'javascript:void(0);', data-menu-no=${menu.menuNo}">
                                        <span class="nav-icon" th:if="${menu.menuImg != null and !menu.menuImg.empty}">
                                             <img th:if="${#strings.contains(menu.menuImg, '.')}"
                                                  th:src="@{${#strings.replace(menu.menuImg, '\', '/')}}"
                                                  style="width: 22px; height: 22px; object-fit: contain;">
                                             <iconify-icon th:unless="${#strings.contains(menu.menuImg, '.')}"
                                                  th:icon="${menu.menuImg}"></iconify-icon>
                                        </span>
                                        <span class="nav-icon"
                                             th:unless="${menu.menuImg != null and !menu.menuImg.empty}">
                                             <iconify-icon icon="solar:menu-dots-bold-duotone"></iconify-icon>
                                        </span>
                                        <span class="nav-text" th:text="${menu.menuName}">Menu Name</span>
                                   </a>
                              </th:block>
                         </li>
                    </th:block>
               </ul>
          </div>
     </div>

     <script>
          document.addEventListener("DOMContentLoaded", function () {
               const sidebarRoot = document.querySelector(".main-nav");
               if (!sidebarRoot) {
                    return;
               }

               const menuLinks = Array.from(sidebarRoot.querySelectorAll(".nav-link, .sub-nav-link"));

               function normalizeUrl(value) {
                    if (!value) return "";
                    const url = (value + "").trim();
                    if (!url || url === "#" || url === "javascript:void(0);" || url === "javascript:void(0)") {
                         return "";
                    }
                    return url;
               }

               function clearHighlight() {
                    menuLinks.forEach(function (link) {
                         link.classList.remove("active-menu");
                    });
               }

               function highlightLink(link) {
                    if (!link) return;
                    clearHighlight();
                    link.classList.add("active-menu");
               }

               function showCollapse(collapseEl) {
                    if (!collapseEl) return;
                    if (window.bootstrap && window.bootstrap.Collapse) {
                         window.bootstrap.Collapse.getOrCreateInstance(collapseEl, { toggle: false }).show();
                    } else {
                         collapseEl.classList.add("show");
                    }
               }

               function openCollapseByToggle(toggleEl) {
                    if (!toggleEl) return;
                    const targetSelector = toggleEl.getAttribute("href") || toggleEl.getAttribute("data-bs-target");
                    if (!targetSelector || !targetSelector.startsWith("#")) return;
                    const collapseEl = document.querySelector(targetSelector);
                    showCollapse(collapseEl);
                    toggleEl.setAttribute("aria-expanded", "true");
                    toggleEl.classList.remove("collapsed");
               }

               function openParentCollapses(linkEl) {
                    if (!linkEl) return;
                    let collapseEl = linkEl.closest(".collapse");
                    while (collapseEl) {
                         showCollapse(collapseEl);
                         if (collapseEl.id) {
                              const toggleSelector = '[data-bs-toggle="collapse"][href="#' + collapseEl.id + '"], [data-bs-toggle="collapse"][data-bs-target="#' + collapseEl.id + '"]';
                              sidebarRoot.querySelectorAll(toggleSelector).forEach(function (toggle) {
                                   toggle.setAttribute("aria-expanded", "true");
                                   toggle.classList.remove("collapsed");
                              });
                         }
                         const parent = collapseEl.parentElement;
                         collapseEl = parent ? parent.closest(".collapse") : null;
                    }
               }

               function findSidebarLink(payload) {
                    const menuNo = payload && payload.menuNo ? String(payload.menuNo) : "";
                    const dataTab = normalizeUrl(payload && payload.dataTab ? payload.dataTab : "");
                    const href = normalizeUrl(payload && payload.href ? payload.href : "");

                    if (menuNo) {
                         const byMenuNo = menuLinks.find(function (link) {
                              return (link.dataset.menuNo || "") === menuNo;
                         });
                         if (byMenuNo) return byMenuNo;
                    }

                    if (dataTab) {
                         const byDataTab = menuLinks.find(function (link) {
                              return normalizeUrl(link.getAttribute("data-tab")) === dataTab;
                         });
                         if (byDataTab) return byDataTab;
                    }

                    if (href) {
                         const byHref = menuLinks.find(function (link) {
                              return normalizeUrl(link.getAttribute("href")) === href;
                         });
                         if (byHref) return byHref;
                    }

                    return null;
               }

               function syncSidebarMenu(payload) {
                    const target = findSidebarLink(payload || {});
                    if (!target) {
                         return false;
                    }

                    if (target.getAttribute("data-bs-toggle") === "collapse") {
                         openParentCollapses(target);
                         openCollapseByToggle(target);
                    } else {
                         openParentCollapses(target);
                    }

                    highlightLink(target);
                    return true;
               }

               window.syncSidebarMenu = syncSidebarMenu;

               menuLinks.forEach(function (link) {
                    link.addEventListener("click", function () {
                         if (this.getAttribute("data-bs-toggle") === "collapse") {
                              return;
                         }
                         highlightLink(this);
                    });
               });

               document.addEventListener("topbar-menu-selected", function (event) {
                    syncSidebarMenu(event.detail || {});
               });
          });
     </script>
</div>
