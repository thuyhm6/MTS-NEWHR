spring.application.name=HR-11

# Photo upload configuration
# Thư mục lưu ảnh nhân viên ngoài project (ngoài JAR/WAR), phải là đường dẫn tuyệt đối
# Trên Windows tránh dùng /assets/... vì Java giải thành root ổ đĩa (D:\assets\...)
# Có thể dùng biến môi trường: set PHOTO_UPLOAD_PATH=D:\source\VHR\HTSV_HR\resources\photo\HTSV
app.photo.upload.path=${PHOTO_UPLOAD_PATH:D:/source/VHR/HTSV_HR/resources/photo/HTSV}

# Multipart file upload limits (ảnh sẽ được resize về 600x800px khi lưu)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
# =============================================
# DATABASE - Dùng biến môi trường OS cho production:
set DB_URL=jdbc:oracle:thin:@//14.225.17.145:1521/orcl
set DB_USERNAME=HTSV_HR
set DB_PASSWORD=htsvhrdb
# =============================================
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@//${DB_HOST:localhost}:${DB_PORT:1521}/${DB_SERVICE:orcl}}
spring.datasource.username=${DB_USERNAME:CHANGE_ME}
spring.datasource.password=${DB_PASSWORD:CHANGE_ME}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# HikariCP Connection Pool Configuration (High Performance)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
# Giảm idle-timeout xuống 5 phút để recycle connection trước khi Oracle timeout
spring.datasource.hikari.idle-timeout=300000
# Giảm max-lifetime xuống 15 phút (nhỏ hơn Oracle session timeout mặc định)
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.pool-name=HrAppPool
# Ping idle connection mỗi 60s để giữ connection sống (yêu cầu HikariCP >= 4.0.1)
spring.datasource.hikari.keepalive-time=60000
# Validate connection trước khi lấy từ pool
spring.datasource.hikari.connection-test-query=SELECT 1 FROM DUAL

# Oracle-specific optimizations
spring.datasource.hikari.data-source-properties.oracle.net.CONNECT_TIMEOUT=10000
# Tăng ReadTimeout lên 120s cho các query phức tạp
spring.datasource.hikari.data-source-properties.oracle.jdbc.ReadTimeout=120000
spring.datasource.hikari.data-source-properties.oracle.net.READ_TIMEOUT=120000
spring.datasource.hikari.data-source-properties.oracle.jdbc.defaultNChar=false
spring.datasource.hikari.data-source-properties.oracle.jdbc.defaultBatchValue=1000
# Bật broken connection detection của Oracle JDBC
spring.datasource.hikari.data-source-properties.oracle.net.ENABLE_BROKEN_CONNECTION_DETECTION=true
mybatis.mapper-locations=classpath:com/ait/mapper/*.xml
mybatis.type-aliases-package=com.ait

# SQL Logging Configuration - Chỉ hiển thị SQL statements và row counts
logging.level.com.ait.config.SqlOnlyInterceptor=INFO
logging.level.com.ait.ar=INFO
logging.level.com.ait.hrm=INFO
logging.level.com.ait.org=INFO
logging.level.com.ait.sy=INFO
logging.level.org.springframework.jdbc=WARN
logging.level.org.mybatis=WARN
logging.level.org.springframework=WARN
logging.level.com.ait=WARN
logging.level.root=WARN

# DevTools Configuration
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
# Chỉ restart khi thay đổi Java files, không restart khi thay đổi view templates
spring.devtools.restart.exclude=static/**,templates/**,public/**,**/*.html,**/*.css,**/*.js,**/*.png,**/*.jpg,**/*.gif,**/*.svg
# LiveReload port (mặc định 35729)
spring.devtools.livereload.port=35729
# Polling interval for file changes (milliseconds)
spring.devtools.restart.poll-interval=1000
# Thymeleaf cache configuration
spring.thymeleaf.cache=false
# Thymeleaf Configuration for WAR/Exploded structure
spring.thymeleaf.prefix=/WEB-INF/view/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# Security Configuration
# Session timeout (30 minutes)
server.servlet.session.timeout=30m
# Session cookie security
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:true}
server.servlet.session.cookie.same-site=strict

# CORS Configuration - Thay thê domain thực khi deploy production
# Ví dụ: cors.allowed-origins=https://hr.yourcompany.com
cors.allowed-origins=http://localhost:8080,http://localhost:3000

# Rate Limiting Configuration
# Login attempts: 5 attempts per 15 minutes per IP
security.rate-limit.login.max-attempts=5
security.rate-limit.login.window-minutes=15
# API calls: 100 requests per minute per IP
security.rate-limit.api.max-requests=100
security.rate-limit.api.window-seconds=60

# CSRF Configuration
security.csrf.enabled=true
security.csrf.token-header=X-CSRF-TOKEN
security.csrf.parameter-name=_csrf_token

# Password Security
security.password.min-length=8
security.password.require-special-chars=true
security.password.require-numbers=true
security.password.require-uppercase=true

# Caching Configuration
# Spring Cache Configuration
spring.cache.type=caffeine
spring.cache.cache-names=userPermissions,menuCache,departmentCache,employeeCache
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=30m,expireAfterAccess=10m

# Jackson: serialize LocalDate/LocalDateTime as ISO strings, not arrays
spring.jackson.serialization.write-dates-as-timestamps=false

# MyBatis Configuration
mybatis.configuration.cache-enabled=true
mybatis.configuration.lazy-loading-enabled=true
mybatis.configuration.aggressive-lazy-loading=false
# mybatis.configuration.multiple-result-sets-enabled=true
mybatis.configuration.use-column-label=true
mybatis.configuration.use-generated-keys=false
mybatis.configuration.auto-mapping-behavior=partial
mybatis.configuration.auto-mapping-unknown-column-behavior=none
mybatis.configuration.default-executor-type=simple
mybatis.configuration.default-statement-timeout=30
mybatis.configuration.default-fetch-size=100
mybatis.configuration.safe-row-bounds-enabled=false
mybatis.configuration.safe-result-handler-enabled=true
mybatis.configuration.local-cache-scope=statement
mybatis.configuration.jdbc-type-for-null=null
# mybatis.configuration.lazy-load-trigger-methods=equals,clone,hashCode,toString

# Actuator Configuration - Chỉ expose endpoint an toàn
# KHÔNG expose metrics/prometheus công khai trên production
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.endpoint.health.show-components=when_authorized
management.endpoint.metrics.enabled=false

# Performance Monitoring
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99
management.metrics.distribution.sla.http.server.requests=10ms,50ms,100ms,200ms,500ms,1s,2s,5s

# JVM Metrics
management.metrics.enable.jvm=true
management.metrics.enable.system=true
management.metrics.enable.process=true

# Database Optimization Configuration
# Connection pool monitoring (handled in DataSourceConfig)

# Database monitoring
database.monitoring.enabled=true
database.monitoring.slow-query-threshold=1000
database.monitoring.connection-pool-alert-threshold=90
database.monitoring.active-session-alert-threshold=100

# Query optimization
database.query.optimization.enabled=true
database.query.cache.enabled=true
database.query.timeout=30
database.query.fetch-size=100

# Database statistics
database.statistics.auto-refresh=true
database.statistics.refresh-interval=3600
