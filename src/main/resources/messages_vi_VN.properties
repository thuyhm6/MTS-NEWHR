        // ── Lưu ─────────────────────────────────────────────────────────────
        window.vedrSave = function () {
            var scoreType = $('#vedr_scoreType').val();
            if (!scoreType) {
                alert('Vui lòng chọn Loại.');
                $('#vedr_scoreType').focus();
                return;
            }
            var name = $('#vedr_name').val().trim();
            if (!name) {
                alert('Vui lòng nhập Tên.');
                $('#vedr_name').focus();
                return;
            }
            var sum = vedrCalcSum();
            if (Math.abs(sum - 100) >= 0.001) {
                alert('Tổng tỷ lệ phân bổ (EX+VG+GD+NI+UN) phải bằng 100. Giá trị hiện tại: ' + sum);
                return;
            }
            var resumeSeq = $('#vedr_resumeSeqHidden').val() || $('#vedr_resumeSeq').val() || '';
            var payload = {
                seq: $('#vedr_seq').val() || null,
                resumeSeq: resumeSeq,
                scoreType: scoreType,
                no: $('#vedr_no').val(),
                name: name,
                deptNo: $('#vedr_deptNo').val(),
                deptName: $('#vedr_deptName').val(),
                postGradeNo: $('#vedr_postGradeNo').val(),
                postGradeName: $('#vedr_postGradeName').val(),
                a: parseFloat($('#vedr_a').val()) || 0,
                b: parseFloat($('#vedr_b').val()) || 0,
                c: parseFloat($('#vedr_c').val()) || 0,
                d: parseFloat($('#vedr_d').val()) || 0,
                e: parseFloat($('#vedr_e').val()) || 0,
                sum: sum,
                activity: $('#vedr_activity').prop('checked') ? '1' : '0'
            };
            $.ajax({
                url: '/evs/manage/api/evsScore/save',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(payload),
                success: function () {
                    _vedr_detailModal.hide();
                    if (_vedr_table) _vedr_table.ajax.reload();
                },
                error: function () {
                    alert('Lỗi khi lưu dữ liệu. Vui lòng thử lại.');
                }
            });
        };

