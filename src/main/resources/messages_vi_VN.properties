        function ecalFillModal(dateStr, personId) {
            var p = dateStr.split('/');
            var display = p[2] + '/' + p[1] + '/' + p[0];
            var empTxt = $('#ecal_empDisplay').val() || 'Bản thân';

            // Set header ngay
            $('#ecal_modalTitle').text('Cập nhật \u2014 ' + display + ' / ' + empTxt);
            $('#ecal_editDdateStr').val(dateStr);
            $('#ecal_editPersonId').val(personId);
            $('#ecal_editEmpDisplay').val(empTxt);
            $('#ecal_editDateDisplay').val(display);

            // Reset form trước
            $('#ecal_shiftNo').val('');
            $('#ecal_typeid').val('');
            $('#ecal_remark').val('');

            // Gọi API lấy dữ liệu lịch cá nhân ngày đó
            $.ajax({
                url: '/ar/attendanceSettings/api/calender/emp/detail',
                data: { arDateStr: dateStr, personId: personId || '' },
                success: function (data) {
                    if (data) {
                        // Điền ca làm việc từ AR_SCHEDULE_HTSV (nếu đã có)
                        if (data.shiftNo) $('#ecal_shiftNo').val(data.shiftNo);
                        if (data.typeid) $('#ecal_typeid').val(data.typeid);
                        if (data.remark) $('#ecal_remark').val(data.remark);
                    }
                    new bootstrap.Modal(document.getElementById('ecal_modal')).show();
                },
                error: function () {
                    // Nếu API lỗi (không có record trong AR_CALENDER → tháng chưa có dữ liệu)
                    // vẫn mở modal rỗng để nhập
                    new bootstrap.Modal(document.getElementById('ecal_modal')).show();
                }
            });
        }

