                        lengthChange: true,
                        pageLength: 20,
                        columnDefs: [
                            { "width": "5%", "targets": 0 },   // Cột STT cố định nhỏ
                        ],
                        dom: 'Bfrtip',
                        buttons: ['excel', 'pdf', 'print'],
                        columns: [
                            { data: null, render: (d, t, r, m) => m.row + 1 },
                            { data: 'deptName' },
                            {
                                data: 'businessName',
                                render: function (d, t, r) {
                                    return d || r.codeNo || '';
                                }
                            },
                            {
                                data: 'isDefault',
                                className: 'text-center',
                                render: function (d) {
                                    return (d === '1' || d === 1) ? '
auto.ui.msg.1114=' : '';
                                }
                            },
                            { data: 'updatedBy' }, // + updatedIp?
                            {
                                data: 'updateDate',
                                render: function (d) {
                                    if (!d) return '';
                                    return new Date(d).toLocaleString();
                                }
                            }
                        ],
                        language: {
                            url: "//cdn.datatables.net/plug-ins/1.13.6/i18n/vi.json"
                        },
                        select: {
                            style: 'single'
                        }
                    });

                    // Row selection handler
                    businessTable.on('select deselect', function () {
                        var selected = businessTable.rows({ selected: true }).count();
                        $('#orgBus_btnEdit, #orgBus_btnDelete').prop('disabled', selected === 0);
                    });
                }

                // Resume Change
                $('#orgBus_resumeSelect').on('change', function () {
                    var resumeNo = $(this).val();
                    currentResumeNo = resumeNo;
                    if (resumeNo) {
                        loadOrgTree(resumeNo);
                        // Reset table and state
                        if (businessTable) businessTable.clear().draw();
                        currentDeptNo = null;
                        $('#orgBus_btnNew').prop('disabled', true);
                    }
                });

                // Tree Logic
                function loadOrgTree(resumeNo) {
                    var $tree = $('#orgBus_tree');
                    $tree.html('Đang tải...');

                    $.ajax({
                        url: '/org/api/compose/structure',
                        data: { resumeNo: resumeNo },
                        success: function (data) {
                            buildTree(data);
                        },
                        error: function (xhr) {
                            $tree.html('
auto.ui.msg.1115=Lỗi tải dữ liệu
auto.ui.msg.1116=');
                        }
                    });
                }

                function buildTree(data) {
                    var $tree = $('#orgBus_tree');
                    try { $tree.jstree("destroy"); } catch (e) { }

                    if (!data || data.length === 0) {
                        $tree.html('Không có dữ liệu'); return;
                    }

                    var idSet = new Set();
                    data.forEach(item => { if (item.deptNo) idSet.add(item.deptNo); });

                    var treeData = data.map(item => {
                        var parentId = item.parentDeptNo;
                        if (!parentId || parentId === 'ROOT' || !idSet.has(parentId)) parentId = '#';
                        var label = item.orgNameLocal || item.orgNameEng || item.deptNo;
                        return {
                            id: item.deptNo, parent: parentId, text: label,
                            data: item, icon: 'bx bxs-folder', state: { opened: true }
                        };
                    });

                    $tree.jstree({
                        'core': { 'data': treeData, 'themes': { 'responsive': true } },
                        'plugins': ['search', 'types']
                    });

                    $tree.off("changed.jstree").on("changed.jstree", function (e, data) {
                        if (data && data.selected.length) {
                            var node = data.instance.get_node(data.selected[0]);
                            if (node) {
                                onDeptSelected(node.id, node.text);
                            }
                        }
                    });

                    // Search box
                    var to = false;
                    $('#orgBus_searchTreeInput').keyup(function () {
                        if (to) clearTimeout(to);
                        to = setTimeout(function () {
                            var v = $('#orgBus_searchTreeInput').val();
                            $tree.jstree(true).search(v);
                        }, 250);
                    });
                }

                function onDeptSelected(deptNo, deptName) {
                    currentDeptNo = deptNo;
                    currentDeptName = deptName;
                    $('#orgBus_btnNew').prop('disabled', false); // Enable Add
                    loadBusinessList();
                }

                function loadBusinessList() {
                    if (!currentDeptNo || !currentResumeNo) return;
                    $.ajax({
                        url: '/org/api/business/list',
                        data: { resumeNo: currentResumeNo, deptNo: currentDeptNo },
                        success: function (data) {
                            businessTable.clear().rows.add(data).draw();
                            $('#orgBus_btnEdit, #orgBus_btnDelete').prop('disabled', true);
                        }
                    });
                }

                // Add/Edit/Delete Handlers
                $('#orgBus_btnNew').click(function () {
                    $('#orgBus_modalTitle').text('Thêm nghiệp vụ');
                    $('#orgBus_form')[0].reset();
                    $('#orgBus_seq').val('');
                    $('#orgBus_formDeptNo').val(currentDeptNo);
                    $('#orgBus_formResumeNo').val(currentResumeNo);
                    $('#orgBus_displayDeptName').val(currentDeptName);
                    $('#orgBus_modal').modal('show');
                });

                $('#orgBus_btnEdit').click(function () {
                    var rowData = businessTable.rows({ selected: true }).data()[0];
                    if (!rowData) return;

                    $('#orgBus_modalTitle').text('Cập nhật nghiệp vụ');
                    $('#orgBus_seq').val(rowData.seq); // Assuming SEQ is mapped (lowercase)
                    $('#orgBus_formDeptNo').val(rowData.deptNo);
                    $('#orgBus_formResumeNo').val(rowData.resumeNo);
                    $('#orgBus_displayDeptName').val(rowData.deptName); // Or currentDeptName
                    $('#orgBus_codeNo').val(rowData.codeNo);
                    $('#orgBus_orderNo').val(rowData.orderNo);
                    $('#orgBus_isDefault').prop('checked', rowData.isDefault == '1');

                    $('#orgBus_modal').modal('show');
                });

                $('#orgBus_btnDelete').click(function () {
                    var rowData = businessTable.rows({ selected: true }).data()[0];
                    if (!rowData) return;
                    if (!confirm('Bạn có chắc chắn muốn xóa?')) return;

                    $.ajax({
                        url: '/org/api/business/delete',
                        type: 'POST',
                        data: { seq: rowData.seq },
                        success: function (res) {
                            if (typeof toastr !== 'undefined') toastr.success(res.message);
                            loadBusinessList();
                        },
                        error: function (xhr) {
                            if (typeof toastr !== 'undefined') toastr.error('Lỗi: ' + xhr.responseText);
                        }
                    });
                });

                $('#orgBus_btnSave').click(function () {
                    var payload = {
                        seq: $('#orgBus_seq').val(),
                        resumeNo: $('#orgBus_formResumeNo').val(),
                        deptNo: $('#orgBus_formDeptNo').val(),
                        codeNo: $('#orgBus_codeNo').val(),
                        orderNo: $('#orgBus_orderNo').val(),
                        isDefault: $('#orgBus_isDefault').is(':checked') ? '1' : '0'
                    };

                    if (!payload.codeNo) {
                        alert('Vui lòng nhập Mã công việc');
                        return;
                    }

                    $.ajax({
                        url: '/org/api/business/save',
                        type: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify(payload),
                        success: function (res) {
                            if (typeof toastr !== 'undefined') toastr.success(res.message);
                            $('#orgBus_modal').modal('hide');
                            loadBusinessList();
                        },
                        error: function (xhr) {
                            if (typeof toastr !== 'undefined') toastr.error('Lỗi: ' + xhr.responseText);
                        }
                    });
                });

                // Expand/Collapse
                $('input[name="orgBus_treeViewOption"]').on('change', function () {
                    if (!$.fn.jstree) return;
                    if ($(this).val() === 'expand') {
                        $('#orgBus_tree').jstree('open_all');
                    } else {
                        $('#orgBus_tree').jstree('close_all');
                    }
                });
            });
