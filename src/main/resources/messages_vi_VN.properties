            function loadAvailableItems(selectedItemNo, selectedItemName) {
                $.ajax({
                    url: '/ar/attendanceSettings/api/arStaItemParam/availableItems',
                    success: function (data) {
                        var $sel = $('#arStaParamItemNo');
                        $sel.empty().append(new Option('-- Chọn hạng mục chưa có thông số --', ''));

                        // Nếu đang edit, thêm option hiện tại vào danh sách
                        if (selectedItemNo) {
                            $sel.append(new Option(selectedItemName + ' (' + selectedItemNo + ')', selectedItemNo));
                        }

                        data.forEach(function (itm) {
                            var itmNoVal = itm.itemNo || itm.ITEMNO || itm.ITEM_NO || '';
                            var nameViVal = itm.nameVi || itm.NAMEVI || itm.NAME_VI || '';
                            var text = (nameViVal || itmNoVal) + ' (' + itmNoVal + ')';
                            $sel.append(new Option(text, itmNoVal));
                        });

                        if (selectedItemNo) {
                            $sel.val(selectedItemNo);
                        }
                    }
                });
            }

