auto.ui.msg.1214=$(document).ready(function () {
                // Initialize Select2 if available
                if ($.fn.select2) {
                    $('#resumeProcSelect').select2({
                        width: '100%',
                        placeholder: "-- Chọn phiên bản thay đổi --",
                        allowClear: true
                    });
                }

                // Load resumes for dropdown
                $.ajax({
                    url: '/org/api/resume/dropdown',
                    type: 'GET',
                    success: function (data) {
                        var select = $('#resumeProcSelect');
                        select.empty();

                        if (data && data.length > 0) {
                            data.forEach(function (item) {
                                // Format: NO + RESUME_NAME
                                var displayText = (item.no ? item.no + ' ' : '') + (item.resumeName || '');
                                var option = new Option(displayText, item.no);
                                $(option).data('activity', item.activity); // Store activity
                                select.append(option);
                            });

                            // Trigger change to resolve statuses for the default selected item (first/latest)
                            select.val(data[0].no).trigger('change');
                        }
                    },
                    error: function (xhr) {
                        console.error('Error loading resumes:', xhr);
                    }
                });

                // Handle change event
                $('#resumeProcSelect').on('change', function () {
                    var selectedNo = $(this).val();
                    var selectedActivity = $(this).find(':selected').data('activity');

                    if (selectedActivity) {
                        var statusText = selectedActivity === '14013948' || selectedActivity === 'ACTIVE' ? 'Hoạt động' : 'Không hoạt động';
                        var statusClass = selectedActivity === '14013948' || selectedActivity === 'ACTIVE' ? 'text-success' : 'text-danger';

                        $('#resumeProcStatus').text(statusText)
                            .removeClass('text-success text-danger')
                            .addClass(statusClass);
                    } else {
                        $('#resumeProcStatus').text('---').removeClass('text-success text-danger').addClass('text-muted');
                    }

                    // Here you can add logic to update the process diagram colors or state 
                    // based on the selected specific resume's progress if that data is available.
                });

                // Handle Execute Button Click
                $('#resumeProcBtnExecute').on('click', function () {
                    var resumeNo = $('#resumeProcSelect').val();
                    if (!resumeNo) {
                        if (typeof toastr !== 'undefined') toastr.warning('Vui lòng chọn phiên bản thay đổi!');
                        else alert('Vui lòng chọn phiên bản thay đổi!');
                        return;
                    }

                    var selectedTypes = [];
                    if ($('#resumeProcChkCopyOrg').is(':checked')) selectedTypes.push('copyOrg');
                    if ($('#resumeProcChkScfl').is(':checked')) selectedTypes.push('scfl');
                    if ($('#resumeProcChkSczz').is(':checked')) selectedTypes.push('sczz');
                    if ($('#resumeProcChkQdzz').is(':checked')) selectedTypes.push('qdzz');

                    if (selectedTypes.length === 0) {
                        if (typeof toastr !== 'undefined') toastr.warning('Vui lòng chọn ít nhất một bước thực hiện!');
                        else alert('Vui lòng chọn ít nhất một bước thực hiện!');
                        return;
                    }

                    // Show loading...
                    var $btn = $(this);
                    var originalText = $btn.text();
                    $btn.text('Đang xử lý...').prop('disabled', true);

                    $.ajax({
                        url: '/org/api/process/execute',
                        type: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify({
                            resumeNo: resumeNo,
                            types: selectedTypes
                        }),
                        success: function (response) {
                            if (typeof toastr !== 'undefined') toastr.success(response.message || 'Thực hiện thành công!');
                            else alert(response.message || 'Thực hiện thành công!');
                        },
                        error: function (xhr) {
                            var err = xhr.responseJSON ? xhr.responseJSON.error : 'Có lỗi xảy ra!';
                            if (typeof toastr !== 'undefined') toastr.error('Lỗi: ' + err);
                            else alert('Lỗi: ' + err);
                        },
                        complete: function () {
                            $btn.text(originalText).prop('disabled', false);
                        }
                    });
                });
            });
