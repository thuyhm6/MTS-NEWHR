                function loadTable(parentCode) {
                    if (!parentCode) {
                        paramTable.clear().draw();
                        return;
                    }
                    if (!selectedCompanyId) {
                        // paramTable.clear().draw(); 
                        // Optional: Show codes but disable checkboxes? 
                        // Only listing codes if no company selected is confusing. Best to clear or warn.
                    }

                    // Assuming API returns list of SY_CODE children, mixed with SY_CODE_PARAM info for the Company
                    // We need to pass cpnyId
                    $.ajax({
                        url: '/sys/api/code_param/list',
                        data: { parentCodeNo: parentCode, cpnyId: selectedCompanyId },
                        success: function (data) {

                            if (selectedCompanyId) {
                                $('#codeParam_btnSaveList').prop('disabled', false);
                                $('#codeParam_checkAll').prop('disabled', false); // Enable Check All
                            } else {
                                $('#codeParam_btnSaveList').prop('disabled', true);
                                $('#codeParam_checkAll').prop('disabled', true);
                            }
                            $('#codeParam_checkAll').prop('checked', false); // Reset Check All state
                            paramTable.clear().rows.add(data).draw();
                        },
                        error: function () {
                            // If API not ready, handle gracefully (e.g. empty)
                            console.error("API load failed");
                        }
                    });
                }

                // --- 4. Event Handlers ---

                // Track checkbox state locally
                $('#codeParam_table tbody').on('change', '.param-check', function () {
                    var isChecked = $(this).is(':checked');
                    var row = paramTable.row($(this).closest('tr'));
                    var data = row.data();
                    data.uiChecked = isChecked;

                    // Update "Check All" state if one is unchecked
                    if (!isChecked) {
                        $('#codeParam_checkAll').prop('checked', false);
                    }
                });

                // "Check All" Handler
                $('#codeParam_checkAll').change(function () {
                    var isChecked = $(this).is(':checked');

                    // Update all rows in the dataset (handles pagination)
                    paramTable.rows().every(function () {
                        var d = this.data();
                        d.uiChecked = isChecked;
                        // this.invalidate(); // Don't invalidate entire row to avoid flickering or reset
                    });

                    // Update visible checkboxes
                    $('.param-check').prop('checked', isChecked);
                });

                // Batch Save Logic
                $('#codeParam_btnSaveList').click(function () {
                    if (!selectedCompanyId) {
                        toastr.warning('Vui lòng chọn công ty trước');
                        return;
                    }

                    var promises = [];
                    var count = 0;

                    paramTable.rows().every(function () {
                        var data = this.data();
                        var currentStatus = (data.uiChecked !== undefined) ? data.uiChecked : data.assigned;
                        var originalStatus = data.assigned; // Assuming boolean from DTO

                        if (currentStatus != originalStatus) {
                            count++;
                            var payload = {
                                cpnyId: selectedCompanyId,
                                codeNo: data.codeNo,
                                activity: '1',
                                orderNo: 0
                            };

                            if (currentStatus) {
                                // Add (Save)
                                promises.push($.ajax({
                                    url: '/sys/api/code_param/save',
                                    type: 'POST',
                                    contentType: 'application/json',
                                    data: JSON.stringify(payload)
                                }));
                            } else {
                                // Remove (Delete)
                                promises.push($.ajax({
                                    url: '/sys/api/code_param/delete',
                                    type: 'POST',
                                    contentType: 'application/json',
                                    data: JSON.stringify(payload)
                                }));
                            }
                        }
                    });

                    if (count === 0) {
                        toastr.info('Không có thay đổi nào cần lưu');
                        return;
                    }

                    Promise.all(promises).then(function () {
                        toastr.success('Cập nhật thành công ' + count + ' mục');
                        loadTable(currentParentCode);
                    }).catch(function () {
                        toastr.error('Có lỗi xảy ra khi lưu dữ liệu');
                        loadTable(currentParentCode);
                    });
                });

                // Edit Param (Edit extra fields like OrderNo)
                $('#codeParam_table tbody').on('click', '.btn-edit-param', function () {
                    var row = paramTable.row($(this).parents('tr')).data();
                    if (!row.assigned) return;

                    $('#codeParam_codeNo').val(row.codeNo);
                    $('#codeParam_orderNo').val(row.paramOrderNo || 0);
                    $('#codeParam_activity').prop('checked', row.paramActivity !== '0'); // Default check if null or 1

                    $('#codeParam_modal').modal('show');
                });

                $('#codeParam_btnSave').click(function () {
                    var codeNo = $('#codeParam_codeNo').val();
                    var orderNo = $('#codeParam_orderNo').val();
                    var activity = $('#codeParam_activity').is(':checked') ? '1' : '0';

                    var data = {
                        cpnyId: selectedCompanyId,
                        codeNo: codeNo,
                        activity: activity,
                        orderNo: orderNo
                    };

                    $.ajax({
                        url: '/sys/api/code_param/update', // Or save
                        type: 'POST',
                        contentType: 'application/json',
