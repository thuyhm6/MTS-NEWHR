        window.vedrOpenEditModal = function (seq) {
            $.ajax({
                url: '/evs/manage/api/evsScore/' + encodeURIComponent(seq),
                type: 'GET',
                success: function (r) {
                    if (!r) return;
                    $('#vedr_modalTitle').text('Chỉnh sửa tỷ lệ phân bổ');
                    $('#vedr_seq').val(r.seq || '');
                    $('#vedr_resumeSeqHidden').val(r.resumeSeq || '');
                    $('#vedr_scoreType').val(r.scoreType || '');
                    $('#vedr_no').val(r.no || '');
                    $('#vedr_name').val(r.name || '');
                    $('#vedr_deptNo').val(r.deptNo || '');
                    $('#vedr_deptName').val(r.deptName || '');
                    $('#vedr_postGradeNo').val(r.postGradeNo || '');
                    $('#vedr_postGradeName').val(r.postGradeName || '');
                    $('#vedr_a').val(vedrNum(r.a));
                    $('#vedr_b').val(vedrNum(r.b));
                    $('#vedr_c').val(vedrNum(r.c));
                    $('#vedr_d').val(vedrNum(r.d));
                    $('#vedr_e').val(vedrNum(r.e));
                    $('#vedr_activity').prop('checked', r.activity === '1' || r.activity === 1);
                    if (r.updatedBy) {
                        $('#vedr_auditDisplay').text((r.updatedBy || '') + ' — ' + (r.updateDate || ''));
                        $('#vedr_auditRow').show();
                    } else {
                        $('#vedr_auditRow').hide();
                    }
                    vedrCalcSum();
                    _vedr_detailModal.show();
                },
                error: function () {
                    alert('Lỗi khi tải thông tin tỷ lệ phân bổ.');
                }
            });
